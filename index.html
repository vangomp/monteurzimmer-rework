const stayBadge = (s) => ({

}[s] || ["—","bg-slate-100 text-slate-500"]);

);
const Pill = ({text, cls}) => <span className={"px-2.5 py-0.5 rounded-full text-xs font-semibold "+cls}>{text}</span>;
const Battery = ({v}) => {

};

/* ============================ RESERVATIONS ============================ */
function Reservations() {
  const [rows,setRows] = useState(RES);
  const toggleQonto = (code) => setRows(rs=>rs.map(r=>r.code===code?{...r,qonto:!r.qonto}:r));
  return (
    <div className="space-y-4">
      <div className="flex items-center justify-between">
        <div><h1 className="text-2xl font-bold text-slate-800">Reservierungen</h1><p className="text-slate-500">Aufenthalt, Kanal & Abrechnung im Blick.</p></div>
        <button className="bg-blue-600 text-white px-4 py-2 rounded-xl font-semibold text-sm">+ Neue Reservierung</button>
      </div>
      <Card className="overflow-hidden">
        <table className="w-full text-sm">
          <thead className="bg-slate-50 text-slate-500 text-xs uppercase">
            <tr><th className="text-left p-3">Gast</th><th className="text-left p-3">Zimmer</th><th className="text-left p-3">Zeitraum</th><th className="text-left p-3">Aufenthalt</th><th className="text-left p-3">Kanal</th><th className="text-center p-3">Qonto-Rechnung</th></tr>
          </thead>
          <tbody>
            {rows.map((r,i)=>{const [bt,bc]=stayBadge(r.stay);return(
              <tr key={i} className="border-t border-slate-100">
                <td className="p-3"><div className="font-semibold text-slate-800">{r.guest}</div><div className="text-xs text-slate-400">{r.kind} · {r.code} · {r.phone}</div></td>
                <td className="p-3 text-slate-600">{r.room}</td>
                <td className="p-3 text-slate-600">{r.inn} – {r.out}</td>
                <td className="p-3"><Pill text={bt+(r.daysLeft>0?` (${r.daysLeft}d)`:"")} cls={bc}/></td>
                <td className="p-3"><span className="text-slate-600">{r.channel}</span></td>
                <td className="p-3 text-center">
                  <label className="inline-flex items-center gap-2 cursor-pointer">
                    <input type="checkbox" checked={r.qonto} onChange={()=>toggleQonto(r.code)} className="w-4 h-4 accent-blue-600"/>
                    <span className={"text-xs "+(r.qonto?"text-emerald-600 font-semibold":"text-slate-400")}>{r.qonto?"Auto billing created":"offen"}</span>
                  </label>
                </td>
              </tr>
            );})}
          </tbody>
        </table>
      </Card>
      <p className="text-xs text-slate-400">Checkbox = manuell. Geplant: Button „Rechnung in Qonto erstellen" + Auto-Abgleich ausgestellter Rechnungen per Firmen-/Personenname.</p>
    </div>
  );
}

      <Card className="overflow-hidden">
        <table className="w-full text-sm">
          <thead className="bg-slate-50 text-slate-500 text-xs uppercase"><tr><th className="text-left p-3">Zimmer</th><th className="text-left p-3">Haus</th><th className="text-left p-3">Kapazität</th><th className="text-left p-3">Türcode</th><th className="text-left p-3">WLAN</th><th className="text-left p-3">Status</th></tr></thead>

            {ROOMS.map((r,i)=>{const[pt,pc]=statusPill(r.status);return(
              <tr key={i} className="border-t border-slate-100">
                <td className="p-3 font-semibold text-slate-800">{r.label}</td>
                <td className="p-3 text-slate-600">{r.house}</td>
                <td className="p-3 text-slate-600">{r.cap} 🛏</td>
                <td className="p-3"><span className="font-mono text-amber-700">{r.door}</span></td>
                <td className="p-3 text-slate-600">📶 {r.wifi}</td>
                <td className="p-3"><Pill text={pt} cls={pc}/></td>
              </tr>
            );})}
          </tbody>

      <p className="text-xs text-slate-400">Status synchronisiert automatisch mit Check-in/Check-out (manuelles Override möglich).</p>

/* ============================ CHECK-INS + CASHBACK ============================ */
function CheckIns() {
  const [rows,setRows]=useState(CHECKINS);
  const decide=(g,ok)=>setRows(rs=>rs.map(r=>r.guest===g?{...r,cashback:ok?"approved":"rejected"}:r));
  const cbBadge=(c)=>({none:["—","bg-slate-100 text-slate-400"],submitted:["zu prüfen","bg-blue-100 text-blue-700"],flagged:["geflaggt","bg-rose-100 text-rose-700"],approved:["freigegeben ✓","bg-emerald-100 text-emerald-700"],rejected:["abgelehnt","bg-slate-200 text-slate-500"]}[c]);
  return (
    <div className="space-y-4">
      <div><h1 className="text-2xl font-bold text-slate-800">Check-ins & Cashback</h1><p className="text-slate-500">KI bewertet das Auszugsvideo – du gibst die 20 € frei.</p></div>
      {rows.map((r,i)=>{const[ct,cc]=cbBadge(r.cashback);return(
        <Card key={i} className="p-4">
          <div className="flex flex-wrap items-center justify-between gap-3">
            <div>
              <div className="font-semibold text-slate-800">{r.guest} <span className="text-xs text-slate-400 font-normal">· {r.room} · Auszug {r.out}</span></div>
              <div className="flex items-center gap-2 mt-1 text-xs">
                <Pill text={r.status} cls={r.status==="Overdue"?"bg-rose-100 text-rose-700":"bg-amber-100 text-amber-700"}/>
                <span className="text-blue-600">🪪 Ausweis ansehen</span>
                <Pill text={"Cashback: "+ct} cls={cc}/>
              </div>
            </div>
            <div className="flex items-center gap-3">
              {r.aiScore!==null && <div className="text-right"><div className="text-xs text-slate-400">KI-Score</div><div className={"text-xl font-bold "+(r.aiScore>=80?"text-emerald-600":r.aiScore>=60?"text-amber-600":"text-rose-600")}>{r.aiScore}</div></div>}
              {(r.cashback==="submitted"||r.cashback==="flagged") &&
                <div className="flex gap-2">
                  <button onClick={()=>decide(r.guest,true)} className="bg-emerald-600 text-white px-3 py-1.5 rounded-lg text-sm font-semibold">20 € freigeben</button>
                  <button onClick={()=>decide(r.guest,false)} className="bg-slate-200 text-slate-600 px-3 py-1.5 rounded-lg text-sm font-semibold">Ablehnen</button>
                </div>}
            </div>
          </div>
          {r.aiFlags && r.aiFlags.length>0 && <div className="mt-2 text-sm text-rose-700 bg-rose-50 rounded-lg px-3 py-2">⚠️ KI-Beanstandungen: {r.aiFlags.join(" · ")}</div>}
        </Card>
      );})}
    </div>
  );
}

/* ============================ EXTENSIONS ============================ */
function Extensions() {
  const [rows,setRows]=useState(EXTENSIONS);
  const act=(g,ok)=>setRows(rs=>rs.map(r=>r.guest===g?{...r,status:ok?"approved":"declined"}:r));
  return (
    <div className="space-y-4">
      <div><h1 className="text-2xl font-bold text-slate-800">Verlängerungen</h1><p className="text-slate-500">Automatische „verlängern?"-Nachfrage 3 Tage vor Auszug. Freigabe = neuer Auszugstermin + Reinigung gestoppt.</p></div>
      {rows.map((r,i)=>(
        <Card key={i} className="p-4 flex flex-wrap items-center justify-between gap-3">
          <div>
            <div className="font-semibold text-slate-800">{r.guest} <span className="text-xs text-slate-400 font-normal">· {r.room}</span></div>
            <div className="text-sm text-slate-500">Aktuell bis {r.currentOut} → Wunsch: <b>{r.wantedOut}</b> · {r.channel} · {r.asked}</div>
          </div>
          {r.status==="pending" && <div className="flex gap-2"><button onClick={()=>act(r.guest,true)} className="bg-blue-600 text-white px-3 py-1.5 rounded-lg text-sm font-semibold">Freigeben</button><button onClick={()=>act(r.guest,false)} className="bg-slate-200 text-slate-600 px-3 py-1.5 rounded-lg text-sm font-semibold">Ablehnen</button></div>}
          {r.status==="awaiting_guest" && <Pill text="Gast antwortet noch" cls="bg-amber-100 text-amber-700"/>}
          {r.status==="approved" && <Pill text="Freigegeben ✓ · Reinigung gestoppt" cls="bg-emerald-100 text-emerald-700"/>}
          {r.status==="declined" && <Pill text="Abgelehnt · Auszugsreinigung angelegt" cls="bg-slate-200 text-slate-500"/>}
        </Card>
      ))}
    </div>
  );
}

];
function CleaningTimeline(){
  const start=new Date("2026-05-07"), end=new Date("2026-06-21"), today=new Date("2026-06-11");
  const pct=(d)=>((new Date(d)-start)/(end-start))*100;
  const daysAgo=(d)=>Math.round((today-new Date(d))/86400000);
  const fmt=(d)=>new Date(d).toLocaleDateString("de-DE",{day:"2-digit",month:"2-digit"});
  return (
    <div className="space-y-4">
      {TIMELINE.map((t,i)=>{
        const last=t.past[t.past.length-1], ago=daysAgo(last), stale=ago>14;
        return (
          <div key={i}>
            <div className="flex justify-between text-sm mb-1">
              <span className="font-semibold text-slate-700">{t.house}</span>
              <span className="text-slate-500">Letzte: <b className={stale?"text-rose-600":"text-slate-700"}>{fmt(last)}</b> (vor {ago} T.) · Nächste: {fmt(t.next)}</span>
            </div>
            <div className="relative h-6 bg-slate-100 rounded-full">
              <div className="absolute top-0 bottom-0 w-0.5 bg-rose-500" style={{left:pct(today)+"%"}}></div>
              {t.past.map((d,j)=>(
                <div key={j} title={fmt(d)} className="absolute top-1/2 -translate-y-1/2 -translate-x-1/2 w-3 h-3 rounded-full bg-emerald-500 border-2 border-white" style={{left:pct(d)+"%"}}></div>
              ))}
              <div title={"geplant "+fmt(t.next)} className="absolute top-1/2 -translate-y-1/2 -translate-x-1/2 w-3 h-3 rounded-full bg-blue-500 border-2 border-white" style={{left:pct(t.next)+"%"}}></div>
            </div>
          </div>
        );
      })}
      <div className="flex gap-4 text-xs text-slate-400 pt-1">
        <span><span className="inline-block w-2.5 h-2.5 rounded-full bg-emerald-500 align-middle mr-1"></span>erledigt</span>
        <span><span className="inline-block w-2.5 h-2.5 rounded-full bg-blue-500 align-middle mr-1"></span>geplant</span>
        <span><span className="inline-block w-3 h-0.5 bg-rose-500 align-middle mr-1"></span>heute</span>
      </div>
    </div>
  );
}

/* ============================ GUEST PORTAL ============================ */
function Guest() {
  const [step,setStep]=useState("code");
  const [code,setCode]=useState("");
  const checklist=["Jedes Zimmer & Bett","Boden & Bad","Kühlschrank leer","Kein Müll","Fenster geschlossen"];
  const ELEMENTS=["Zimmer & Bett","Boden","Bad","Kühlschrank (leer)","Müll entfernt","Fenster geschlossen"];
  const [phase,setPhase]=useState("idle"); // idle | evaluating | review | done
  const [detected,setDetected]=useState({});
  const evaluate=(isFollowup)=>{
    setPhase("evaluating");
    setTimeout(()=>{
      const d={}; ELEMENTS.forEach(e=>d[e]=true);
      if(!isFollowup){ d["Kühlschrank (leer)"]=false; setDetected(d); setPhase("review"); }
      else { setDetected(d); setPhase("done"); }
    }, 2500);
  };
  const missing=ELEMENTS.filter(e=>detected[e]===false);
  if(step==="code") return (
    <div className="min-h-[70vh] flex items-center justify-center">
      <div className="w-full max-w-sm">
        <div className="bg-slate-900 rounded-t-3xl p-6 text-center">
          <div className="w-14 h-14 rounded-2xl bg-blue-600 mx-auto flex items-center justify-center text-2xl">🏠</div>
          <h2 className="text-white font-bold text-xl mt-3">Monteur Check-In</h2>
          <p className="text-slate-400 text-sm">Einfacher Zugang zu deinem Zimmer</p>
        </div>
        <div className="bg-white rounded-b-3xl p-6 shadow-lg">
          <label className="text-xs text-slate-500">Reservierungscode</label>
          <input value={code} onChange={e=>setCode(e.target.value.toUpperCase())} placeholder="z.B. DEMO01" className="w-full border border-slate-300 rounded-xl px-4 py-3 text-center font-mono mt-1"/>
          <button onClick={()=>setStep("home")} className="w-full bg-blue-600 text-white rounded-xl py-3 font-semibold mt-3">→ Weiter</button>
          <p className="text-[11px] text-slate-400 text-center mt-2">Auch nach dem Einchecken jederzeit nutzbar – für Tür-/WLAN-Codes & Check-out.</p>
        </div>
      </div>
    </div>
  );
  return (
    <div className="max-w-md mx-auto space-y-4">
      <div className="bg-gradient-to-br from-emerald-500 to-emerald-600 text-white rounded-2xl p-5">
        <div className="text-sm opacity-90">💶 Cashback-Aktion</div>
        <div className="text-xl font-bold mt-1">Lade beim Auszug ein Video hoch – bekomme 20 € zurück, wenn alles sauber ist.</div>
        <div className="text-xs opacity-90 mt-3">Das muss im Video zu sehen sein:</div>
        <div className="flex flex-wrap gap-1.5 mt-1">{checklist.map((c,i)=><span key={i} className="bg-white/20 rounded-full px-2.5 py-1 text-xs">✓ {c}</span>)}</div>
      </div>

      <Card className="p-5">
        <h3 className="font-semibold text-slate-800">Dein Zugang · WS20-3</h3>
        <div className="grid grid-cols-2 gap-3 mt-3 text-sm">
          <div className="bg-slate-50 rounded-xl p-3"><div className="text-xs text-slate-400">Haustür-Code</div><div className="font-mono text-lg font-bold text-slate-800">100200</div></div>
          <div className="bg-slate-50 rounded-xl p-3"><div className="text-xs text-slate-400">Zimmer-Code</div><div className="font-mono text-lg font-bold text-slate-800">0000</div></div>
          <div className="bg-slate-50 rounded-xl p-3"><div className="text-xs text-slate-400">WLAN</div><div className="font-semibold text-slate-800">Gast-WLAN</div></div>
          <div className="bg-slate-50 rounded-xl p-3"><div className="text-xs text-slate-400">WLAN-Passwort</div><div className="font-mono text-slate-800">demo-passwort</div></div>
        </div>
        <div className="flex gap-2 mt-3">
          <button className="flex-1 bg-slate-100 text-slate-700 rounded-xl py-2.5 text-sm font-semibold">📋 Hausregeln</button>
          <button className="flex-1 bg-slate-100 text-slate-700 rounded-xl py-2.5 text-sm font-semibold">💬 WhatsApp-Gruppe</button>
        </div>
      </Card>

      <Card className="p-5">
        <h3 className="font-semibold text-slate-800">Aufenthalt verlängern?</h3>
        <p className="text-sm text-slate-500 mt-1">Auszug aktuell: 21.06.2026</p>
        <button className="w-full mt-2 border border-blue-600 text-blue-700 rounded-xl py-2.5 text-sm font-semibold">+ Verlängerung anfragen</button>
      </Card>

      <Card className="p-5">
        <h3 className="font-semibold text-slate-800">Check-out · Live-Videoprüfung</h3>
        {phase==="idle" &&
          <button onClick={()=>evaluate(false)} className="w-full mt-2 bg-emerald-600 text-white rounded-xl py-3 font-semibold">🎥 Auszugsvideo hochladen (20 € zurück)</button>}
        {phase==="evaluating" &&
          <div className="mt-3 flex items-center gap-3 text-slate-600 text-sm"><span className="animate-spin inline-block w-5 h-5 border-2 border-slate-300 border-t-blue-600 rounded-full"></span>Auswertung läuft… einen Moment ⏳</div>}
        {(phase==="review"||phase==="done") &&
          <div className="mt-3 grid grid-cols-2 gap-1">
            {ELEMENTS.map((e,i)=>(
              <div key={i} className={"flex items-center gap-2 text-sm "+(detected[e]?"text-emerald-700":"text-rose-600 font-semibold")}>
                <span>{detected[e]?"✓":"✗"}</span><span>{e}</span>
              </div>
            ))}
          </div>}
        {phase==="review" && missing.length>0 &&
          <div className="mt-3 bg-amber-50 border border-amber-200 rounded-xl p-3 text-sm text-amber-800">
            ⚠️ Fast geschafft! Bitte filme noch: <b>{missing.join(", ")}</b>.
            <button onClick={()=>evaluate(true)} className="w-full mt-2 bg-emerald-600 text-white rounded-xl py-2.5 font-semibold">🎥 {missing[0]}-Video nachreichen</button>
          </div>}
        {phase==="done" &&
          <div className="mt-3 bg-emerald-50 border border-emerald-200 rounded-xl p-3 text-sm text-emerald-700">✅ Alle Elemente erkannt! Dein Video wird zur Freigabe vorgelegt – bei sauberem Zustand bekommst du 20 € zurück.</div>}
      </Card>
      <button onClick={()=>setStep("code")} className="text-xs text-slate-400 w-full text-center">← zurück</button>
    </div>
  );
}

  );
}

/* ============================ SHELL ============================ */
const NAV=[["over","Cockpit","📊"],["res","Reservierungen","📅"],["rooms","Zimmer","🛏"],["checkins","Check-ins","🪪"],["ext","Verlängerungen","📩"],["clean","Reinigung","🧹"],["rev","Auslastung & Umsatz","💶"],["set","Einstellungen","⚙️"]];
function App() {
  const [view,setView]=useState("over");

  const go=(v)=>{const map={res:"res",checkins:"checkins",ext:"ext",clean:"clean"};setView(map[v]||v);};
  const Body = guest ? <Guest/> : {
    over:<Overview go={go}/>, res:<Reservations/>, rooms:<Rooms/>, checkins:<CheckIns/>, ext:<Extensions/>, clean:<Cleaning/>, rev:<Revenue/>, set:<Settings/>
  }[view];
  return (
    <div className="min-h-screen">
      <header className="bg-slate-900 text-white">
        <div className="max-w-7xl mx-auto px-4 py-3 flex items-center justify-between">
          <div className="flex items-center gap-3">
            <div className="w-9 h-9 rounded-xl bg-blue-600 flex items-center justify-center">🛡</div>
            <div><div className="font-bold leading-tight">Monteur Check-In</div><div className="text-xs text-slate-400">JJ Real Estate · Rework-Prototyp</div></div>
          </div>
          <div className="flex items-center gap-2 text-sm">
            <button onClick={()=>setGuest(g=>!g)} className={"px-3 py-1.5 rounded-lg font-semibold "+(guest?"bg-emerald-600":"bg-white/10")}>{guest?"← Admin":"👤 Gäste-Ansicht"}</button>
            <span className="text-slate-300 hidden sm:inline">vangompel@jjrealestate.de</span>
          </div>
        </div>
        {!guest && <nav className="max-w-7xl mx-auto px-2 flex gap-1 overflow-x-auto">
          {NAV.map(([k,l,ic])=>(
            <button key={k} onClick={()=>setView(k)} className={"px-3 py-2.5 text-sm whitespace-nowrap border-b-2 "+(view===k?"border-blue-500 text-white font-semibold":"border-transparent text-slate-400 hover:text-white")}>{ic} {l}</button>
          ))}
        </nav>}
      </header>
      <main className="max-w-7xl mx-auto px-4 py-6">{Body}</main>
      <footer className="text-center text-xs text-slate-400 py-6">Prototyp · Demo-Daten · {new Date().getFullYear()} Monteurshäuser Management GmbH</footer>
    </div>

}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
