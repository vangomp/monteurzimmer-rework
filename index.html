const SUPABASE_URL = "https://nwsbkujlupugktzfrwdb.supabase.co";
const SUPABASE_KEY = "sb_publishable_UsM1ZkBCRBr5Nuiq7akc2A_W_K8bn_h";
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
// IMMODAY hub (for posting rework to-dos)
const sbImmo = window.supabase.createClient("https://xytmbhbkridbepeyhfml.supabase.co", "sb_publishable_30rTTC6kZWRG5u7466wSVw_4l9P9G4D");

/* ---------- helpers ---------- */
const TODAY = new Date(new Date().toDateString());
const fmt = (d) => d ? new Date(d).toLocaleDateString("de-DE",{day:"2-digit",month:"2-digit",year:"numeric"}) : "—";
const fmtShort = (d) => d ? new Date(d).toLocaleDateString("de-DE",{day:"2-digit",month:"2-digit"}) : "—";
const daysFromToday = (d) => Math.round((new Date(new Date(d).toDateString()) - TODAY)/86400000);
const genCode = () => "M"+Array.from({length:5},()=>"ABCDEFGHJKLMNPQRSTUVWXYZ23456789"[Math.floor(Math.random()*32)]).join("");
const roomShort = (rn) => rn ? rn.split("|")[0].trim() : "—";

const stayOf = (r) => { if (r.archived_at) return "left"; const dl = daysFromToday(r.check_out_date);
  if (dl < 0) return "overdue"; if (dl <= 3) return "leaving"; return "active"; };
const stayBadge = (s) => ({ active:["Läuft","bg-emerald-100 text-emerald-700"], leaving:["Läuft aus","bg-amber-100 text-amber-700"],
  overdue:["Überfällig","bg-rose-100 text-rose-700"], left:["Archiviert","bg-slate-100 text-slate-500"] }[s]||["—","bg-slate-100 text-slate-500"]);

/* ---------- UI atoms ---------- */
const Card = ({children, className=""}) => <div className={"bg-white rounded-2xl shadow-sm border border-slate-200 "+className}>{children}</div>;
const Pill = ({text, cls}) => <span className={"px-2.5 py-0.5 rounded-full text-xs font-semibold "+cls}>{text}</span>;
const Battery = ({v}) => { const c=v<25?"text-rose-600":v<50?"text-amber-600":"text-emerald-600"; return <span className={"font-bold "+c}>{v}%</span>; };
const Btn = ({children,onClick,kind="primary",size="md",type="button"}) => {
  const k={primary:"bg-blue-600 text-white hover:bg-blue-700",ok:"bg-emerald-600 text-white hover:bg-emerald-700",
    danger:"bg-rose-600 text-white hover:bg-rose-700",ghost:"bg-slate-100 text-slate-600 hover:bg-slate-200",
    soft:"bg-slate-200 text-slate-700 hover:bg-slate-300"}[kind];
  const s={sm:"px-2.5 py-1 text-xs",md:"px-3 py-1.5 text-sm",lg:"px-4 py-2 text-sm"}[size];
  return <button type={type} onClick={onClick} className={"rounded-lg font-semibold transition-colors "+k+" "+s}>{children}</button>;
};
const IconBtn = ({title,onClick,children,color="text-slate-500"}) =>
  <button onClick={onClick} title={title} className={"px-1.5 py-1 rounded hover:bg-slate-100 "+color}>{children}</button>;
function Modal({title,onClose,children}) {
  return (
    <div className="fixed inset-0 bg-black/40 flex items-center justify-center z-50 p-4" onClick={onClose}>
      <div className="bg-white rounded-2xl shadow-xl w-full max-w-lg max-h-[90vh] overflow-auto" onClick={e=>e.stopPropagation()}>
        <div className="flex items-center justify-between px-5 py-3 border-b border-slate-100 sticky top-0 bg-white">
          <h3 className="font-semibold text-slate-800">{title}</h3>
          <button onClick={onClose} className="text-slate-400 hover:text-slate-700 text-xl leading-none">×</button>
        </div>
        <div className="p-5">{children}</div>
      </div>
    </div>
  );
}
const Field = ({label,children}) => <label className="block mb-3"><span className="text-xs text-slate-500">{label}</span>{children}</label>;
const inputCls = "w-full border border-slate-300 rounded-lg px-3 py-2 text-sm mt-1 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none";
const PageHead = ({title,sub,right}) => (
  <div className="flex items-end justify-between flex-wrap gap-2">
    <div><h1 className="text-2xl font-bold text-slate-800">{title}</h1>{sub&&<p className="text-slate-500 text-sm">{sub}</p>}</div>
    {right}
  </div>
);
const Skeleton = () => <div className="space-y-3">{[0,1,2].map(i=><div key={i} className="skel h-16"/>)}</div>;
const Empty = ({children}) => <Card className="p-8 text-center text-slate-400">{children}</Card>;

/* ---------- toast ---------- */
let toastFn = ()=>{};
function Toasts(){
  const [msgs,setMsgs]=useState([]);
  toastFn=(text,kind="ok")=>{const id=Math.random();setMsgs(m=>[...m,{id,text,kind}]);setTimeout(()=>setMsgs(m=>m.filter(x=>x.id!==id)),3200);};
  return <div className="fixed bottom-4 right-4 z-[60] space-y-2">{msgs.map(m=>(
    <div key={m.id} className={"px-4 py-2 rounded-xl text-sm font-medium shadow-lg text-white "+(m.kind==="err"?"bg-rose-600":"bg-slate-800")}>{m.text}</div>))}</div>;
}
const toast=(t,k)=>toastFn(t,k);
const err=(e)=>{ console.error(e); toast((e&&e.message)||"Fehler","err"); };

/* ============================ LOGIN ============================ */
function Login({onGuest}) {
  const [email,setEmail]=useState(""),[pw,setPw]=useState(""),[busy,setBusy]=useState(false);
  const login=async()=>{ if(!email||!pw) return toast("E-Mail & Passwort nötig","err"); setBusy(true);
    const {error}=await sb.auth.signInWithPassword({email,password:pw}); setBusy(false); if(error) err(error); };
  return (
    <div className="min-h-screen flex items-center justify-center p-4">
      <div className="w-full max-w-sm">
        <div className="bg-slate-900 rounded-t-3xl p-6 text-center">
          <div className="w-14 h-14 rounded-2xl bg-blue-600 mx-auto flex items-center justify-center text-2xl">🛡</div>
          <h2 className="text-white font-bold text-xl mt-3">Monteur Check-In</h2><p className="text-slate-400 text-sm">Admin-Anmeldung</p>
        </div>
        <div className="bg-white rounded-b-3xl p-6 shadow-lg">
          <Field label="E-Mail"><input className={inputCls} type="email" value={email} onChange={e=>setEmail(e.target.value)} onKeyDown={e=>e.key==="Enter"&&login()}/></Field>
          <Field label="Passwort"><input className={inputCls} type="password" value={pw} onChange={e=>setPw(e.target.value)} onKeyDown={e=>e.key==="Enter"&&login()}/></Field>
          <Btn onClick={login} size="lg">{busy?"Anmelden…":"Anmelden"}</Btn>
          <div className="text-center mt-4 pt-4 border-t border-slate-100">
            <button onClick={onGuest} className="text-sm text-blue-700 font-semibold">Ich bin Gast → Check-in mit Code</button>
          </div>
        </div>
      </div>
    </div>
  );
}

/* ============================ DATA ============================ */
function useList(loader, deps=[]) {
  const [data,setData]=useState(null);
  const reload=useCallback(async()=>{ try{ setData(await loader()); }catch(e){ err(e); setData([]); } },deps);
  useEffect(()=>{ let on=true; (async()=>{ try{ const d=await loader(); if(on)setData(d); }catch(e){ err(e); if(on)setData([]); } })(); return ()=>on=false; },deps);
  return [data,reload];
}
const IMMODAY_PROJECTS=[{id:"MÜ-GS6",name:"Gambacher Straße 6, Münzenberg"},{id:"KÖ-FWS17",name:"Friedrich-Winter-Str. 17, Kölschhausen"},{id:"EH-WS20",name:"Wetzlarer Straße 20, Ehringshausen"},{id:"LI-ANH51",name:"Alt Niederhofheim 51, Liederbach"},{id:"AS-HS14",name:"Hauptstraße 14, Aßlar-Werdorf"},{id:"BU-GW15",name:"Gambacher Weg 15, Butzbach"},{id:"LE-GS52",name:"Gorkistraße 52, Leipzig"},{id:"LE-LS51",name:"Löbauer Straße 51, Leipzig"},{id:"RA-LW2A",name:"Lössener Weg 2a, Rackwitz"},{id:"EI-KP7",name:"Karlsplatz 7 (Karlshalle), Eisenach"},{id:"P-SELIG",name:"Baustelle Seligenstadt"},{id:"P-FOERDER",name:"Förderstrategie Sanierung"},{id:"P-AI",name:"AI Automatisierung"},{id:"P-STAMM",name:"immocation STAMMTISCH Frankfurt"}];
const loaders = {
  rooms: ()=> sb.from("rooms").select("*, cleaning_objekte(code,name)").order("room_number").then(r=>r.data||[]),
  roomsMin: ()=> sb.from("rooms").select("id,room_number,capacity").order("room_number").then(r=>r.data||[]),
  objekte: ()=> sb.from("cleaning_objekte").select("id,code,name,address,immoday_project_id,inspection_items").order("code").then(r=>r.data||[]),
  reservations: ()=> sb.from("reservations").select("*, rooms(room_number, capacity, cleaning_objekte(code))").order("check_in_date",{ascending:false}).then(r=>r.data||[]),
  checkins: ()=> sb.from("check_ins").select("*, reservations(code, guest_name, preferred_language, check_in_date, check_out_date, rooms(room_number, cleaning_objekte(name,address))), additional_guests(*)").order("checked_in_at",{ascending:false}).limit(50).then(r=>r.data||[]),
  extensions: ()=> sb.from("extension_requests").select("*, check_ins(full_name, reservations(code, room_id, check_out_date, rooms(room_number)))").order("created_at",{ascending:false}).then(r=>r.data||[]),
  nuki: ()=> sb.from("nuki_lock_status").select("lock_name,battery_charge,battery_critical,last_checked_at").order("lock_name").then(r=>r.data||[]),
  orders: ()=> sb.from("cleaning_orders").select("*, cleaning_objekte(code,name)").is("archived_at",null).order("created_at",{ascending:false}).then(r=>r.data||[]),
  reports: ()=> sb.from("cleaning_reports").select("*, cleaning_objekte(code,name)").order("submitted_at",{ascending:false}).limit(40).then(r=>r.data||[]),
  settings: ()=> sb.from("settings").select("*").then(r=>r.data||[]),
  issues: ()=> sb.from("guest_issues").select("*").order("created_at",{ascending:false}).then(r=>r.data||[]),
  qonto: ()=> sb.from("qonto_invoices").select("*").order("issue_date",{ascending:false}).then(r=>r.data||[]),
};

/* ============================ COCKPIT ============================ */
function Cockpit({go,bump}) {
  const [rooms]=useList(loaders.rooms,[bump]);
  const [res]=useList(loaders.reservations,[bump]);
  const [nuki,reloadNuki]=useList(loaders.nuki,[bump]);
  const [ext]=useList(loaders.extensions,[bump]);
  const [issues]=useList(loaders.issues,[bump]);
  const [qi]=useList(loaders.qonto,[bump]);
  if(!rooms||!res||!nuki||!ext||!issues||!qi) return <Skeleton/>;
  const active=res.filter(r=>!r.archived_at && daysFromToday(r.check_in_date)<=0); // checked in, incl. überfällig
  const overdue=res.filter(r=>!r.archived_at && daysFromToday(r.check_in_date)<=0 && daysFromToday(r.check_out_date)<0);
  const leaving=active.filter(r=>{const d=daysFromToday(r.check_out_date);return d>=0&&d<=3;});
  const free=rooms.filter(r=>r.status==="available").length;
  const lowBat=nuki.filter(n=>n.battery_charge<25);
  const pendExt=ext.filter(e=>e.status==="pending");
  // ---- metrics (archived bookings included for historical stats) ----
  const dayMs=86400000, D=(d)=>new Date(d);
  const nightsIn=(r,s,e)=>{const a=D(r.check_in_date),b=D(r.check_out_date);const st=Math.max(a,s),en=Math.min(b,e);return Math.max(0,Math.round((en-st)/dayMs));};
  const occWin=(s,e)=>{const days=Math.max(1,Math.round((e-s)/dayMs));const cap=rooms.length*days;if(!cap)return 0;const used=res.reduce((a,r)=>a+(r.room_id?nightsIn(r,s,e):0),0);return Math.round(used/cap*100);};
  const yStart=new Date(TODAY.getFullYear(),0,1);
  const lmStart=new Date(TODAY.getFullYear(),TODAY.getMonth()-1,1), lmEnd=new Date(TODAY.getFullYear(),TODAY.getMonth(),1);
  const fwd=(n)=>occWin(TODAY,new Date(TODAY.getTime()+n*dayMs));
  const stayLen=(r)=>Math.max(0,Math.round((D(r.check_out_date)-D(r.check_in_date))/dayMs));
  const avg=(arr,f)=>arr.length?Math.round(arr.reduce((a,x)=>a+f(x),0)/arr.length*10)/10:0;
  const ytdRes=res.filter(r=>D(r.check_in_date)>=yStart && D(r.check_in_date)<=TODAY);
  const lmRes=res.filter(r=>D(r.check_in_date)>=lmStart && D(r.check_in_date)<lmEnd);
  const occToday=rooms.length?Math.round(rooms.filter(r=>r.status==="occupied").length/rooms.length*100):0;
  const occRooms=rooms.filter(r=>r.status==="occupied");
  const avgCap=occRooms.length?Math.round(occRooms.reduce((a,r)=>a+(r.capacity||1),0)/occRooms.length*10)/10:0;
  const ytdNights=res.reduce((a,r)=>a+(r.room_id?nightsIn(r,yStart,TODAY):0),0);
  const invActive=qi.filter(x=>(x.status||"").toLowerCase()!=="canceled");
  const invoicedTotal=invActive.reduce((a,x)=>a+(+x.amount||0),0);
  const openInv=qi.filter(x=>["unpaid","overdue","pending","draft"].includes((x.status||"").toLowerCase()));
  const openInvSum=Math.round(openInv.reduce((a,x)=>a+(+x.amount||0),0));
  const eurNight=qi.length&&ytdNights?Math.round(invoicedTotal/ytdNights):null;
  const todo=[];
  if(leaving.length) todo.push(["⏳",`${leaving.length} Aufenthalt(e) laufen in ≤3 Tagen aus`,"Reservierungen",()=>go("res"),"amber"]);
  if(overdue.length) todo.push(["⚠️",`${overdue.length} Aufenthalt(e) überfällig`,"Anzeigen",()=>go("res"),"rose"]);
  if(pendExt.length) todo.push(["📩",`${pendExt.length} offene Verlängerungs-Anfrage(n)`,"Freigeben",()=>go("ext"),"blue"]);
  const openIssues=issues.filter(i=>i.status!=="done");
  if(openIssues.length) todo.push(["📨",`${openIssues.length} neue Problem-Meldung(en)`,"Meldungen",()=>go("msg"),"blue"]);
  lowBat.forEach(n=>todo.push(["🔋",`Nuki-Akku niedrig: ${n.lock_name} (${n.battery_charge}%)`,"Reinigung",()=>go("clean"),"rose"]));
  const doorBatDue=rooms.filter(r=>{const d=r.door_battery_changed_at;return d && (Date.now()-new Date(d))/86400000>180;});
  if(doorBatDue.length) todo.push(["🔋",`${doorBatDue.length} Zimmer: Türschloss-Akku fällig (>6 Mon.)`,"Zimmer",()=>go("rooms"),"amber"]);
  if(!todo.length) todo.push(["✅","Nichts Dringendes – alles im grünen Bereich.","",null,"emerald"]);
  const toneCls={amber:"border-amber-300 bg-amber-50",rose:"border-rose-300 bg-rose-50",blue:"border-blue-300 bg-blue-50",emerald:"border-emerald-300 bg-emerald-50"};
  return (
    <div className="space-y-6">
      <PageHead title="Cockpit" sub="Live aus Supabase."/>
      <div className="grid grid-cols-2 lg:grid-cols-4 gap-4">
        {[["Belegung heute",occToday+"%",`${rooms.filter(r=>r.status==="occupied").length}/${rooms.length} Zimmer`,"occ"],
          ["Ø Belegung YTD",occWin(yStart,TODAY)+"%","seit Jahresbeginn","occ"],
          ["Ø Belegung Vormonat",occWin(lmStart,lmEnd)+"%","letzter Monat","occ"],
          ["Aktive Gäste",active.length,"inkl. überfällig","res"]
        ].map((k,i)=><button key={i} onClick={()=>go(k[3])} className="text-left"><Card className="p-5 hover:shadow-md transition-shadow"><div className="text-2xl font-bold text-slate-800">{k[1]}</div><div className="text-xs text-slate-500">{k[0]} · {k[2]}</div></Card></button>)}
      </div>
      <div className="grid grid-cols-2 lg:grid-cols-4 gap-4">
        {[["Prognose Belegung 10 T.",fwd(10)+"%"],["Prognose 30 T.",fwd(30)+"%"],["Prognose 60 T.",fwd(60)+"%"],["Ø Bleibedauer YTD",avg(ytdRes,stayLen)+" N."]
        ].map((k,i)=><Card key={i} className="p-5"><div className="text-2xl font-bold text-slate-800">{k[1]}</div><div className="text-xs text-slate-500">{k[0]}</div></Card>)}
      </div>
      <div className="grid grid-cols-2 lg:grid-cols-4 gap-4">
        {[["Ø Bleibedauer Vormonat",avg(lmRes,stayLen)+" N.",true],["Ø Plätze/Zimmer (belegt)",avgCap||"—",true],
          ["Ø €/Nacht",eurNight!=null?"€ "+eurNight:"€ —",qi.length>0],
          ["Offene Rechnungsposten",qi.length?`${openInv.length} · €${openInvSum}`:"—",qi.length>0]
        ].map((k,i)=><Card key={i} className="p-5"><div className={"text-2xl font-bold "+(k[2]?"text-slate-800":"text-slate-400")}>{k[1]}</div><div className="text-xs text-slate-500">{k[0]}{!k[2]?" · Qonto folgt":""}</div></Card>)}
      </div>
      <Card className="p-5">
        <h2 className="font-semibold text-slate-800 mb-3">🎯 To-do</h2>
        <div className="space-y-2">{todo.map((t,i)=>(
          <div key={i} className={"flex items-center justify-between gap-3 border rounded-xl px-4 py-3 "+toneCls[t[4]]}>
            <div className="flex items-center gap-3"><span className="text-xl">{t[0]}</span><span className="text-sm font-medium text-slate-700">{t[1]}</span></div>
            {t[3]&&<button onClick={t[3]} className="text-sm font-semibold text-blue-700 whitespace-nowrap hover:underline">{t[2]} →</button>}
          </div>))}</div>
      </Card>
      <Card className="p-5">
        <div className="flex items-center justify-between mb-3"><h2 className="font-semibold text-slate-800">🔒 Smart-Lock-Status (Nuki)</h2><button onClick={()=>{reloadNuki();toast("Nuki-Akkus aktualisiert");}} title="Akkustände neu laden" className="text-xs px-2.5 py-1 rounded-lg bg-slate-100 text-slate-600 hover:bg-slate-200 font-semibold">↻ Akkus</button></div>
        {!nuki.length? <p className="text-sm text-slate-400">Keine Lock-Daten.</p> :
        <div className="grid sm:grid-cols-2 lg:grid-cols-3 gap-2">{nuki.map((l,i)=>(
          <div key={i} className={"rounded-xl px-3 py-2 border "+(l.battery_charge<25?"border-rose-200 bg-rose-50":l.battery_charge<50?"border-amber-200 bg-amber-50":"border-emerald-200 bg-emerald-50")}>
            <div className="text-sm font-medium text-slate-700">{l.lock_name}</div>
            <div className="flex justify-between text-xs"><Battery v={l.battery_charge}/><span className="text-slate-400">{l.battery_critical?"kritisch":fmtShort(l.last_checked_at)}</span></div>
          </div>))}</div>}
      </Card>
    </div>
  );
}

/* ============================ RESERVATIONS ============================ */
function Reservations({bump}) {
  const [rows,reload]=useList(loaders.reservations,[bump]);
  const [roomOpts]=useList(loaders.roomsMin,[bump]);
  const [edit,setEdit]=useState(null);
  const [filter,setFilter]=useState("active");
  const [q,setQ]=useState("");
  const [sort,setSort]=useState({key:"in",dir:"desc"});
  if(!rows) return <Skeleton/>;
  const counts={ active:rows.filter(r=>!r.archived_at).length, archived:rows.filter(r=>r.archived_at).length, all:rows.length };
  const ql=q.trim().toLowerCase();
  const shown=rows.filter(r=>{
    const inFilter = filter==="all"?true:filter==="archived"?r.archived_at:!r.archived_at;
    if(!inFilter) return false;
    if(!ql) return true;
    return [r.guest_name,r.code,r.guest_email].some(v=>(v||"").toLowerCase().includes(ql));
  });
  const acc={guest:r=>(r.guest_name||"").toLowerCase(),room:r=>roomShort(r.rooms?.room_number),in:r=>r.check_in_date||"",out:r=>r.check_out_date||"",channel:r=>(r.contact_channel||"")};
  const sorted=[...shown].sort((a,b)=>{const f=acc[sort.key];if(!f)return 0;const av=f(a),bv=f(b);return (av<bv?-1:av>bv?1:0)*(sort.dir==="asc"?1:-1);});
  const Th=({k,children})=>{const on=sort.key===k;return <th onClick={()=>setSort(s=>({key:k,dir:on&&s.dir==="asc"?"desc":"asc"}))} className="text-left p-3 cursor-pointer select-none hover:text-slate-700 whitespace-nowrap">{children}{on?(sort.dir==="asc"?" ▲":" ▼"):""}</th>;};
  const save=async(form)=>{ try{
    const payload={ guest_name:form.guest_name, guest_email:form.guest_email||null, room_id:form.room_id||null,
      check_in_date:form.check_in_date, check_out_date:form.check_out_date, contact_channel:form.contact_channel||null, preferred_language:form.preferred_language||"de",
      persons:form.persons?Number(form.persons):null, status:form.status||"confirmed" };
    if(edit==="new"){ payload.code=genCode(); const {error}=await sb.from("reservations").insert(payload); if(error) throw error; toast("Reservierung angelegt"); }
    else { const {error}=await sb.from("reservations").update(payload).eq("id",edit.id); if(error) throw error; toast("Gespeichert"); }
    setEdit(null); reload(); }catch(e){ err(e); } };
  const del=async(r)=>{ if(!confirm(`Reservierung ${r.code} (${r.guest_name||"—"}) löschen?\n\nTipp: Zum „Beenden" lieber archivieren. Löschen nur bei Fehlanlage. (1/2)`))return;

  const toggleQonto=async(r)=>{ const {error}=await sb.from("reservations").update({qonto_billed:!r.qonto_billed}).eq("id",r.id); if(error)return err(error); reload(); };
  const confirmRes=async(r)=>{ const {error}=await sb.from("reservations").update({status:"confirmed"}).eq("id",r.id); if(error)return err(error); toast("Reservierung bestätigt"); reload(); };
  return (
    <div className="space-y-4">

      <div className="flex items-center gap-2 flex-wrap">

        <input value={q} onChange={e=>setQ(e.target.value)} placeholder="🔍 Name, Code, E-Mail…" className="flex-1 min-w-[180px] border border-slate-300 rounded-lg px-3 py-1.5 text-sm"/>
      </div>
      <Card className="overflow-x-auto">
        <table className="w-full text-sm">
          <thead className="bg-slate-50 text-slate-500 text-xs uppercase"><tr>

            <Th k="out">Aufenthalt</Th><Th k="channel">Kanal</Th><th className="text-center p-3">Qonto</th><th className="text-right p-3">Aktionen</th>
          </tr></thead>
          <tbody>{sorted.map(r=>{const[bt,bc]=stayBadge(stayOf(r));const dl=daysFromToday(r.check_out_date);return(
            <tr key={r.id} className={"border-t border-slate-100 hover:bg-slate-50"+(r.status==="provisional"?" bg-amber-50":"")}>
              <td className="p-3"><div className="font-semibold text-slate-800">{r.guest_name||"—"}{r.status==="provisional"&&<span className="ml-1"><Pill text="Vorläufig" cls="bg-amber-100 text-amber-700"/></span>}</div><div className="text-xs text-slate-400">{r.code} · {r.guest_email||"—"}</div></td>
              <td className="p-3 text-slate-600">{roomShort(r.rooms?.room_number)}{r.persons?<span className={"ml-1 text-xs font-medium "+(r.rooms?.capacity&&r.persons>=r.rooms.capacity?"text-emerald-600":"text-amber-600")}>· {r.persons}{r.rooms?.capacity?`/${r.rooms.capacity}`:""}P</span>:null}</td>
              <td className="p-3 text-slate-600 whitespace-nowrap">{fmtShort(r.check_in_date)} – {fmtShort(r.check_out_date)}</td>
              <td className="p-3"><Pill text={bt+(!r.archived_at&&dl>=0&&dl<=14?` · ${dl}d`:"")} cls={bc}/></td>
              <td className="p-3 text-slate-600">{r.contact_channel||"—"}</td>
              <td className="p-3 text-center"><input type="checkbox" checked={!!r.qonto_billed} onChange={()=>toggleQonto(r)} className="w-4 h-4 accent-blue-600" title="Rechnung in Qonto erstellt"/></td>
              <td className="p-3 text-right whitespace-nowrap">
                {r.status==="provisional"&&<IconBtn title="Fest bestätigen" color="text-emerald-600" onClick={()=>confirmRes(r)}>✓</IconBtn>}
                <IconBtn title="Bearbeiten" color="text-blue-600" onClick={()=>setEdit(r)}>✏️</IconBtn>
                <IconBtn title={r.archived_at?"Wiederherstellen":"Archivieren"} color="text-amber-600" onClick={()=>archive(r)}>{r.archived_at?"↩️":"📦"}</IconBtn>
                <IconBtn title="Löschen" color="text-rose-600" onClick={()=>del(r)}>🗑</IconBtn>
              </td>
            </tr>);})}
            {!shown.length&&<tr><td colSpan="7" className="p-6 text-center text-slate-400">Keine Treffer.</td></tr>}
          </tbody>
        </table>
      </Card>
      <p className="text-xs text-slate-400">Qonto-Checkbox = manuell „Rechnung erstellt". Geplant: Auto-Abgleich + „Rechnung in Qonto erstellen".</p>
      {edit&&<ResForm rec={edit==="new"?null:edit} rooms={roomOpts||[]} reservations={rows} onSave={save} onClose={()=>setEdit(null)}/>}
    </div>
  );
}
function ResForm({rec,rooms,reservations,onSave,onClose}) {
  const [f,setF]=useState({ guest_name:rec?.guest_name||"", guest_email:rec?.guest_email||"", room_id:rec?.room_id||"",
    check_in_date:rec?.check_in_date||"", check_out_date:rec?.check_out_date||"", contact_channel:rec?.contact_channel||"", preferred_language:rec?.preferred_language||"de",
    persons:rec?.persons??"", status:rec?.status||"confirmed" });
  const u=(k,v)=>setF(s=>({...s,[k]:v}));
  const selRoom=rooms.find(r=>String(r.id)===String(f.room_id));
  const cap=selRoom?.capacity||null;
  const pers=Number(f.persons)||0;
  const validRange=f.check_in_date&&f.check_out_date&&f.check_in_date<f.check_out_date;
  // Rooms occupied in the chosen range. Half-open intervals: a room whose check_out is the new check_in is free.
  const conflictIds=new Set();
  if(validRange) (reservations||[]).forEach(r=>{ if(!r.room_id||r.archived_at||String(r.id)===String(rec?.id))return;
    if(r.check_in_date&&r.check_out_date&&r.check_in_date<f.check_out_date&&r.check_out_date>f.check_in_date) conflictIds.add(String(r.room_id)); });
  const availRooms=validRange?rooms.filter(r=>!conflictIds.has(String(r.id))):rooms;
  const selUnavailable=validRange&&f.room_id&&conflictIds.has(String(f.room_id));
  const addDays=(d,n)=>{ const x=new Date(d+"T00:00:00"); x.setDate(x.getDate()+n); return x.toISOString().slice(0,10); };
  const setDur=(n)=>setF(s=>{ const start=s.check_in_date||new Date().toISOString().slice(0,10); return {...s,check_in_date:start,check_out_date:addDays(start,n)}; });
  return (
    <Modal title={rec?`Reservierung ${rec.code}`:"Neue Reservierung"} onClose={onClose}>
      <Field label="Zeitraum (Aufenthalt)">
        <div className="grid grid-cols-2 gap-3">
          <div><div className="text-xs text-slate-400 mb-1">Von (Check-in)</div><input type="date" className={inputCls} value={f.check_in_date} onChange={e=>u("check_in_date",e.target.value)}/></div>
          <div><div className="text-xs text-slate-400 mb-1">Bis (Check-out)</div><input type="date" className={inputCls} min={f.check_in_date||undefined} value={f.check_out_date} onChange={e=>u("check_out_date",e.target.value)}/></div>
        </div>
        <div className="flex flex-wrap gap-1 mt-2"><span className="text-xs text-slate-400 mr-1">Dauer ab Check-in:</span>{[["1 Woche",7],["2 Wochen",14],["4 Wochen",28],["3 Monate",90]].map(([l,n])=><button key={l} type="button" onClick={()=>setDur(n)} className="text-xs px-2 py-1 rounded-lg bg-slate-100 text-slate-600 font-semibold">+{l}</button>)}</div>
        {f.check_in_date&&f.check_out_date&&f.check_in_date>=f.check_out_date&&<p className="text-xs text-rose-600 mt-1">Check-out muss nach Check-in liegen.</p>}
      </Field>
      <Field label="Gast / Firma"><input className={inputCls} value={f.guest_name} onChange={e=>u("guest_name",e.target.value)}/></Field>
      <Field label="E-Mail"><input className={inputCls} value={f.guest_email} onChange={e=>u("guest_email",e.target.value)}/></Field>
      <Field label="Zimmer (nur im Zeitraum freie)"><select className={inputCls} value={f.room_id} onChange={e=>{const v=e.target.value;setF(s=>{const rm=rooms.find(x=>String(x.id)===String(v));return {...s,room_id:v,persons:s.persons||(rm?.capacity||"")};});}}>
        <option value="">{validRange?"— freies Zimmer wählen —":"— erst Zeitraum wählen —"}</option>
        {availRooms.map(r=><option key={r.id} value={r.id}>{r.room_number}{r.capacity?` (max ${r.capacity}P)`:""}</option>)}
        {selUnavailable&&selRoom&&<option value={f.room_id}>{selRoom.room_number} ⚠ im Zeitraum belegt</option>}</select>
        {validRange&&<p className={"text-xs mt-1 "+(availRooms.length?"text-slate-400":"text-rose-600")}>{availRooms.length} von {rooms.length} Zimmern im Zeitraum frei.</p>}
      </Field>
      <Field label="Belegung (Personen)">
        <input type="number" min="1" max={cap||undefined} className={inputCls} value={f.persons} onChange={e=>u("persons",e.target.value)} placeholder={cap?`max ${cap}`:"Anzahl Personen"}/>
        {cap?<p className={"text-xs mt-1 font-medium "+(pers>=cap?"text-emerald-600":pers>0?"text-amber-600":"text-slate-400")}>{pers?`${pers} von ${cap} Plätzen · ${pers>=cap?"voll belegt":"teilweise belegt"}`:`Zimmer für max. ${cap} Personen`}</p>:null}
      </Field>
      <div className="grid grid-cols-2 gap-3">
        <Field label="Kanal"><select className={inputCls} value={f.contact_channel} onChange={e=>u("contact_channel",e.target.value)}>
          <option value="">—</option><option>WhatsApp</option><option>SMS</option><option>E-Mail</option></select></Field>
        <Field label="Sprache"><select className={inputCls} value={f.preferred_language} onChange={e=>u("preferred_language",e.target.value)}>
          <option value="de">DE</option><option value="en">EN</option><option value="cs">CS</option><option value="sk">SK</option><option value="ru">RU</option></select></Field>
      </div>
      <label className="flex items-center gap-2 text-sm text-slate-600 mt-1 cursor-pointer">
        <input type="checkbox" checked={f.status==="provisional"} onChange={e=>u("status",e.target.checked?"provisional":"confirmed")} className="w-4 h-4 accent-amber-500"/>
        Vorläufige Reservierung (Anfrage – hält den Platz, noch nicht fest gebucht)
      </label>
      <div className="flex justify-end gap-2 mt-2"><Btn kind="soft" onClick={onClose}>Abbrechen</Btn>
        <Btn kind="ok" onClick={()=>{ if(!f.guest_name||!f.check_in_date||!f.check_out_date) return toast("Name + Zeitraum nötig","err");
          if(f.check_in_date>=f.check_out_date) return toast("Check-out muss nach Check-in liegen","err");
          if(selUnavailable) return toast("Zimmer ist im gewählten Zeitraum belegt","err"); onSave(f); }}>Speichern</Btn></div>
    </Modal>
  );
}

function Rooms({bump}) {

    return l.find(r=>daysFromToday(r.check_in_date)<=0&&daysFromToday(r.check_out_date)>=0) || l.slice().sort((a,b)=>new Date(b.check_out_date)-new Date(a.check_out_date))[0]; };

  const del=async(r)=>{ if(!confirm(`Zimmer ${r.room_number} löschen?`))return;
    const {error}=await sb.from("rooms").delete().eq("id",r.id); if(error)return err(error); toast("Gelöscht"); reload(); };
  const groups={}; rows.forEach(r=>{const c=r.cleaning_objekte?.code||"Ohne Haus";(groups[c]=groups[c]||[]).push(r);});

          <table className="w-full text-sm">
            <tbody>{list.map(r=>{const[pt,pc]=({occupied:["Belegt","bg-blue-100 text-blue-700"],available:["Frei","bg-emerald-100 text-emerald-700"],maintenance:["Wartung","bg-slate-200 text-slate-600"]}[r.status]||["—","bg-slate-100"]);return(
              <tr key={r.id} className="border-t border-slate-100 hover:bg-slate-50">
                <td className="p-3"><div className="font-semibold text-slate-800">{r.room_number}</div>{(()=>{const o=occupant(r.id);return o?<div className="text-xs font-medium text-blue-700">🏢 {o.guest_name||o.code} <span className={"font-normal "+(daysFromToday(o.check_out_date)<0?"text-rose-500":"text-slate-400")}>bis {fmtShort(o.check_out_date)}</span></div>:(r.status==="occupied"?<div className="text-xs text-slate-400">belegt · keine Buchung zugeordnet</div>:null);})()}</td>

function Extensions({bump}) {
  const [rows,reload]=useList(loaders.extensions,[bump]);
  if(!rows) return <Skeleton/>;
  const decide=async(e,ok)=>{ try{
    const {error}=await sb.from("extension_requests").update({status:ok?"approved":"rejected"}).eq("id",e.id); if(error)throw error;
    if(ok){ const resv=e.check_ins?.reservations; if(resv?.code && e.requested_checkout_date){ await sb.from("reservations").update({check_out_date:e.requested_checkout_date}).eq("code",resv.code); } }
    toast(ok?"Freigegeben – Auszug verschoben":"Abgelehnt"); reload(); }catch(er){err(er);} };
  return (
    <div className="space-y-4">
      <PageHead title="Verlängerungen" sub="Gast-Anfragen · Freigabe verschiebt den Auszugstermin."/>
      {!rows.length&&<Empty>Keine offenen Verlängerungs-Anfragen.</Empty>}
      {rows.map(e=>{const r=e.check_ins?.reservations;return(
        <Card key={e.id} className="p-4 flex flex-wrap items-center justify-between gap-3">
          <div><div className="font-semibold text-slate-800">{e.check_ins?.full_name||r?.code||"Gast"} <span className="text-xs text-slate-400 font-normal">· {roomShort(r?.rooms?.room_number)}</span></div>
            <div className="text-sm text-slate-500">Aktuell bis {fmt(r?.check_out_date)} → Wunsch: <b>{fmt(e.requested_checkout_date)}</b>{e.reason?` · ${e.reason}`:""}</div></div>
          {e.status==="pending"
            ? <div className="flex gap-2"><Btn kind="primary" onClick={()=>decide(e,true)}>Freigeben</Btn><Btn kind="soft" onClick={()=>decide(e,false)}>Ablehnen</Btn></div>
            : <Pill text={e.status==="approved"?"Freigegeben ✓":"Abgelehnt"} cls={e.status==="approved"?"bg-emerald-100 text-emerald-700":"bg-slate-200 text-slate-500"}/>}
        </Card>);})}
    </div>
  );
}

  const u=(k,v)=>setF(x=>({...x,[k]:v}));
  const save=async()=>{ if(!f.code.trim())return toast("Code nötig","err"); setBusy(true);
    const payload={code:f.code,name:f.name||null,address:f.address||null,immoday_project_id:f.immoday_project_id||null};

/* ============================ OCCUPANCY ============================ */
function Occupancy({bump}) {
  const [rooms]=useList(loaders.rooms,[bump]);
  const [res]=useList(loaders.reservations,[bump]);
  const [dim,setDim]=useState("total");
  const [sel,setSel]=useState("__all__");
  const [win,setWin]=useState(12);
  if(!rooms||!res) return <Skeleton/>;
  const roomHouse={}; rooms.forEach(r=>roomHouse[r.id]=r.cleaning_objekte?.code||"—");
  const roomCap={}; rooms.forEach(r=>roomCap[r.id]=r.capacity||1);
  const now=new Date(); const months=[];
  for(let i=-(win-4);i<4;i++){ const d=new Date(now.getFullYear(),now.getMonth()+i,1); months.push(`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`); }
  const mset=new Set(months);
  const md={}; months.forEach(m=>md[m]={total:0,byHouse:{},byCompany:{}});
  const houses=new Set(), companies=new Set();
  res.forEach(r=>{ if(!r.room_id||!r.check_in_date||!r.check_out_date) return;
    const house=roomHouse[r.room_id]||"—", comp=r.guest_name||r.code||"—", cap=roomCap[r.room_id]||1; houses.add(house); companies.add(comp);
    let d=new Date(r.check_in_date); const end=new Date(r.check_out_date); let g=0;
    while(d<end && g<400){ const m=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`;
      if(mset.has(m)){ md[m].total+=cap; md[m].byHouse[house]=(md[m].byHouse[house]||0)+cap; md[m].byCompany[comp]=(md[m].byCompany[comp]||0)+cap; }
      d.setDate(d.getDate()+1); g++; } });
  const srcOf=(m)=> dim==="house"?md[m].byHouse: dim==="company"?md[m].byCompany: null;
  const bedsTotal=rooms.reduce((a,r)=>a+(r.capacity||1),0);
  const bedsPerHouse={}; rooms.forEach(r=>{const h=roomHouse[r.id]||"—"; bedsPerHouse[h]=(bedsPerHouse[h]||0)+(r.capacity||1);});
  const daysInMonth=(m)=>{const a=m.split("-"); return new Date(+a[0],+a[1],0).getDate();};
  const capFor=()=> (dim==="house"&&sel!=="__all__")?(bedsPerHouse[sel]||0):bedsTotal;
  const nightsFor=(m)=>{ if(dim==="total") return md[m].total; const s=srcOf(m); return sel==="__all__"?Object.values(s).reduce((a,b)=>a+b,0):(s[sel]||0); };
  // Belegung pro Zimmer: belegte Zimmernächte / verfügbare Zimmernächte (Zimmer × Tage). Alle Zimmer vermietet = 100%.
  const valueFor=(m)=>{ const denom=capFor()*daysInMonth(m); return denom?Math.min(100,Math.round(nightsFor(m)/denom*100)):0; };
  const maxV=100;
  const options=dim==="house"?[...houses].sort(): dim==="company"?[...companies].sort():[];
  const breakdown={}; if(dim!=="total"){ months.forEach(m=>{ Object.entries(srcOf(m)).forEach(([k,v])=>breakdown[k]=(breakdown[k]||0)+v); }); }
  const winDays=months.reduce((a,m)=>a+daysInMonth(m),0);
  const brRows=Object.entries(breakdown).map(([k,nights])=>{const cap=(dim==="house")?(bedsPerHouse[k]||0):bedsTotal;const p=cap&&winDays?Math.min(100,Math.round(nights/(cap*winDays)*100)):0;return [k,nights,p];}).sort((a,b)=>b[2]-a[2]);
  const windowTotal=months.reduce((a,m)=>a+md[m].total,0);
  const totalBeds=bedsTotal;
  const occBeds=rooms.filter(r=>r.status==="occupied").reduce((a,r)=>a+(r.capacity||1),0);
  const occ=totalBeds?Math.round(occBeds/totalBeds*100):0;
  const fmtMonth=(m)=>{const [y,mo]=m.split("-");return new Date(+y,+mo-1,1).toLocaleDateString("de-DE",{month:"short"});};
  const dimBtn=(k,l)=><button key={k} onClick={()=>{setDim(k);setSel("__all__");}} className={"px-3 py-1.5 rounded-lg text-xs font-semibold "+(dim===k?"bg-blue-600 text-white":"bg-slate-100 text-slate-600")}>{l}</button>;
  return (
    <div className="space-y-6">
      <PageHead title="Auslastung & Umsatz" sub="Belegung = belegte Betten / Bettenkapazität. Umsatz folgt mit Qonto."/>
      <div className="grid grid-cols-2 lg:grid-cols-4 gap-4">
        <Card className="p-5"><div className="text-3xl font-bold text-slate-800">{occ}%</div><div className="text-sm text-slate-500">Belegung heute (Betten)</div></Card>
        <Card className="p-5"><div className="text-3xl font-bold text-slate-800">{occBeds}<span className="text-lg text-slate-400">/{totalBeds}</span></div><div className="text-sm text-slate-500">belegte Betten</div></Card>
        <Card className="p-5"><div className="text-3xl font-bold text-slate-800">{windowTotal}</div><div className="text-sm text-slate-500">Bettennächte (12 Mon.)</div></Card>
        <Card className="p-5"><div className="text-3xl font-bold text-slate-400">€ —</div><div className="text-sm text-slate-500">Umsatz (Qonto folgt)</div></Card>
      </div>
      <Card className="p-5">
        <div className="flex items-center justify-between flex-wrap gap-2 mb-4">
          <h2 className="font-semibold text-slate-800">Belegung pro Monat (Betten %)</h2>
          <div className="flex items-center gap-2 flex-wrap">
            <select value={win} onChange={e=>setWin(+e.target.value)} className="border border-slate-300 rounded-lg px-2 py-1.5 text-xs"><option value={6}>6 Mon.</option><option value={12}>12 Mon.</option><option value={24}>24 Mon.</option></select>
            <div className="flex gap-1">{dimBtn("total","Gesamt")}{dimBtn("house","Nach Haus")}{dimBtn("company","Nach Firma")}</div>
            {dim!=="total"&&<select value={sel} onChange={e=>setSel(e.target.value)} className="border border-slate-300 rounded-lg px-2 py-1.5 text-xs"><option value="__all__">Alle</option>{options.map(o=><option key={o} value={o}>{o}</option>)}</select>}
          </div>
        </div>
        <div className="flex items-end gap-2 h-48 overflow-x-auto">{months.map(m=>{const v=valueFor(m);const cur=m===`${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,"0")}`;return(
          <div key={m} className="flex-1 min-w-[40px] flex flex-col items-center justify-end h-full">
            <div className="text-xs font-semibold text-slate-700">{v?v+"%":""}</div>
            <div className={"w-full rounded-t-lg "+(cur?"bg-blue-600":"bg-blue-400")} style={{height:(v/maxV*100)+"%"}}></div>
            <div className="text-[10px] text-slate-500 mt-1">{fmtMonth(m)}</div>
          </div>);})}</div>
      </Card>
      {dim!=="total"&&<Card className="p-5">
        <h2 className="font-semibold text-slate-800 mb-3">{dim==="house"?"Nach Haus":"Nach Firma"} · Ø Belegung ({win} Mon.)</h2>
        <div className="space-y-2">{brRows.map(([k,nights,p])=>{return(
          <div key={k}><div className="flex justify-between text-sm mb-1"><button onClick={()=>setSel(sel===k?"__all__":k)} className={"font-semibold text-left hover:underline "+(sel===k?"text-blue-700":"text-slate-700")}>{k}</button><span className="text-slate-500">{p}% · {nights} N.</span></div>
            <div className="h-2.5 bg-slate-100 rounded-full overflow-hidden"><div className="h-full bg-blue-500" style={{width:p+"%"}}></div></div></div>);})}
          {!brRows.length&&<p className="text-sm text-slate-400">Keine Daten im Zeitraum.</p>}</div>
      </Card>}
    </div>
  );
}

/* ============================ SETTINGS ============================ */
const mmTranslate=async(text,from,to)=>{ try{
  const res=await fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(text)}&langpair=${from}|${to}`);
  const j=await res.json(); const t=j&&j.responseData&&j.responseData.translatedText;
  return (t&&!/MYMEMORY WARNING|QUERY LENGTH LIMIT/i.test(t))?t:text;
}catch(e){ return text; } };

function HouseRulesEditor() {
  const [rules,setRules]=useState(null); const [busy,setBusy]=useState(false);
  useEffect(()=>{ sb.from("settings").select("value").eq("key","house_rules").maybeSingle().then(({data})=>setRules(Array.isArray(data?.value)?data.value:[])); },[]);
  if(!rules) return <Card className="p-5"><div className="skel h-20"/></Card>;
  const setDe=(i,v)=>setRules(rs=>rs.map((r,j)=>j===i?{...r,de:v}:r));
  const add=()=>setRules(rs=>[...rs,{de:""}]);
  const remove=(i)=>setRules(rs=>rs.filter((_,j)=>j!==i));
  const save=async()=>{ const clean=rules.filter(r=>(r.de||"").trim());
    const {error}=await sb.from("settings").update({value:clean,updated_at:new Date().toISOString()}).eq("key","house_rules");
    if(error)return err(error); setRules(clean); toast("Hausregeln gespeichert (DE)"); };
  const translate=async()=>{ setBusy(true); try{ const targets=["en","cs","sk","ru"]; const out=[];
    for(const r of rules){ const de=(r.de||"").trim(); if(!de) continue; const obj={de};
      for(const t of targets){ obj[t]=await mmTranslate(de,"de",t); } out.push(obj); }
    const {error}=await sb.from("settings").update({value:out,updated_at:new Date().toISOString()}).eq("key","house_rules"); if(error)throw error;
    setRules(out); toast("Übersetzt & gespeichert (DE→EN/CS/SK/RU)"); }catch(e){err(e);} setBusy(false); };
  return (
    <Card className="p-5">
      <div className="flex items-center justify-between mb-3 flex-wrap gap-2">
        <h2 className="font-semibold text-slate-800">📋 Hausregeln <span className="text-xs text-slate-400 font-normal">· Pflege auf Deutsch</span></h2>
        <div className="flex gap-2"><Btn kind="soft" size="sm" onClick={add}>+ Regel</Btn><Btn kind="ok" size="sm" onClick={save}>Speichern</Btn></div></div>
      <div className="space-y-2">{rules.map((r,i)=>(
        <div key={i} className="flex gap-2 items-start"><span className="text-xs text-slate-400 pt-2.5 w-5 text-right">{i+1}.</span>
          <div className="flex-1"><textarea value={r.de||""} onChange={e=>setDe(i,e.target.value)} rows={2} className="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm"/>
            <div className="mt-0.5">{(r.en&&r.cs&&r.sk&&r.ru)?<span className="text-[11px] text-emerald-600 font-medium">✓ übersetzt (EN/CS/SK/RU)</span>:<span className="text-[11px] text-amber-600 font-medium">⚠️ noch nicht übersetzt</span>}</div></div>
          <button onClick={()=>remove(i)} title="Löschen" className="text-rose-600 px-2 pt-2">🗑</button></div>))}
        {!rules.length&&<p className="text-sm text-slate-400">Noch keine Regeln. „+ Regel" zum Hinzufügen.</p>}</div>
      <div className="mt-4 pt-4 border-t border-slate-100 flex items-center gap-3 flex-wrap">
        <Btn kind="primary" onClick={translate}>{busy?"Übersetzt…":"🌐 Jetzt übersetzen (DE → EN/CS/SK/RU)"}</Btn>
        <span className="text-xs text-slate-400">Gäste sehen die Regeln automatisch in ihrer Sprache.</span></div>
    </Card>
  );
}

async function fileSha(file){ try{ const buf=await file.arrayBuffer(); const h=await crypto.subtle.digest("SHA-256",buf);
  return Array.from(new Uint8Array(h)).map(b=>b.toString(16).padStart(2,"0")).join(""); }catch(e){ return null; } }
const genToken=()=>Array.from({length:24},()=>"abcdefghijklmnopqrstuvwxyz0123456789"[Math.floor(Math.random()*36)]).join("");

function LangBar({glang,setGlang}){ return (
  <div className="flex gap-1 justify-center">{LANGS.map(l=>
    <button key={l} onClick={()=>setGlang(l)} className={"text-xs px-2.5 py-1 rounded font-semibold "+(glang===l?"bg-blue-600 text-white":"bg-slate-100 text-slate-500")}>{l.toUpperCase()}</button>)}</div>
); }

function Guest({onAdmin}){
  const urlCode = (()=>{ try{ return (new URLSearchParams(window.location.search).get("code")||"").toUpperCase(); }catch(e){ return ""; } })();
  const [code,setCode]=useState(urlCode);
  const [glang,setGlang]=useState("de");
  const [booking,setBooking]=useState(null);
  const [busy,setBusy]=useState(false);
  const [step,setStep]=useState("code");          // code → personal → id → rules → comm → success
  const [hr,setHr]=useState([]); const [platUrl,setPlatUrl]=useState("");
  const [pdata,setPdata]=useState({full_name:"",email:"",phone:""});
  const [guests,setGuests]=useState([{name:"",front:null,back:null,fhash:null,busyF:false,busyB:false}]);
  const [agreeRules,setAgreeRules]=useState(false);
  const [vidConsent,setVidConsent]=useState(true);
  const [issue,setIssue]=useState({category:"",message:""}); const [issueSent,setIssueSent]=useState(false);
  const [thr,setThr]=useState({on:false,company:null,thread:null,msgs:[],body:"",pendingPhoto:null,busy:false,loaded:false});
  const t=(k)=> (TR[glang]&&TR[glang][k]) || TR.en[k] || k;

  useEffect(()=>{ sb.from("settings").select("key,value").in("key",["house_rules","platform_url"]).then(({data})=>{
    (data||[]).forEach(row=>{ if(row.key==="house_rules"&&Array.isArray(row.value)) setHr(row.value);
      if(row.key==="platform_url") setPlatUrl(typeof row.value==="string"?row.value:(row.value&&row.value.url)||""); }); }); },[]);
  useEffect(()=>{ if(urlCode){ lookup(urlCode); } /* prefill from e-mail link */ },[]); // eslint-disable-line
  useEffect(()=>{ if(step==="success"&&booking){ loadThread(); } },[step, booking&&booking.id]); // eslint-disable-line

  async function lookup(forced){ const c=(forced||code||"").trim().toUpperCase(); if(!c){ return; } setBusy(true);
    // anon-Tabellen sind dicht → Lookup über SECURITY DEFINER RPC (Jean), nach Reservierungscode gescoped
    const {data,error}=await sb.rpc("get_checkin_reservation",{p_code:c});
    if(error||!data||data.error||!data.reservation){ setBusy(false); toast("Code nicht gefunden / code not found","err"); return; }
    const resv=data.reservation;
    const booking={...resv, rooms:{...(data.room||{}), cleaning_objekte:data.objekt||null}}; // shape wie zuvor, Rest der UI unverändert
    setBooking(booking); if(resv.preferred_language) setGlang(resv.preferred_language);
    setPdata(p=>({...p, full_name:resv.guest_name||"", email:resv.guest_email||""}));
    const n=Math.max(1, resv.persons||1);
    setGuests(g=>{ const arr=[...g]; while(arr.length<n) arr.push({name:"",front:null,back:null,fhash:null,busyF:false,busyB:false}); return arr.slice(0,Math.max(n,arr.length)); });
    setBusy(false); setStep(data.has_checkin ? "success" : "personal");
  }
  const room=(booking&&booking.rooms)||{};
  const house=room.cleaning_objekte||{};
  const addr=house.address||"";

  // ---- ID upload ----
  async function uploadId(file, gi, side){ if(!file||!booking) return;
    setGuests(g=>g.map((x,i)=>i===gi?{...x,[side==="front"?"busyF":"busyB"]:true}:x));
    const ext=((file.name||"").split(".").pop()||"jpg").toLowerCase();
    const path=`${booking.id}/p${gi+1}-${side}-${Date.now()}.${ext}`;
    const {error}=await sb.storage.from("id-cards").upload(path,file,{upsert:true,contentType:file.type||"image/jpeg"});
    if(error){ err(error); setGuests(g=>g.map((x,i)=>i===gi?{...x,busyF:false,busyB:false}:x)); return; }
    let fhash=null; if(side==="front") fhash=await fileSha(file);
    setGuests(g=>g.map((x,i)=>i===gi?{...x,[side]:path,...(side==="front"?{fhash}:{}),busyF:false,busyB:false}:x));
  }
  const dupId=(()=>{ const seen={}; for(const g of guests){ if(g.fhash){ if(seen[g.fhash]) return true; seen[g.fhash]=1; } } return false; })();
  const allIdsDone=guests.every(g=>g.front&&g.back) && !dupId;

  function addGuest(){ setGuests(g=>[...g,{name:"",front:null,back:null,fhash:null,busyF:false,busyB:false}]); }
  function removeGuest(i){ setGuests(g=>g.filter((_,k)=>k!==i)); }

  // ---- finish ----
  async function finish(){ if(busy) return; setBusy(true);
    try{
      const token=genToken();
      const {data:ci,error}=await sb.from("check_ins").insert({
        reservation_id:booking.id, full_name:pdata.full_name, email:pdata.email, phone:pdata.phone,
        id_card_url:guests[0].front, id_card_back_url:guests[0].back,
        agreed_to_rules:true, agreed_to_checkout_video:!!vidConsent, checkout_token:token
      }).select("id").single();
      if(error) throw error;
      const extra=guests.slice(1).filter(g=>g.front||g.back||g.name);
      if(extra.length){ const {error:e2}=await sb.from("additional_guests").insert(
        extra.map(g=>({check_in_id:ci.id, guest_name:g.name||"—", id_card_front_url:g.front, id_card_back_url:g.back}))); if(e2) err(e2); }
      await sb.rpc("update_reservation_checkin",{ p_code:booking.code, p_language:glang,
        p_persons:booking.persons||guests.length, p_is_used:true }); // anon-Tabellen dicht → RPC (Jean)
      // confirmation e-mail (localised) — backend send-email edge function
      try{ await sb.functions.invoke("send-email",{ body:{ to:pdata.email, subject:"Check-In", template:"checkin_confirmation", language:glang,
        data:{ guestName:pdata.full_name, roomNumber:roomShort(room.room_number), houseAddress:addr||house.name||"",
          doorCode:room.door_code, houseDoorCode:room.house_door_code, checkInDate:booking.check_in_date, checkOutDate:booking.check_out_date } } }); }catch(e){ console.warn("email",e); }
      setBusy(false); setStep("success");
    }catch(e){ setBusy(false); err(e); }
  }

  const sendIssue=async()=>{ if(!issue.message.trim()) return toast(t("problemNeed"),"err");
    const {error}=await sb.from("guest_issues").insert({reservation_code:booking.code,room:room.room_number||null,category:issue.category||null,message:issue.message});
    if(error) return err(error); setIssueSent(true); setIssue({category:"",message:""}); toast(t("problemOk")); };

  const openPlatform=()=>{ if(platUrl){ window.open(platUrl,"_blank","noreferrer"); } else { toast(t("installHint")); } };
  const reset=()=>{ setBooking(null); setCode(""); setStep("code"); setGuests([{name:"",front:null,back:null,fhash:null,busyF:false,busyB:false}]); setAgreeRules(false); };
  // ---- Phase C: Firmen-Kanal · Variante A (SECURITY DEFINER RPCs, anon-Tabellen dicht) ----
  // get_company_channel(p_code) -> { company, thread, messages }   ·   post_company_message(p_code,p_body,p_attachment)
  async function loadThread(){
    try{
      const {data,error}=await sb.rpc("get_company_channel",{p_code:booking.code});
      if(error||!data){ setThr(s=>({...s,on:false,loaded:true})); return; }
      const r=Array.isArray(data)?(data[0]||{}):data;
      const company=r.company||null;
      if(!company){ setThr(s=>({...s,on:false,loaded:true})); return; }
      setThr(s=>({...s,on:true,company,thread:r.thread||null,msgs:Array.isArray(r.messages)?r.messages:[],loaded:true}));
    }catch(e){ setThr(s=>({...s,on:false,loaded:true})); }
  }
  async function attachPhoto(file){ if(!file) return; setThr(s=>({...s,busy:true}));
    const ext=((file.name||"").split(".").pop()||"jpg").toLowerCase();
    const path=`${booking.id}/${Date.now()}.${ext}`;                 // anon INSERT in guest-uploads; auth-only read
    const {error}=await sb.storage.from("guest-uploads").upload(path,file,{upsert:true,contentType:file.type||"image/jpeg"});
    if(error){ err(error); setThr(s=>({...s,busy:false})); return; }
    setThr(s=>({...s,pendingPhoto:path,busy:false})); toast(t("attach")+" ✓");
  }
  async function sendMsg(){ if((!thr.body.trim()&&!thr.pendingPhoto)) return; setThr(s=>({...s,busy:true}));
    try{ const {error}=await sb.rpc("post_company_message",{p_code:booking.code, p_body:thr.body||"", p_attachment:thr.pendingPhoto||null});
      if(error) throw error;
      setThr(s=>({...s,body:"",pendingPhoto:null,busy:false})); loadThread();
    }catch(e){ err(e); setThr(s=>({...s,busy:false})); }
  }
  /* ---------------- STEP: CODE ---------------- */
  if(step==="code"){ return (
    <div className="min-h-screen flex items-center justify-center p-4"><div className="w-full max-w-sm">
      <div className="bg-slate-900 rounded-t-3xl p-6 text-center">
        <div className="w-14 h-14 rounded-2xl bg-blue-600 mx-auto flex items-center justify-center text-2xl">🏠</div>
        <h2 className="text-white font-bold text-xl mt-3">{t("appTitle")}</h2><p className="text-slate-400 text-sm">{t("appSub")}</p>
        <div className="mt-4"><LangBar glang={glang} setGlang={setGlang}/></div>
      </div>
      <div className="bg-white rounded-b-3xl p-6 shadow-lg">
        <Field label={t("code")}><input className={inputCls+" text-center font-mono uppercase"} value={code}
          onChange={e=>setCode(e.target.value.toUpperCase())} onKeyDown={e=>e.key==="Enter"&&lookup()} placeholder={t("codePh")}/></Field>
        <Btn onClick={()=>lookup()} size="lg">{busy?"…":"→ "+t("cont")}</Btn>
        <div className="text-center mt-4 pt-4 border-t border-slate-100"><button onClick={onAdmin} className="text-xs text-slate-400">{t("admin")}</button></div>
      </div>
    </div></div>
  ); }

  /* ---------------- WIZARD CHROME ---------------- */
  const order=["personal","id","rules","comm"];
  const labels={personal:t("sPersonal"),id:t("sId"),rules:t("sRules"),comm:t("sComm")};
  const idx=order.indexOf(step);
  const header=()=> (
    <div className="bg-white rounded-2xl p-4 shadow-sm border border-slate-200 mb-4">
      <div className="flex items-center justify-between mb-2">
        <div className="text-sm font-semibold text-slate-700">{t("step")} {idx+1} {t("of")} {order.length} · {labels[step]}</div>
        <LangBar glang={glang} setGlang={setGlang}/>
      </div>
      <div className="flex gap-1">{order.map((s,i)=><div key={s} className={"h-1.5 flex-1 rounded-full "+(i<=idx?"bg-blue-600":"bg-slate-200")}/>)}</div>
      <div className="text-xs text-slate-400 mt-2">{t("welcome")}, {booking.guest_name||"Gast"} · {roomShort(room.room_number)} · {fmtShort(booking.check_in_date)}–{fmtShort(booking.check_out_date)}</div>
    </div>
  );
  const wrap=(kids)=> <div className="min-h-screen p-4"><div className="max-w-md mx-auto py-4">{header()}{kids}</div></div>;
  const nav=(o)=> { const {onBack,onNext,nextLabel,nextDisabled}=o; return (
    <div className="flex gap-2 mt-4">
      {onBack&&<button onClick={onBack} className="px-4 py-2.5 rounded-xl bg-slate-100 text-slate-600 text-sm font-semibold">{t("back")}</button>}
      <button onClick={onNext} disabled={nextDisabled} className={"flex-1 rounded-xl py-2.5 text-sm font-semibold text-white "+(nextDisabled?"bg-slate-300":"bg-blue-600 hover:bg-blue-700")}>{nextLabel||t("cont")}</button>
    </div>
  ); };

  /* ---------------- STEP: PERSONAL ---------------- */
  if(step==="personal"){ const ok=pdata.full_name.trim()&&pdata.email.trim()&&pdata.phone.trim(); return (
    wrap(<Card className="p-5">
      <h3 className="font-semibold text-slate-800">{t("pHead")}</h3>
      <p className="text-xs text-slate-500 mb-3">{t("pNote")}</p>
      <Field label={t("name")}><input className={inputCls} value={pdata.full_name} onChange={e=>setPdata(p=>({...p,full_name:e.target.value}))}/></Field>
      <Field label={t("email")}><input className={inputCls} type="email" value={pdata.email} onChange={e=>setPdata(p=>({...p,email:e.target.value}))}/></Field>
      <Field label={t("phone")}><input className={inputCls} type="tel" value={pdata.phone} onChange={e=>setPdata(p=>({...p,phone:e.target.value}))}/></Field>
      {nav({onBack:reset, onNext:()=>ok?setStep("id"):toast(t("reqAll"),"err"), nextDisabled:!ok})}
    </Card>)
  ); }

  /* ---------------- STEP: IDENTITY ---------------- */
  if(step==="id"){ return (
    wrap(<Card className="p-5">
      <h3 className="font-semibold text-slate-800">{t("idHead")}</h3>
      <p className="text-xs text-slate-500 mb-3">{t("idNote")}</p>
      <div className="space-y-3">{guests.map((g,i)=>(
        <div key={i} className="border border-slate-200 rounded-xl p-3">
          <div className="flex items-center justify-between mb-2">
            <span className="text-sm font-semibold text-slate-700">{t("person")} {i+1}</span>
            {i>0&&<button onClick={()=>removeGuest(i)} className="text-xs text-rose-500">{t("removeGuest")}</button>}</div>
          {i>0&&<input className={inputCls+" mb-2"} placeholder={t("guestName")} value={g.name} onChange={e=>setGuests(arr=>arr.map((x,k)=>k===i?{...x,name:e.target.value}:x))}/>}
          <div className="grid grid-cols-2 gap-2">
            <label className={"cursor-pointer rounded-xl border-2 border-dashed p-3 text-center text-xs font-semibold "+(g.front?"border-emerald-300 bg-emerald-50 text-emerald-700":"border-slate-300 text-slate-500")}>
              {g.busyF?t("uploading"):(g.front?t("front")+" "+t("uploaded"):t("upFront"))}
              <input type="file" accept="image/*" capture="environment" className="hidden" onChange={e=>uploadId(e.target.files[0],i,"front")}/></label>
            <label className={"cursor-pointer rounded-xl border-2 border-dashed p-3 text-center text-xs font-semibold "+(g.back?"border-emerald-300 bg-emerald-50 text-emerald-700":"border-slate-300 text-slate-500")}>
              {g.busyB?t("uploading"):(g.back?t("back")+" "+t("uploaded"):t("upBack"))}
              <input type="file" accept="image/*" capture="environment" className="hidden" onChange={e=>uploadId(e.target.files[0],i,"back")}/></label>
          </div>
          {g.front&&g.back&&<div className="text-xs text-emerald-600 mt-2">{t("both")}</div>}
        </div>))}</div>
      <button onClick={addGuest} className="w-full mt-3 border border-blue-600 text-blue-700 rounded-xl py-2.5 text-sm font-semibold">{t("addGuest")}</button>
      {dupId&&<div className="mt-3 bg-amber-50 border border-amber-200 rounded-xl p-3 text-xs text-amber-800">{t("sameId")}</div>}
      {nav({onBack:()=>setStep("personal"), onNext:()=>allIdsDone?setStep("rules"):toast(dupId?t("sameId"):t("needBoth"),"err"), nextDisabled:!allIdsDone})}
    </Card>)
  ); }

  /* ---------------- STEP: HOUSE RULES ---------------- */
  if(step==="rules"){ return (
    wrap(<React.Fragment>
      <div className="bg-rose-600 text-white rounded-2xl p-4 mb-4 flex items-center gap-3">
        <span className="text-3xl">🚭</span>

/* ============================ GAST — CHECKOUT-VIDEO (token-gated, set_checkout_video RPC) ============================ */
function Checkout({token}){
  const [glang,setGlang]=useState("de");
  const [busy,setBusy]=useState(false),[done,setDone]=useState(false),[bad,setBad]=useState(false);
  const t=(k)=>(TR[glang]&&TR[glang][k])||TR.en[k]||k;
  const cl=["Zimmer & Bett","Boden & Bad","K\u00fchlschrank leer","Kein M\u00fcll","Fenster zu"];
  async function upload(file){ if(!file||busy) return; setBusy(true); setBad(false);
    const ext=((file.name||"").split(".").pop()||"mp4").toLowerCase();
    const path=`${token}/${Date.now()}.${ext}`;
    const {error}=await sb.storage.from("checkout-videos").upload(path,file,{upsert:true,contentType:file.type||"video/mp4"});
    if(error){ err(error); setBusy(false); return; }
    const {data,error:e2}=await sb.rpc("set_checkout_video",{p_checkout_token:token, p_video_url:path});
    setBusy(false);
    if(e2||!data||data.error){ setBad(true); return; }
    setDone(true);
  }
  return (
    <div className="min-h-screen flex items-center justify-center p-4"><div className="w-full max-w-sm">
      <div className="bg-slate-900 rounded-t-3xl p-6 text-center">
        <div className="w-14 h-14 rounded-2xl bg-emerald-600 mx-auto flex items-center justify-center text-2xl">🎥</div>
        <h2 className="text-white font-bold text-xl mt-3">{t("coTitle")}</h2>
        <p className="text-slate-400 text-sm">{t("coSub")}</p>
        <div className="mt-4"><LangBar glang={glang} setGlang={setGlang}/></div>
      </div>
      <div className="bg-white rounded-b-3xl p-6 shadow-lg">
        {done
          ? <div className="bg-emerald-50 border border-emerald-200 rounded-xl p-4 text-sm text-emerald-700">{t("coThanks")}</div>
          : <div>
              <div className="text-xs text-slate-500 mb-1">{t("coShow")}</div>
              <div className="flex flex-wrap gap-1.5 mb-4">{cl.map((c,i)=><span key={i} className="bg-slate-100 rounded-full px-2.5 py-1 text-xs text-slate-600">✓ {c}</span>)}</div>
              {bad&&<div className="bg-rose-50 border border-rose-200 rounded-xl p-3 text-sm text-rose-700 mb-3">{t("coBadToken")}</div>}
              <label className="block w-full text-center bg-emerald-600 text-white rounded-xl py-3 text-sm font-semibold cursor-pointer">
                {busy?t("coUploading"):t("coUpload")}
                <input type="file" accept="video/*" capture="environment" className="hidden" onChange={e=>upload(e.target.files[0])}/>
              </label>
            </div>}
      </div>
    </div></div>
  );
}

function BroadcastModal({objekte,onClose,onSent}){

        <p className="text-xs text-slate-400">Status automatisch: „Erstellt" → nach 4 Tagen ohne Zahlung „Offen" → „Bezahlt" sobald Zahlung erfasst (Qonto / manuell). Belege liegen privat (nur für angemeldete Admins).</p>
      </React.Fragment>}
      {splitFor && <SplitModal inv={splitFor} objekte={objekte||[]} onClose={()=>setSplitFor(null)} onSaved={reload}/>}
    </div>
  );
}

/* ============================ MELDUNGEN ============================ */
function Meldungen({bump}) {
  const [rows,reload]=useList(loaders.issues,[bump]);
  if(!rows) return <Skeleton/>;
  const resolve=async(x,done)=>{ const {error}=await sb.from("guest_issues").update({status:done?"done":"open",resolved_at:done?new Date().toISOString():null}).eq("id",x.id); if(error)return err(error); toast(done?"Erledigt":"Wieder offen"); reload(); };
  const open=rows.filter(r=>r.status!=="done"), closed=rows.filter(r=>r.status==="done");
  return (
    <div className="space-y-4">
      <PageHead title="Meldungen" sub={`${open.length} offen · ${rows.length} gesamt`}/>
      {!rows.length&&<Empty>Keine Meldungen.</Empty>}
      {[...open,...closed].map(x=>(
        <Card key={x.id} className={"p-4 flex flex-wrap items-center justify-between gap-3 "+(x.status==="done"?"opacity-60":"")}>
          <div><div className="font-semibold text-slate-800">{x.category||"Problem"} <span className="text-xs text-slate-400 font-normal">· {x.room||"—"} · {x.reservation_code||"—"} · {fmt(x.created_at)}</span></div>
            <div className="text-sm text-slate-600">{x.message}</div></div>
          {x.status==="done"?<Btn kind="soft" size="sm" onClick={()=>resolve(x,false)}>Wieder öffnen</Btn>:<Btn kind="ok" size="sm" onClick={()=>resolve(x,true)}>Erledigt</Btn>}
        </Card>))}
    </div>
  );
}

/* ============================ SHELL ============================ */
const NAV=[["over","Cockpit","📊"],["res","Reservierungen","📅"],["rooms","Zimmer","🛏"],["checkins","Check-ins","🪪"],["ext","Verlängerungen","📩"],["clean","Reinigung","🧹"],["occ","Auslastung","💶"],["acct","Rechnungswesen","🧾"],["msg","Meldungen","📨"],["inbox","Postfach","📬"],["set","Einstellungen","⚙️"]];
function Admin({session}) {
  const [view,setView]=useState("over");
  const [bump,setBump]=useState(0);
  const go=setView;
  const email=session.user?.email||"";
  const logout=()=>sb.auth.signOut();
  const refresh=()=>{ setBump(b=>b+1); toast("Aktualisiert"); };
  const Body={over:<Cockpit go={go} bump={bump}/>,res:<Reservations bump={bump}/>,rooms:<Rooms bump={bump}/>,checkins:<CheckIns bump={bump}/>,
    ext:<Extensions bump={bump}/>,clean:<Cleaning bump={bump}/>,occ:<Occupancy bump={bump}/>,acct:<Accounting bump={bump}/>,msg:<Meldungen bump={bump}/>,inbox:<Postfach bump={bump}/>,set:<SettingsView onLogout={logout} email={email} bump={bump}/>}[view];
  return (
    <div className="min-h-screen">
      <header className="bg-slate-900 text-white sticky top-0 z-40">
        <div className="max-w-7xl mx-auto px-4 py-3 flex items-center justify-between">
          <div className="flex items-center gap-3"><div className="w-9 h-9 rounded-xl bg-blue-600 flex items-center justify-center">🛡</div>
            <div><div className="font-bold leading-tight">Monteur Check-In</div><div className="text-xs text-slate-400">JJ Real Estate · live</div></div></div>
          <div className="flex items-center gap-2 text-sm">
            <button onClick={refresh} title="Aktualisieren" className="px-3 py-1.5 rounded-lg bg-white/10 font-semibold hover:bg-white/20">↻</button>
            <span className="text-slate-300 hidden sm:inline">{email}</span>
            <button onClick={logout} className="px-3 py-1.5 rounded-lg bg-white/10 font-semibold hover:bg-white/20">Logout</button>
          </div>
        </div>
        <nav className="max-w-7xl mx-auto px-2 flex gap-1 overflow-x-auto">{NAV.map(([k,l,ic])=>(
          <button key={k} onClick={()=>setView(k)} className={"px-3 py-2.5 text-sm whitespace-nowrap border-b-2 "+(view===k?"border-blue-500 text-white font-semibold":"border-transparent text-slate-400 hover:text-white")}>{ic} {l}</button>))}</nav>
      </header>
      <main className="max-w-7xl mx-auto px-4 py-6">{Body}</main>
      <footer className="text-center text-xs text-slate-400 py-6">Rework · live Supabase · {new Date().getFullYear()} JJ Real Estate</footer>
    </div>
  );
}

function App() {
  const [session,setSession]=useState(undefined);
  const [guest,setGuest]=useState(()=>{ try{ return !!(new URLSearchParams(window.location.search).get("code")); }catch(e){ return false; } });
  useEffect(()=>{ sb.auth.getSession().then(({data})=>setSession(data.session));
    const {data:sub}=sb.auth.onAuthStateChange((_e,s)=>setSession(s)); return ()=>sub.subscription.unsubscribe(); },[]);
  let body;
  const coToken=(()=>{ try{ return new URLSearchParams(window.location.search).get("checkout"); }catch(e){ return null; } })();
  if(coToken) body=<Checkout token={coToken}/>;
  else if(guest) body=<Guest onAdmin={()=>setGuest(false)}/>;
  else if(session===undefined) body=<div className="min-h-screen flex items-center justify-center text-slate-400">Lädt…</div>;
  else if(!session) body=<Login onGuest={()=>setGuest(true)}/>;
  else body=<Admin session={session}/>;
  return <React.Fragment><Toasts/>{body}</React.Fragment>;
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
