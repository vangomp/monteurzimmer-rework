/* ---------- helpers ---------- */
const TODAY = new Date(new Date().toDateString());
const fmt = (d) => d ? new Date(d).toLocaleDateString("de-DE",{day:"2-digit",month:"2-digit",year:"numeric"}) : "—";
const fmtShort = (d) => d ? new Date(d).toLocaleDateString("de-DE",{day:"2-digit",month:"2-digit"}) : "—";
const daysFromToday = (d) => Math.round((new Date(new Date(d).toDateString()) - TODAY)/86400000);
const genCode = () => "M"+Array.from({length:5},()=>"ABCDEFGHJKLMNPQRSTUVWXYZ23456789"[Math.floor(Math.random()*32)]).join("");

const stayBadge = (s) => ({ active:["Läuft","bg-emerald-100 text-emerald-700"], leaving:["Läuft aus","bg-amber-100 text-amber-700"],

/* ---------- UI atoms ---------- */
const Card = ({children, className=""}) => <div className={"bg-white rounded-2xl shadow-sm border border-slate-200 "+className}>{children}</div>;
const Pill = ({text, cls}) => <span className={"px-2.5 py-0.5 rounded-full text-xs font-semibold "+cls}>{text}</span>;
const Battery = ({v}) => { const c=v<25?"text-rose-600":v<50?"text-amber-600":"text-emerald-600"; return <span className={"font-bold "+c}>{v}%</span>; };
const Btn = ({children,onClick,kind="primary",size="md",type="button",disabled=false,className=""}) => {
  const k={primary:"bg-blue-600 text-white hover:bg-blue-700",ok:"bg-emerald-600 text-white hover:bg-emerald-700",
    danger:"bg-rose-600 text-white hover:bg-rose-700",ghost:"bg-slate-100 text-slate-600 hover:bg-slate-200",
    soft:"bg-slate-200 text-slate-700 hover:bg-slate-300"}[kind];
  const s={sm:"px-2.5 py-1 text-xs",md:"px-3 py-1.5 text-sm",lg:"px-4 py-2 text-sm"}[size];
  return <button type={type} disabled={disabled} onClick={onClick} className={"rounded-lg font-semibold transition-colors "+k+" "+s+(disabled?" opacity-40 cursor-not-allowed":"")+(className?" "+className:"")}>{children}</button>;
};
const IconBtn = ({title,onClick,children,color="text-slate-500"}) =>
  <button onClick={onClick} title={title} className={"px-1.5 py-1 rounded hover:bg-slate-100 "+color}>{children}</button>;
function Modal({title,onClose,children}) {
  return (

}
const Field = ({label,children}) => <label className="block mb-3"><span className="text-xs text-slate-500">{label}</span>{children}</label>;

    {right}

);
const Skeleton = () => <div className="space-y-3">{[0,1,2].map(i=><div key={i} className="skel h-16"/>)}</div>;
const Empty = ({children}) => <Card className="p-8 text-center text-slate-400">{children}</Card>;

/* ---------- toast ---------- */
let toastFn = ()=>{};
function Toasts(){
  const [msgs,setMsgs]=useState([]);
  toastFn=(text,kind="ok")=>{const id=Math.random();setMsgs(m=>[...m,{id,text,kind}]);setTimeout(()=>setMsgs(m=>m.filter(x=>x.id!==id)),3200);};
  return <div className="fixed bottom-4 right-4 z-[60] space-y-2">{msgs.map(m=>(
    <div key={m.id} className={"px-4 py-2 rounded-xl text-sm font-medium shadow-lg text-white "+(m.kind==="err"?"bg-rose-600":"bg-slate-800")}>{m.text}</div>))}</div>;
}
const toast=(t,k)=>toastFn(t,k);
const err=(e)=>{ console.error(e); toast((e&&e.message)||"Fehler","err"); };
const BUCHUNG_EMAIL="buchung@jjrealestate.de";
const GOOGLE_REVIEW_URL="https://www.google.com/search?q=JJ+Real+Estate+Monteurzimmer"; // TODO: durch echten Google-Bewertungslink ersetzen
const CASHBACK_EUR=25;
const MIHAELA_IMMODAY_ID="8d0bd36b-288f-45cc-b28f-39bf91147f60"; // geiger@jjrealestate.de in IMMODAY
// Ruft die bestehende send-email Edge-Function auf (Gmail-SMTP). subject wird serverseitig pro Template/Sprache überschrieben.
async function sendMail(template,to,language,data){
  if(!to) return {skipped:"no recipient"};
  const d={...(data||{})};
  if(!d.platformLink){ const base=(typeof window!=="undefined"?window.location.origin:"https://monteurzimmer-rework.vercel.app"); d.platformLink=d.reservationCode?base+"/?code="+d.reservationCode:base; }
  try{ const {data:res,error}=await sb.functions.invoke("mz-email",{body:{to,template,language:language||"de",data:d}});
    if(error){ console.warn("sendMail",template,error); return {error}; }
    return {ok:true,res};
  }catch(e){ console.warn("sendMail",template,e); return {error:e}; }
}

/* ============================ LOGIN ============================ */
function Login({onGuest}) {
  const [email,setEmail]=useState(""),[pw,setPw]=useState(""),[busy,setBusy]=useState(false);
  const login=async()=>{ if(!email||!pw) return toast("E-Mail & Passwort nötig","err"); setBusy(true);
    const {error}=await sb.auth.signInWithPassword({email,password:pw}); setBusy(false); if(error) err(error); };
  return (
    <div className="min-h-screen flex items-center justify-center p-4">
      <div className="w-full max-w-sm">
        <div className="bg-slate-900 rounded-t-3xl p-6 text-center">
          <div className="w-14 h-14 rounded-2xl bg-blue-600 mx-auto flex items-center justify-center text-2xl">🛡</div>
          <h2 className="text-white font-bold text-xl mt-3">Monteur Check-In</h2><p className="text-slate-400 text-sm">Admin-Anmeldung</p>
        </div>
        <div className="bg-white rounded-b-3xl p-6 shadow-lg">
          <Field label="E-Mail"><input className={inputCls} type="email" value={email} onChange={e=>setEmail(e.target.value)} onKeyDown={e=>e.key==="Enter"&&login()}/></Field>
          <Field label="Passwort"><input className={inputCls} type="password" value={pw} onChange={e=>setPw(e.target.value)} onKeyDown={e=>e.key==="Enter"&&login()}/></Field>
          <Btn onClick={login} size="lg">{busy?"Anmelden…":"Anmelden"}</Btn>
          <div className="text-center mt-4 pt-4 border-t border-slate-100">
            <button onClick={onGuest} className="text-sm text-blue-700 font-semibold">Ich bin Gast → Check-in mit Code</button>
          </div>
        </div>
      </div>
    </div>
  );
}

/* ============================ DATA ============================ */
function useList(loader, deps=[]) {
  const [data,setData]=useState(null);
  const reload=useCallback(async()=>{ try{ setData(await loader()); }catch(e){ err(e); setData([]); } },deps);
  useEffect(()=>{ let on=true; (async()=>{ try{ const d=await loader(); if(on)setData(d); }catch(e){ err(e); if(on)setData([]); } })(); return ()=>on=false; },deps);
  return [data,reload];
}
const loaders = {
  rooms: ()=> sb.from("rooms").select("*, cleaning_objekte(code,name)").order("room_number").then(r=>r.data||[]),
  roomsMin: ()=> sb.from("rooms").select("id,room_number,capacity").order("room_number").then(r=>r.data||[]),
  objekte: ()=> sb.from("cleaning_objekte").select("id,code,name,address,wifi_ssid,wifi_password,description,google_review_url,inspection_items,cleaning_checklist").order("code").then(r=>r.data||[]),
  reservations: ()=> sb.from("reservations").select("*, rooms(room_number, capacity, cleaning_objekte(code))").order("check_in_date",{ascending:false}).then(r=>r.data||[]),
  checkins: ()=> sb.from("check_ins").select("*, reservations(code, guest_name, rooms(room_number))").order("checked_in_at",{ascending:false}).limit(50).then(r=>r.data||[]),
  anmeldungen: ()=> sb.from("check_ins").select("id, full_name, birth_date, birth_place, checked_in_at, wgb_issued_at, reservations(guest_name, check_in_date, check_out_date, rooms(room_number, cleaning_objekte(code,name,address)))").order("checked_in_at",{ascending:false}).then(r=>r.data||[]),
  extensions: ()=> sb.from("extension_requests").select("*, check_ins(full_name, reservations(code, room_id, check_out_date, rooms(room_number)))").order("created_at",{ascending:false}).then(r=>r.data||[]),
  nuki: ()=> sb.from("nuki_lock_status").select("lock_name,battery_charge,battery_critical,last_checked_at").order("lock_name").then(r=>r.data||[]),
  orders: ()=> sb.from("cleaning_orders").select("*, cleaning_objekte(code,name)").is("archived_at",null).order("created_at",{ascending:false}).then(r=>r.data||[]),
  reports: ()=> sb.from("cleaning_reports").select("*, cleaning_objekte(code,name)").order("submitted_at",{ascending:false}).limit(40).then(r=>r.data||[]),
  reportItems: ()=> sb.from("cleaning_report_items").select("report_id,rating").then(r=>r.data||[]),
  settings: ()=> sb.from("settings").select("*").then(r=>r.data||[]),
  issues: ()=> sb.from("guest_issues").select("*").order("created_at",{ascending:false}).then(r=>r.data||[]),
  qonto: ()=> sb.from("qonto_invoices").select("*").order("issue_date",{ascending:false}).then(r=>r.data||[]),
  pricing: ()=> sb.from("pricing_rules").select("*").then(r=>r.data||[]),
  companyNotes: ()=> sb.from("company_notes").select("*").then(r=>r.data||[]),
  followups: ()=> sb.from("follow_ups").select("*").order("created_at",{ascending:false}).then(r=>r.data||[]),
  companyThreads: ()=> sb.from("company_threads").select("*, companies(id,name,display_name,logo_url,accent_color)").order("last_message_at",{ascending:false,nullsFirst:false}).then(r=>r.data||[]),
  companyMsgs: ()=> sb.from("messages").select("*").order("created_at").then(r=>r.data||[]),
  houseThreads: ()=> sb.from("house_threads").select("*, cleaning_objekte(code,name)").order("last_message_at",{ascending:false,nullsFirst:false}).then(r=>r.data||[]),
  houseMsgs: ()=> sb.from("house_messages").select("*").order("created_at").then(r=>r.data||[]),
  companies: ()=> sb.from("companies").select("id,name,display_name,email,portal_code").order("name").then(r=>r.data||[]),
};

/* ============================ COCKPIT ============================ */
function Cockpit({go,bump}) {
  const [rooms]=useList(loaders.rooms,[bump]);
  const [res]=useList(loaders.reservations,[bump]);
  const [nuki,reloadNuki]=useList(loaders.nuki,[bump]);
  const [ext]=useList(loaders.extensions,[bump]);
  const [issues]=useList(loaders.issues,[bump]);
  const [qi]=useList(loaders.qonto,[bump]);
  const [fups,reloadFups]=useList(loaders.followups,[bump]);
  const [creports]=useList(loaders.reports,[bump]);
  const [critems]=useList(loaders.reportItems,[bump]);
  const [fuText,setFuText]=useState("");
  if(!rooms||!res||!nuki||!ext||!issues||!qi||!fups||!creports||!critems) return <Skeleton/>;
  const active=res.filter(r=>!r.archived_at && daysFromToday(r.check_in_date)<=0); // checked in, incl. überfällig
  const overdue=res.filter(r=>!r.archived_at && daysFromToday(r.check_in_date)<=0 && daysFromToday(r.check_out_date)<0);
  const leaving=active.filter(r=>{const d=daysFromToday(r.check_out_date);return d>=0&&d<=3;});
  const free=rooms.filter(r=>r.status==="available").length;
  const lowBat=nuki.filter(n=>n.battery_charge<25);
  const pendExt=ext.filter(e=>e.status==="pending");
  // ---- metrics (archived bookings included for historical stats) ----
  const dayMs=86400000, D=(d)=>new Date(d);
  const nightsIn=(r,s,e)=>{const a=D(r.check_in_date),b=D(r.check_out_date);const st=Math.max(a,s),en=Math.min(b,e);return Math.max(0,Math.round((en-st)/dayMs));};
  const occWin=(s,e)=>{const days=Math.max(1,Math.round((e-s)/dayMs));const cap=rooms.length*days;if(!cap)return 0;const used=res.reduce((a,r)=>a+(r.room_id?nightsIn(r,s,e):0),0);return Math.round(used/cap*100);};
  const yStart=new Date(TODAY.getFullYear(),0,1);
  const lmStart=new Date(TODAY.getFullYear(),TODAY.getMonth()-1,1), lmEnd=new Date(TODAY.getFullYear(),TODAY.getMonth(),1);
  const fwd=(n)=>occWin(TODAY,new Date(TODAY.getTime()+n*dayMs));
  const stayLen=(r)=>Math.max(0,Math.round((D(r.check_out_date)-D(r.check_in_date))/dayMs));
  const avg=(arr,f)=>arr.length?Math.round(arr.reduce((a,x)=>a+f(x),0)/arr.length*10)/10:0;
  const ytdRes=res.filter(r=>D(r.check_in_date)>=yStart && D(r.check_in_date)<=TODAY);
  const lmRes=res.filter(r=>D(r.check_in_date)>=lmStart && D(r.check_in_date)<lmEnd);
  const occToday=rooms.length?Math.round(rooms.filter(r=>r.status==="occupied").length/rooms.length*100):0;
  const occRooms=rooms.filter(r=>r.status==="occupied");
  const avgCap=occRooms.length?Math.round(occRooms.reduce((a,r)=>a+(r.capacity||1),0)/occRooms.length*10)/10:0;
  const ytdNights=res.reduce((a,r)=>a+(r.room_id?nightsIn(r,yStart,TODAY):0),0);
  const invActive=qi.filter(x=>(x.status||"").toLowerCase()!=="canceled");
  const invoicedTotal=invActive.reduce((a,x)=>a+(+x.amount||0),0);
  const openInv=qi.filter(x=>["unpaid","overdue","pending","draft"].includes((x.status||"").toLowerCase()));
  const openInvSum=Math.round(openInv.reduce((a,x)=>a+(+x.amount||0),0));
  const eurNight=qi.length&&ytdNights?Math.round(invoicedTotal/ytdNights):null;
  const todo=[];
  if(leaving.length) todo.push(["⏳",`${leaving.length} Aufenthalt(e) laufen in ≤3 Tagen aus`,"Reservierungen",()=>go("res"),"amber"]);
  if(overdue.length) todo.push(["⚠️",`${overdue.length} Aufenthalt(e) überfällig`,"Anzeigen",()=>go("res"),"rose"]);
  if(pendExt.length) todo.push(["📩",`${pendExt.length} offene Verlängerungs-Anfrage(n)`,"Freigeben",()=>go("ext"),"blue"]);
  const openIssues=issues.filter(i=>i.status!=="done");
  if(openIssues.length) todo.push(["📨",`${openIssues.length} neue Problem-Meldung(en)`,"Meldungen",()=>go("msg"),"blue"]);
  lowBat.forEach(n=>todo.push(["🔋",`Nuki-Akku niedrig: ${n.lock_name} (${n.battery_charge}%)`,"Reinigung",()=>go("clean"),"rose"]));
  const doorBatDue=rooms.filter(r=>{const d=r.door_battery_changed_at;return d && (Date.now()-new Date(d))/86400000>180;});
  if(doorBatDue.length) todo.push(["🔋",`${doorBatDue.length} Zimmer: Türschloss-Akku fällig (>6 Mon.)`,"Zimmer",()=>go("rooms"),"amber"]);
  const cWorst={}; critems.forEach(it=>{cWorst[it.report_id]=Math.max(cWorst[it.report_id]||0,it.rating||0);});
  const badClean=creports.filter(r=>!r.archived_at && !r.extra_cleaning_at && (cWorst[r.id]||0)>=3);
  if(badClean.length) todo.push(["🧽",`${badClean.length} Reinigung(en) mit Mängeln (≥3) – Nachreinigung/Zusatzkosten`,"Reinigung",()=>go("clean"),"rose"]);
  if(!todo.length) todo.push(["✅","Nichts Dringendes – alles im grünen Bereich.","",null,"emerald"]);
  const toneCls={amber:"border-amber-300 bg-amber-50",rose:"border-rose-300 bg-rose-50",blue:"border-blue-300 bg-blue-50",emerald:"border-emerald-300 bg-emerald-50"};
  const openFups=fups.filter(f=>f.status!=="done");
  const addFu=async()=>{ const t=fuText.trim(); if(!t)return; const {error}=await sb.from("follow_ups").insert({text:t,created_by:"Jarne",status:"open"}); if(error)return err(error); setFuText(""); toast("Follow-up hinzugefügt"); reloadFups(); };
  const doneFu=async(f)=>{ const {error}=await sb.from("follow_ups").update({status:"done",done_at:new Date().toISOString()}).eq("id",f.id); if(error)return err(error); reloadFups(); };
  const delFu=async(f)=>{ if(!confirm("Follow-up löschen?"))return; const {error}=await sb.from("follow_ups").delete().eq("id",f.id); if(error)return err(error); reloadFups(); };
  return (
    <div className="space-y-6">
      <PageHead title="Cockpit" sub="Live aus Supabase."/>
      <Card className="p-5 border-l-4 border-l-indigo-400">
        <h2 className="font-semibold text-slate-800 mb-2">📌 Follow-ups / Wartet auf…</h2>
        <div className="space-y-2 mb-3">{openFups.length?openFups.map(f=>(
          <div key={f.id} className="flex items-start gap-2 bg-indigo-50/60 border border-indigo-100 rounded-lg px-3 py-2">
            <button onClick={()=>doneFu(f)} title="Erledigt" className="text-emerald-600 font-bold mt-0.5">✓</button>
            <div className="flex-1 text-sm text-slate-700">{f.text}{f.ref?<span className="text-xs text-slate-400"> · {f.ref}</span>:null}<div className="text-[11px] text-slate-400">{f.created_by||"—"} · {fmt(f.created_at)}</div></div>
            <button onClick={()=>delFu(f)} title="Löschen" className="text-slate-300 hover:text-rose-500">✕</button>
          </div>)):<p className="text-sm text-slate-400">Keine offenen Follow-ups.</p>}
        </div>
        <div className="flex gap-2">
          <input value={fuText} onChange={e=>setFuText(e.target.value)} onKeyDown={e=>e.key==="Enter"&&addFu()} placeholder="z.B. Slavik wartet auf Zahlungsbestätigung – Reservierung M79DGU vor Live-Schaltung" className="flex-1 border border-slate-300 rounded-lg px-3 py-1.5 text-sm"/>
          <Btn kind="ok" size="sm" onClick={addFu}>+ Follow-up</Btn>
        </div>
      </Card>
      <div className="grid grid-cols-2 lg:grid-cols-4 gap-4">
        {[["Belegung heute",occToday+"%",`${rooms.filter(r=>r.status==="occupied").length}/${rooms.length} Zimmer`,"occ"],
          ["Ø Belegung YTD",occWin(yStart,TODAY)+"%","seit Jahresbeginn","occ"],
          ["Ø Belegung Vormonat",occWin(lmStart,lmEnd)+"%","letzter Monat","occ"],
          ["Aktive Gäste",active.length,"inkl. überfällig","res"]
        ].map((k,i)=><button key={i} onClick={()=>go(k[3])} className="text-left"><Card className="p-5 hover:shadow-md transition-shadow"><div className="text-2xl font-bold text-slate-800">{k[1]}</div><div className="text-xs text-slate-500">{k[0]} · {k[2]}</div></Card></button>)}
      </div>
      <div className="grid grid-cols-2 lg:grid-cols-4 gap-4">
        {[["Prognose Belegung 10 T.",fwd(10)+"%"],["Prognose 30 T.",fwd(30)+"%"],["Prognose 60 T.",fwd(60)+"%"],["Ø Bleibedauer YTD",avg(ytdRes,stayLen)+" N."]
        ].map((k,i)=><Card key={i} className="p-5"><div className="text-2xl font-bold text-slate-800">{k[1]}</div><div className="text-xs text-slate-500">{k[0]}</div></Card>)}
      </div>
      <div className="grid grid-cols-2 lg:grid-cols-4 gap-4">
        {[["Ø Bleibedauer Vormonat",avg(lmRes,stayLen)+" N.",true],["Ø Plätze/Zimmer (belegt)",avgCap||"—",true],
          ["Ø €/Nacht",eurNight!=null?"€ "+eurNight:"€ —",qi.length>0],

function Reservations({bump}) {
  const [rows,reload]=useList(loaders.reservations,[bump]);
  const [roomOpts]=useList(loaders.roomsMin,[bump]);
  const [edit,setEdit]=useState(null);
  const [filter,setFilter]=useState("active");
  const [q,setQ]=useState("");
  const [sort,setSort]=useState({key:"in",dir:"desc"});
  if(!rows) return <Skeleton/>;
  const counts={ active:rows.filter(r=>!r.archived_at).length, archived:rows.filter(r=>r.archived_at).length, all:rows.length };
  const ql=q.trim().toLowerCase();
  const shown=rows.filter(r=>{
    const inFilter = filter==="all"?true:filter==="archived"?r.archived_at:!r.archived_at;
    if(!inFilter) return false;
    if(!ql) return true;
    return [r.guest_name,r.code,r.guest_email].some(v=>(v||"").toLowerCase().includes(ql));
  });
  const acc={guest:r=>(r.guest_name||"").toLowerCase(),room:r=>roomShort(r.rooms?.room_number),in:r=>r.check_in_date||"",out:r=>r.check_out_date||"",channel:r=>(r.contact_channel||"")};
  const sorted=[...shown].sort((a,b)=>{const f=acc[sort.key];if(!f)return 0;const av=f(a),bv=f(b);return (av<bv?-1:av>bv?1:0)*(sort.dir==="asc"?1:-1);});
  const Th=({k,children})=>{const on=sort.key===k;return <th onClick={()=>setSort(s=>({key:k,dir:on&&s.dir==="asc"?"desc":"asc"}))} className="text-left p-3 cursor-pointer select-none hover:text-slate-700 whitespace-nowrap">{children}{on?(sort.dir==="asc"?" ▲":" ▼"):""}</th>;};
  const save=async(form)=>{ try{
    const payload={ guest_name:form.guest_name, guest_email:form.guest_email||null, room_id:form.room_id||null,
      check_in_date:form.check_in_date, check_out_date:form.check_out_date, contact_channel:form.contact_channel||null, preferred_language:form.preferred_language||"de",
      persons:form.persons?Number(form.persons):null, status:form.status||"confirmed" };
    if(edit==="new"){ payload.code=genCode(); const {error}=await sb.from("reservations").insert(payload); if(error) throw error; toast("Reservierung angelegt");
      if(payload.guest_email){ const rn=(roomOpts||[]).find(rr=>rr.id===payload.room_id)?.room_number||""; const link=window.location.origin+"/?code="+payload.code;
        sendMail("reservation_confirmation",payload.guest_email,payload.preferred_language||"de",{guestName:payload.guest_name||"Gast",roomNumber:rn,reservationCode:payload.code,checkInDate:payload.check_in_date||"",checkOutDate:payload.check_out_date||"",checkinLink:link}); } }
    else { const {error}=await sb.from("reservations").update(payload).eq("id",edit.id); if(error) throw error; toast("Gespeichert"); }
    setEdit(null); reload(); }catch(e){ err(e); } };
  const del=async(r)=>{ if(!confirm(`Reservierung ${r.code} (${r.guest_name||"—"}) löschen?\n\nTipp: Zum „Beenden" lieber archivieren. Löschen nur bei Fehlanlage. (1/2)`))return;
    if(!confirm("Endgültig löschen? Das kann NICHT rückgängig gemacht werden. (2/2)"))return;
    const {error}=await sb.from("reservations").delete().eq("id",r.id); if(error)return err(error); toast("Gelöscht"); reload(); };
  const archive=async(r)=>{ const archiving=!r.archived_at;
    const {error}=await sb.from("reservations").update({archived_at:archiving?new Date().toISOString():null}).eq("id",r.id);
    if(error)return err(error);
    if(archiving && r.room_id) await sb.from("rooms").update({status:"available"}).eq("id",r.room_id);
    toast(archiving?"Archiviert · Zimmer freigegeben":"Wiederhergestellt"); reload(); };
  const toggleQonto=async(r)=>{ const {error}=await sb.from("reservations").update({qonto_billed:!r.qonto_billed}).eq("id",r.id); if(error)return err(error); reload(); };
  const confirmRes=async(r)=>{ const {error}=await sb.from("reservations").update({status:"confirmed"}).eq("id",r.id); if(error)return err(error); toast("Reservierung bestätigt"); reload(); };
  return (
    <div className="space-y-4">
      <PageHead title="Reservierungen" sub={`${rows.length} gesamt · live`} right={<Btn onClick={()=>setEdit("new")} size="lg">+ Neue Reservierung</Btn>}/>
      <div className="flex items-center gap-2 flex-wrap">
        <div className="flex gap-1 text-xs">{[["active","Aktiv"],["archived","Archiviert"],["all","Alle"]].map(([k,l])=>(
          <button key={k} onClick={()=>setFilter(k)} className={"px-3 py-1.5 rounded-lg font-semibold "+(filter===k?"bg-blue-600 text-white":"bg-slate-100 text-slate-600")}>{l} <span className="opacity-70">{counts[k]}</span></button>))}</div>
        <input value={q} onChange={e=>setQ(e.target.value)} placeholder="🔍 Name, Code, E-Mail…" className="flex-1 min-w-[180px] border border-slate-300 rounded-lg px-3 py-1.5 text-sm"/>
      </div>
      <Card className="overflow-x-auto">
        <table className="w-full text-sm">
          <thead className="bg-slate-50 text-slate-500 text-xs uppercase"><tr>
            <Th k="guest">Gast</Th><Th k="room">Zimmer</Th><Th k="in">Zeitraum</Th>
            <Th k="out">Aufenthalt</Th><Th k="channel">Kanal</Th><th className="text-center p-3">Qonto</th><th className="text-right p-3">Aktionen</th>
          </tr></thead>
          <tbody>{sorted.map(r=>{const[bt,bc]=stayBadge(stayOf(r));const dl=daysFromToday(r.check_out_date);return(
            <tr key={r.id} className={"border-t border-slate-100 hover:bg-slate-50"+(r.status==="provisional"?" bg-amber-50":"")}>
              <td className="p-3"><div className="font-semibold text-slate-800">{r.guest_name||"—"}{r.status==="provisional"&&<span className="ml-1"><Pill text="Vorläufig" cls="bg-amber-100 text-amber-700"/></span>}</div><div className="text-xs text-slate-400">{r.code} · {r.guest_email||"—"}</div></td>
              <td className="p-3 text-slate-600">{roomShort(r.rooms?.room_number)}{r.persons?<span className={"ml-1 text-xs font-medium "+(r.rooms?.capacity&&r.persons>=r.rooms.capacity?"text-emerald-600":"text-amber-600")}>· {r.persons}{r.rooms?.capacity?`/${r.rooms.capacity}`:""}P</span>:null}</td>
              <td className="p-3 text-slate-600 whitespace-nowrap">{fmtShort(r.check_in_date)} – {fmtShort(r.check_out_date)}</td>
              <td className="p-3"><Pill text={bt+(!r.archived_at&&dl>=0&&dl<=14?` · ${dl}d`:"")} cls={bc}/></td>
              <td className="p-3 text-slate-600">{r.contact_channel||"—"}</td>
              <td className="p-3 text-center"><input type="checkbox" checked={!!r.qonto_billed} onChange={()=>toggleQonto(r)} className="w-4 h-4 accent-blue-600" title="Rechnung in Qonto erstellt"/></td>
              <td className="p-3 text-right whitespace-nowrap">
                {r.status==="provisional"&&<IconBtn title="Fest bestätigen" color="text-emerald-600" onClick={()=>confirmRes(r)}>✓</IconBtn>}
                <IconBtn title="Check-in-Link kopieren" color="text-indigo-600" onClick={()=>{const u=window.location.origin+"/?code="+r.code;(navigator.clipboard?.writeText(u)||Promise.reject()).then(()=>toast("Check-in-Link kopiert: "+r.code),()=>{window.prompt("Check-in-Link kopieren:",u);});}}>🔗</IconBtn>
                <IconBtn title="Bearbeiten" color="text-blue-600" onClick={()=>setEdit(r)}>✏️</IconBtn>
                <IconBtn title={r.archived_at?"Wiederherstellen":"Archivieren"} color="text-amber-600" onClick={()=>archive(r)}>{r.archived_at?"↩️":"📦"}</IconBtn>
                <IconBtn title="Löschen" color="text-rose-600" onClick={()=>del(r)}>🗑</IconBtn>
              </td>
            </tr>);})}
            {!shown.length&&<tr><td colSpan="7" className="p-6 text-center text-slate-400">Keine Treffer.</td></tr>}
          </tbody>
        </table>
      </Card>
      <p className="text-xs text-slate-400">Qonto-Checkbox = manuell „Rechnung erstellt". Geplant: Auto-Abgleich + „Rechnung in Qonto erstellen".</p>
      {edit&&<ResForm rec={edit==="new"?null:edit} rooms={roomOpts||[]} reservations={rows} onSave={save} onClose={()=>setEdit(null)}/>}
    </div>
  );
}
function ResForm({rec,rooms,reservations,onSave,onClose}) {
  const [f,setF]=useState({ guest_name:rec?.guest_name||"", guest_email:rec?.guest_email||"", room_id:rec?.room_id||"",
    check_in_date:rec?.check_in_date||"", check_out_date:rec?.check_out_date||"", contact_channel:rec?.contact_channel||"", preferred_language:rec?.preferred_language||"de",
    persons:rec?.persons??"", status:rec?.status||"confirmed" });
  const u=(k,v)=>setF(s=>({...s,[k]:v}));
  const selRoom=rooms.find(r=>String(r.id)===String(f.room_id));
  const cap=selRoom?.capacity||null;
  const pers=Number(f.persons)||0;
  const validRange=f.check_in_date&&f.check_out_date&&f.check_in_date<f.check_out_date;
  // Rooms occupied in the chosen range. Half-open intervals: a room whose check_out is the new check_in is free.
  const conflictIds=new Set();
  if(validRange) (reservations||[]).forEach(r=>{ if(!r.room_id||r.archived_at||String(r.id)===String(rec?.id))return;
    if(r.check_in_date&&r.check_out_date&&r.check_in_date<f.check_out_date&&r.check_out_date>f.check_in_date) conflictIds.add(String(r.room_id)); });
  const availRooms=validRange?rooms.filter(r=>!conflictIds.has(String(r.id))):rooms;
  const selUnavailable=validRange&&f.room_id&&conflictIds.has(String(f.room_id));
  const addDays=(d,n)=>{ const x=new Date(d+"T00:00:00"); x.setDate(x.getDate()+n); return x.toISOString().slice(0,10); };
  const setDur=(n)=>setF(s=>{ const start=s.check_in_date||new Date().toISOString().slice(0,10); return {...s,check_in_date:start,check_out_date:addDays(start,n)}; });
  return (
    <Modal title={rec?`Reservierung ${rec.code}`:"Neue Reservierung"} onClose={onClose}>
      <Field label="Zeitraum (Aufenthalt)">
        <div className="grid grid-cols-2 gap-3">
          <div><div className="text-xs text-slate-400 mb-1">Von (Check-in)</div><input type="date" className={inputCls} value={f.check_in_date} onChange={e=>u("check_in_date",e.target.value)}/></div>
          <div><div className="text-xs text-slate-400 mb-1">Bis (Check-out)</div><input type="date" className={inputCls} min={f.check_in_date||undefined} value={f.check_out_date} onChange={e=>u("check_out_date",e.target.value)}/></div>
        </div>
        <div className="flex flex-wrap gap-1 mt-2"><span className="text-xs text-slate-400 mr-1">Dauer ab Check-in:</span>{[["1 Woche",7],["2 Wochen",14],["4 Wochen",28],["3 Monate",90]].map(([l,n])=><button key={l} type="button" onClick={()=>setDur(n)} className="text-xs px-2 py-1 rounded-lg bg-slate-100 text-slate-600 font-semibold">+{l}</button>)}</div>
        {f.check_in_date&&f.check_out_date&&f.check_in_date>=f.check_out_date&&<p className="text-xs text-rose-600 mt-1">Check-out muss nach Check-in liegen.</p>}
      </Field>
      <Field label="Gast / Firma"><input className={inputCls} value={f.guest_name} onChange={e=>u("guest_name",e.target.value)}/></Field>
      <Field label="E-Mail"><input className={inputCls} value={f.guest_email} onChange={e=>u("guest_email",e.target.value)}/></Field>
      <Field label="Zimmer (nur im Zeitraum freie)"><select className={inputCls} value={f.room_id} onChange={e=>{const v=e.target.value;setF(s=>{const rm=rooms.find(x=>String(x.id)===String(v));return {...s,room_id:v,persons:s.persons||(rm?.capacity||"")};});}}>
        <option value="">{validRange?"— freies Zimmer wählen —":"— erst Zeitraum wählen —"}</option>
        {availRooms.map(r=><option key={r.id} value={r.id}>{r.room_number}{r.capacity?` (max ${r.capacity}P)`:""}</option>)}
        {selUnavailable&&selRoom&&<option value={f.room_id}>{selRoom.room_number} ⚠ im Zeitraum belegt</option>}</select>
        {validRange&&<p className={"text-xs mt-1 "+(availRooms.length?"text-slate-400":"text-rose-600")}>{availRooms.length} von {rooms.length} Zimmern im Zeitraum frei.</p>}
      </Field>
      <Field label="Belegung (Personen)">
        <input type="number" min="1" max={cap||undefined} className={inputCls} value={f.persons} onChange={e=>u("persons",e.target.value)} placeholder={cap?`max ${cap}`:"Anzahl Personen"}/>
        {cap?<p className={"text-xs mt-1 font-medium "+(pers>=cap?"text-emerald-600":pers>0?"text-amber-600":"text-slate-400")}>{pers?`${pers} von ${cap} Plätzen · ${pers>=cap?"voll belegt":"teilweise belegt"}`:`Zimmer für max. ${cap} Personen`}</p>:null}
      </Field>
      <div className="grid grid-cols-2 gap-3">
        <Field label="Kanal"><select className={inputCls} value={f.contact_channel} onChange={e=>u("contact_channel",e.target.value)}>
          <option value="">—</option><option>WhatsApp</option><option>SMS</option><option>E-Mail</option></select></Field>
        <Field label="Sprache"><select className={inputCls} value={f.preferred_language} onChange={e=>u("preferred_language",e.target.value)}>
          <option value="de">DE</option><option value="en">EN</option><option value="cs">CS</option><option value="sk">SK</option><option value="ru">RU</option></select></Field>
      </div>
      <label className="flex items-center gap-2 text-sm text-slate-600 mt-1 cursor-pointer">
        <input type="checkbox" checked={f.status==="provisional"} onChange={e=>u("status",e.target.checked?"provisional":"confirmed")} className="w-4 h-4 accent-amber-500"/>
        Vorläufige Reservierung (Anfrage – hält den Platz, noch nicht fest gebucht)
      </label>
      <div className="flex justify-end gap-2 mt-2"><Btn kind="soft" onClick={onClose}>Abbrechen</Btn>
        <Btn kind="ok" onClick={()=>{ if(!f.guest_name||!f.check_in_date||!f.check_out_date) return toast("Name + Zeitraum nötig","err");
          if(f.check_in_date>=f.check_out_date) return toast("Check-out muss nach Check-in liegen","err");
          if(selUnavailable) return toast("Zimmer ist im gewählten Zeitraum belegt","err"); onSave(f); }}>Speichern</Btn></div>
    </Modal>
  );
}

/* ============================ ROOMS ============================ */

function RoomForm({rec,objekte,onSave,onClose}) {
  const [f,setF]=useState({ room_number:rec?.room_number||"", objekt_id:rec?.objekt_id||"", capacity:rec?.capacity||1, status:rec?.status||"available",
    door_code:rec?.door_code||"", house_door_code:rec?.house_door_code||"", wifi_ssid:rec?.wifi_ssid||"", wifi_password:rec?.wifi_password||"",
    photos:Array.isArray(rec?.photos)?rec.photos:[], intro_video_url:rec?.intro_video_url||"", door_battery_changed_at:rec?.door_battery_changed_at||"" });
  const u=(k,v)=>setF(s=>({...s,[k]:v}));
  const [busy,setBusy]=useState(false);
  const uploadPhotos=async(files)=>{ if(!files||!files.length)return; setBusy(true); try{
    for(const file of files){ const path=`${rec?.id||"new"}/${Date.now()}-${file.name.replace(/[^\w.\-]/g,"_")}`;
      const {error}=await sb.storage.from("room-media").upload(path,file,{upsert:true,contentType:file.type||"image/jpeg"});
      if(error){err(error);continue;} const {data}=sb.storage.from("room-media").getPublicUrl(path);
      setF(s=>({...s,photos:[...(s.photos||[]),data.publicUrl]})); } }finally{ setBusy(false); } };
  const [vbusy,setVbusy]=useState(false);
  const uploadVideo=async(file)=>{ if(!file)return; setVbusy(true); try{
    const path=`${rec?.id||"new"}/video-${Date.now()}-${file.name.replace(/[^\w.\-]/g,"_")}`;
    const {error}=await sb.storage.from("room-media").upload(path,file,{upsert:true,contentType:file.type||"video/mp4"});
    if(error){err(error);return;} const {data}=sb.storage.from("room-media").getPublicUrl(path);
    u("intro_video_url",data.publicUrl); toast("Video hochgeladen"); }finally{ setVbusy(false); } };
  return (
    <Modal title={rec?`Zimmer ${rec.room_number}`:"Neues Zimmer"} onClose={onClose}>
      <Field label="Zimmer-Bezeichnung"><input className={inputCls} value={f.room_number} onChange={e=>u("room_number",e.target.value)}/></Field>
      <div className="grid grid-cols-2 gap-3">
        <Field label="Haus"><select className={inputCls} value={f.objekt_id} onChange={e=>u("objekt_id",e.target.value)}>
          <option value="">—</option>{objekte.map(o=><option key={o.id} value={o.id}>{o.code}</option>)}</select></Field>
        <Field label="Kapazität"><input type="number" min="1" className={inputCls} value={f.capacity} onChange={e=>u("capacity",e.target.value)}/></Field>
      </div>
      <div className="grid grid-cols-2 gap-3">
        <Field label="Zimmer-Türcode"><input className={inputCls} value={f.door_code} onChange={e=>u("door_code",e.target.value)}/></Field>
        <Field label="Haustür-Code"><input className={inputCls} value={f.house_door_code} onChange={e=>u("house_door_code",e.target.value)}/></Field>
      </div>
      <div className="grid grid-cols-2 gap-3">
        <Field label="WLAN"><input className={inputCls} value={f.wifi_ssid} onChange={e=>u("wifi_ssid",e.target.value)}/></Field>
        <Field label="WLAN-Passwort"><input className={inputCls} value={f.wifi_password} onChange={e=>u("wifi_password",e.target.value)}/></Field>
      </div>
      <Field label="Status"><select className={inputCls} value={f.status} onChange={e=>u("status",e.target.value)}>
        <option value="available">Frei</option><option value="occupied">Belegt</option><option value="maintenance">Wartung</option></select></Field>
      <Field label="Check-in / Lage-Video">
        <input className={inputCls} value={f.intro_video_url} onChange={e=>u("intro_video_url",e.target.value)} placeholder="https://… (YouTube-Link) – oder Video hochladen ↓"/>
        <div className="flex items-center gap-2 mt-2">
          <label className="text-xs px-3 py-1.5 rounded-lg bg-blue-100 text-blue-700 font-semibold cursor-pointer">{vbusy?"⏳ lädt…":"⬆ Video hochladen"}<input type="file" accept="video/*" className="hidden" onChange={e=>uploadVideo(e.target.files&&e.target.files[0])}/></label>
          {f.intro_video_url&&<a href={f.intro_video_url} target="_blank" rel="noreferrer" className="text-xs text-blue-600 underline">Vorschau</a>}
          {f.intro_video_url&&<button type="button" onClick={()=>u("intro_video_url","")} className="text-xs text-rose-600">entfernen</button>}
        </div>
      </Field>
      <Field label="Fotos (Zimmer)">
        <div className="flex flex-wrap gap-2 mb-2">{(f.photos||[]).map((url,i)=>(
          <div key={i} className="relative w-20 h-20 rounded-lg overflow-hidden border border-slate-200">
            <img src={url} alt="" className="w-full h-full object-cover"/>
            <button type="button" onClick={()=>setF(s=>({...s,photos:s.photos.filter((_,j)=>j!==i)}))} className="absolute top-0 right-0 bg-rose-600 text-white text-xs w-5 h-5 leading-5 text-center">×</button>
          </div>))}</div>
        <label className="text-xs px-2.5 py-1 rounded-lg bg-slate-100 text-slate-600 font-semibold cursor-pointer inline-block">{busy?"lädt…":"⬆ Fotos hinzufügen"}<input type="file" accept="image/*" multiple className="hidden" onChange={e=>uploadPhotos(e.target.files)}/></label>
      </Field>
      <Field label="Türschloss-Akku zuletzt gewechselt (nicht Nuki)">
        <div className="flex items-center gap-2">
          <input type="date" className={inputCls} value={f.door_battery_changed_at||""} onChange={e=>u("door_battery_changed_at",e.target.value)}/>
          <button type="button" onClick={()=>u("door_battery_changed_at",new Date().toISOString().slice(0,10))} className="text-xs px-2.5 py-1.5 rounded-lg bg-slate-100 text-slate-600 font-semibold whitespace-nowrap">Heute</button>
        </div>
      </Field>
      <div className="flex justify-end gap-2 mt-2"><Btn kind="soft" onClick={onClose}>Abbrechen</Btn><Btn kind="ok" onClick={()=>{if(!f.room_number)return toast("Bezeichnung nötig","err");onSave(f);}}>Speichern</Btn></div>
    </Modal>
  );
}

/* ============================ CHECK-INS ============================ */
function CheckIns({bump}) {
  const [rows,reload]=useList(loaders.checkins,[bump]);
  const [q,setQ]=useState("");
  const [idView,setIdView]=useState(null);
  const viewId=async(c)=>{ const paths=[c.id_card_url,c.id_card_back_url].filter(Boolean); if(!paths.length)return toast("Kein Ausweis hinterlegt","err"); const urls=[]; for(const p of paths){ const {data,error}=await sb.storage.from("id-cards").createSignedUrl(p,3600); if(error){err(error);continue;} if(data?.signedUrl)urls.push(data.signedUrl);} setIdView({name:c.full_name,urls}); };
  const viewVideo=async(c)=>{ if(!c.checkout_video_url)return toast("Kein Video hinterlegt","err"); const {data,error}=await sb.storage.from("checkout-videos").createSignedUrl(c.checkout_video_url,3600); if(error)return err(error); if(data?.signedUrl)window.open(data.signedUrl,"_blank"); };
  const [sort,setSort]=useState({key:"checked",dir:"desc"});
  if(!rows) return <Skeleton/>;
  const ql=q.trim().toLowerCase();
  const shown=rows.filter(c=>!ql||[c.full_name,c.email,c.phone,c.reservations?.guest_name].some(v=>(v||"").toLowerCase().includes(ql)));
  const setVideoOk=async(c,ok)=>{ const {error}=await sb.from("check_ins").update({checkout_video_ok:ok,checkout_video_analyzed_at:new Date().toISOString()}).eq("id",c.id); if(error)return err(error); toast(ok?"Video als OK markiert":"Video beanstandet"); reload(); };
  const th="text-left p-3 whitespace-nowrap";
  const acc={guest:c=>(c.full_name||"").toLowerCase(),firma:c=>(c.reservations?.guest_name||"").toLowerCase(),room:c=>roomShort(c.reservations?.rooms?.room_number),checked:c=>c.checked_in_at||""};
  const sorted=[...shown].sort((a,b)=>{const f=acc[sort.key];if(!f)return 0;const av=f(a),bv=f(b);return (av<bv?-1:av>bv?1:0)*(sort.dir==="asc"?1:-1);});
  const Th=({k,children})=>{const on=sort.key===k;return <th onClick={()=>setSort(s=>({key:k,dir:on&&s.dir==="asc"?"desc":"asc"}))} className={th+" cursor-pointer select-none hover:text-slate-700"}>{children}{on?(sort.dir==="asc"?" ▲":" ▼"):""}</th>;};
  return (
    <div className="space-y-4">
      <PageHead title="Check-ins" sub={`${rows.length} (max 50) · live`}/>
      <input value={q} onChange={e=>setQ(e.target.value)} placeholder="🔍 Name, Firma, E-Mail, Telefon…" className="w-full border border-slate-300 rounded-lg px-3 py-1.5 text-sm"/>
      <Card className="overflow-x-auto"><table className="w-full text-sm">
        <thead className="bg-slate-50 text-slate-500 text-xs uppercase"><tr>
          <Th k="guest">Gast</Th><Th k="firma">Firma</Th><th className={th}>Kontakt</th><Th k="room">Zimmer</Th>
          <Th k="checked">Eingecheckt</Th><th className={th}>Ausweis</th><th className={th}>Check-in</th><th className={th}>Check-out-Video</th><th className={th}>Video-Analyse</th></tr></thead>
        <tbody>{sorted.map(c=>{ const ciDone=!!c.agreed_to_rules; const vid=!!c.checkout_completed_at||!!c.checkout_video_url; return (
          <tr key={c.id} className="border-t border-slate-100 hover:bg-slate-50">
            <td className="p-3 font-semibold text-slate-800">{c.full_name}</td>
            <td className="p-3 text-slate-600">{c.reservations?.guest_name||"—"}</td>
            <td className="p-3 text-slate-500 text-xs">{c.email}<br/>{c.phone}</td>
            <td className="p-3 text-slate-600">{roomShort(c.reservations?.rooms?.room_number)}</td>
            <td className="p-3 text-slate-600">{fmt(c.checked_in_at)}</td>
            <td className="p-3">{c.id_card_url?<button onClick={()=>viewId(c)} className="text-xs px-2 py-1 rounded bg-blue-100 text-blue-700 font-semibold">👁 Ansehen</button>:<span className="text-slate-400 text-xs">—</span>}</td>
            <td className="p-3">{ciDone?<Pill text="✓ abgeschlossen" cls="bg-emerald-100 text-emerald-700"/>:<Pill text="offen" cls="bg-amber-100 text-amber-700"/>}</td>
            <td className="p-3">{c.checkout_completed_at?<Pill text="abgeschlossen" cls="bg-emerald-100 text-emerald-700"/>:<Pill text="offen" cls="bg-amber-100 text-amber-700"/>}</td>
            <td className="p-3">{vid?<div className="flex items-center gap-1 flex-wrap">
              <button onClick={()=>viewVideo(c)} className="text-xs px-2 py-1 rounded bg-blue-100 text-blue-700 font-semibold">▶ Video</button>
              {c.checkout_video_ok===true?<Pill text="OK ✓" cls="bg-emerald-100 text-emerald-700"/>
                :c.checkout_video_ok===false?<Pill text="Beanstandet ✗" cls="bg-rose-100 text-rose-700"/>
                :<><button onClick={()=>setVideoOk(c,true)} className="text-xs px-2 py-1 rounded bg-emerald-600 text-white font-semibold">OK</button><button onClick={()=>setVideoOk(c,false)} className="text-xs px-2 py-1 rounded bg-rose-600 text-white font-semibold">✗</button></>}
            </div>:<span className="text-slate-400 text-xs">—</span>}</td>
          </tr>);})}
          {!shown.length&&<tr><td colSpan="9" className="p-6 text-center text-slate-400">Keine Treffer.</td></tr>}
        </tbody></table></Card>
      <p className="text-xs text-slate-400">„Video-Analyse" jetzt manuell (OK/✗) → später automatisch durch die KI-Auswertung; speist die 25 €-Cashback-Freigabe (Video + 5★-Google-Bewertung).</p>
      {idView&&<Modal title={"🪪 Ausweis · "+(idView.name||"")} onClose={()=>setIdView(null)}>
        {idView.urls.length? <div className="space-y-3">{idView.urls.map((u,i)=>(
          <a key={i} href={u} target="_blank" rel="noreferrer"><img src={u} alt={"Ausweis "+(i+1)} className="w-full rounded-lg border border-slate-200"/></a>))}
          <p className="text-xs text-slate-400">Klick aufs Bild öffnet es groß. Links sind ~1 Stunde gültig.</p></div>
          : <p className="text-sm text-slate-400">Ausweis-Bilder konnten nicht geladen werden.</p>}
      </Modal>}
    </div>
  );
}

/* ============================ EXTENSIONS ============================ */
function Extensions({bump}) {
  const [rows,reload]=useList(loaders.extensions,[bump]);
  if(!rows) return <Skeleton/>;
  const decide=async(e,ok)=>{ try{
    const {error}=await sb.from("extension_requests").update({status:ok?"approved":"rejected"}).eq("id",e.id); if(error)throw error;
    const resv=e.check_ins?.reservations; const origCheckout=resv?.check_out_date||"";
    if(ok){ if(resv?.code && e.requested_checkout_date){ await sb.from("reservations").update({check_out_date:e.requested_checkout_date}).eq("code",resv.code); } }
    if(resv?.code){ const {data:rd}=await sb.from("reservations").select("guest_email,guest_name,preferred_language").eq("code",resv.code).maybeSingle();
      if(rd?.guest_email) sendMail("extension_response",rd.guest_email,rd.preferred_language||"de",{guestName:rd.guest_name||e.check_ins?.full_name||"Gast",roomNumber:resv.rooms?.room_number||"",newCheckoutDate:ok?(e.requested_checkout_date||""):"",originalCheckoutDate:origCheckout,status:ok?"approved":"rejected",adminNotes:""}); }
    toast(ok?"Freigegeben – Auszug verschoben":"Abgelehnt"); reload(); }catch(er){err(er);} };
  return (
    <div className="space-y-4">
      <PageHead title="Verlängerungen" sub="Gast-Anfragen · Freigabe verschiebt den Auszugstermin."/>
      {!rows.length&&<Empty>Keine offenen Verlängerungs-Anfragen.</Empty>}
      {rows.map(e=>{const r=e.check_ins?.reservations;return(
        <Card key={e.id} className="p-4 flex flex-wrap items-center justify-between gap-3">
          <div><div className="font-semibold text-slate-800">{e.check_ins?.full_name||r?.code||"Gast"} <span className="text-xs text-slate-400 font-normal">· {roomShort(r?.rooms?.room_number)}</span></div>
            <div className="text-sm text-slate-500">Aktuell bis {fmt(r?.check_out_date)} → Wunsch: <b>{fmt(e.requested_checkout_date)}</b>{e.reason?` · ${e.reason}`:""}</div></div>
          {e.status==="pending"
            ? <div className="flex gap-2"><Btn kind="primary" onClick={()=>decide(e,true)}>Freigeben</Btn><Btn kind="soft" onClick={()=>decide(e,false)}>Ablehnen</Btn></div>
            : <Pill text={e.status==="approved"?"Freigegeben ✓":"Abgelehnt"} cls={e.status==="approved"?"bg-emerald-100 text-emerald-700":"bg-slate-200 text-slate-500"}/>}
        </Card>);})}
    </div>
  );
}

/* ============================ CLEANING ============================ */
function Cleaning({bump}) {
  const [orders,reloadO]=useList(loaders.orders,[bump]);
  const [reports,reloadR]=useList(loaders.reports,[bump]);
  const [ritems]=useList(loaders.reportItems,[bump]);
  const [objekte,reloadObj]=useList(loaders.objekte,[bump]);
  const [rooms]=useList(loaders.rooms,[bump]);
  const [res]=useList(loaders.reservations,[bump]);
  const [nuki]=useList(loaders.nuki,[bump]);
  const [hEdit,setHEdit]=useState(null);
  const [newOrder,setNewOrder]=useState(false);
  const [repView,setRepView]=useState(null);
  const cleanLink=(t)=>(typeof window!=="undefined"?window.location.origin:"")+"/?clean="+t;
  if(!orders||!reports||!ritems||!objekte||!nuki||!rooms||!res) return <Skeleton/>;
  const worstBy={}; ritems.forEach(it=>{ worstBy[it.report_id]=Math.max(worstBy[it.report_id]||0,it.rating||0); });
  const flagBad=async(r,worst)=>{ try{ const {error}=await sb.from("cleaning_reports").update({extra_cleaning_at:new Date().toISOString(),updated_at:new Date().toISOString()}).eq("id",r.id); if(error)throw error;
    try{ await sbImmo.from("tasks").insert({description:`Reinigung mangelhaft (Bewertung ${worst}/5): ${r.cleaning_objekte?.code||"—"} · ${r.cleaner_name||""} (${fmt(r.submitted_at)}) → Nachreinigung + Zusatzkosten der Firma berechnen`,priority:"high",flag:"help"}); }catch(e){}
    toast("An Slavik (IMMODAY) übergeben + als Zusatzkosten markiert"); reloadR(); }catch(e){err(e);} };
  const archiveOrder=async(o)=>{ const {error}=await sb.from("cleaning_orders").update({archived_at:new Date().toISOString()}).eq("id",o.id);
    if(error)return err(error); toast("Auftrag archiviert"); reloadO(); };
  const saveHouse=async(f)=>{ try{ const p={code:f.code,name:f.name||null,address:f.address||null,wifi_ssid:f.wifi_ssid||null,wifi_password:f.wifi_password||null,description:f.description||null,google_review_url:f.google_review_url||null,inspection_items:Array.isArray(f.inspection_items)?f.inspection_items:[],cleaning_checklist:Array.isArray(f.cleaning_checklist)?f.cleaning_checklist:[],updated_at:new Date().toISOString()};
    if(hEdit==="new"){ const {error}=await sb.from("cleaning_objekte").insert(p); if(error)throw error; toast("Haus angelegt"); }
    else { const {error}=await sb.from("cleaning_objekte").update(p).eq("id",hEdit.id); if(error)throw error; toast("Haus gespeichert"); }
    setHEdit(null); reloadObj(); }catch(e){err(e);} };
  return (
    <div className="space-y-6">
      <PageHead title="Reinigung & Häuser" sub="Live aus Supabase."/>
      <Card className="p-5">
        <h2 className="font-semibold text-slate-800 mb-1">🗓 Reinigungskalender</h2>
        <p className="text-xs text-slate-400 mb-4">Letzte & nächste Reinigung pro Haus. „Überfällig" = nächster Termin liegt in der Vergangenheit (Haus bleibt aktiv).</p>
        <div className="space-y-4">{objekte.map(o=>{
          const reps=reports.filter(r=>r.objekt_id===o.id).map(r=>r.submitted_at).filter(Boolean).sort();
          const last=reps[reps.length-1];
          const ords=orders.filter(x=>x.objekt_id===o.id && x.zu_reinigen_bis).map(x=>x.zu_reinigen_bis).sort();
          const next=ords[0];
          const lastAgo=last?Math.round((TODAY-new Date(new Date(last).toDateString()))/86400000):null;
          const overdue=next?daysFromToday(next)<0:false;
          const start=new Date(TODAY.getTime()-35*86400000), end=new Date(TODAY.getTime()+21*86400000);
          const pct=(d)=>Math.max(0,Math.min(100,((new Date(d)-start)/(end-start))*100));
          return (
            <div key={o.id}>
              <div className="flex justify-between text-sm mb-1 flex-wrap gap-1">
                <span className="font-semibold text-slate-700">{o.code}</span>
                <span className="text-slate-500">{last?`Letzte: ${fmtShort(last)} (vor ${lastAgo} T.)`:"Letzte: —"} · {next?<span className={overdue?"text-rose-600 font-semibold":""}>Nächste: {fmtShort(next)}{overdue?" (überfällig)":""}</span>:<span>Nächste: —</span>}</span>
              </div>
              <div className="relative h-6 bg-slate-100 rounded-full">
                <div className="absolute top-0 bottom-0 w-0.5 bg-slate-400" style={{left:pct(TODAY)+"%"}}></div>
                {last&&<div title={"zuletzt "+fmtShort(last)} className="absolute top-1/2 -translate-y-1/2 -translate-x-1/2 w-3 h-3 rounded-full bg-emerald-500 border-2 border-white" style={{left:pct(last)+"%"}}></div>}
                {next&&<div title={"nächste "+fmtShort(next)} className={"absolute top-1/2 -translate-y-1/2 -translate-x-1/2 w-3 h-3 rounded-full border-2 border-white "+(overdue?"bg-rose-500":"bg-blue-500")} style={{left:pct(next)+"%"}}></div>}
              </div>
            </div>);})}
        </div>
        <div className="flex gap-4 text-xs text-slate-400 pt-3"><span><span className="inline-block w-2.5 h-2.5 rounded-full bg-emerald-500 align-middle mr-1"></span>letzte</span><span><span className="inline-block w-2.5 h-2.5 rounded-full bg-blue-500 align-middle mr-1"></span>nächste</span><span><span className="inline-block w-3 h-0.5 bg-slate-400 align-middle mr-1"></span>heute</span></div>
      </Card>
      <Card className="p-5">
        <div className="flex items-center justify-between mb-3"><h2 className="font-semibold text-slate-800">🧹 Offene Aufträge ({orders.length})</h2><Btn size="sm" onClick={()=>setNewOrder(true)}>+ Auftrag anlegen</Btn></div>
        <div className="space-y-2">{orders.map(o=>(
          <div key={o.id} className="border border-slate-200 rounded-xl px-4 py-3">
            <div className="flex flex-wrap items-center justify-between gap-2">
              <div><div className="font-medium text-slate-800">{o.cleaning_objekte?.code||"—"} · {Array.isArray(o.items_to_clean)?o.items_to_clean.length:0} Position(en){o.report_id&&reports.find(r=>r.id===o.report_id&&r.submitted_at)?<span className="ml-1 text-emerald-600 text-xs">· ✓ erledigt</span>:null}</div>
                <div className="text-xs text-slate-400">{o.moeglich_ab?`möglich ab: ${fmt(o.moeglich_ab)} · `:""}zu reinigen bis: {fmt(o.zu_reinigen_bis)}{o.kommentar?` · ${o.kommentar}`:""}</div></div>
              <div className="flex gap-2">
                <Btn kind="soft" size="sm" onClick={()=>{navigator.clipboard.writeText(cleanLink(o.token)); toast("Cleaner-Link kopiert");}}>🔗 Link</Btn>
                <Btn kind="soft" size="sm" onClick={()=>archiveOrder(o)}>Archivieren</Btn>
              </div>
            </div>
            {Array.isArray(o.items_to_clean)&&o.items_to_clean.length>0&&<div className="mt-2 flex flex-wrap gap-1">{o.items_to_clean.map((it,k)=><span key={k} className="text-[11px] px-2 py-0.5 rounded-full bg-slate-100 text-slate-600">{it.item_label}</span>)}</div>}
          </div>))}
          {!orders.length&&<div className="text-sm text-slate-400">Keine offenen Aufträge.</div>}</div>
      </Card>
      <Card className="p-5">
        <h2 className="font-semibold text-slate-800 mb-1">📋 Reports ({reports.length}, neueste)</h2>
        <p className="text-xs text-slate-400 mb-3">Bewertung pro Reinigung (1 = top … 5 = schlecht). Ab <b>3</b> = Mangel → an Slavik + Zusatzkosten der Firma.</p>
        <div className="space-y-2 max-h-80 overflow-auto">{reports.map(r=>{const worst=worstBy[r.id]||0;const bad=worst>=3;return(
          <div key={r.id} className={"flex flex-wrap items-center justify-between gap-2 rounded-xl px-4 py-2 border "+(bad?"border-rose-300 bg-rose-50":r.damage_noticed?"border-rose-200 bg-rose-50":"border-slate-200")}>
            <div><div className="font-medium text-slate-800 text-sm">{r.cleaning_objekte?.code||"—"} <span className="text-xs text-slate-400 font-normal">· {fmt(r.submitted_at)} · {r.cleaner_name||"—"}</span></div>
              {r.damage_noticed&&<div className="text-xs text-rose-600">⚠️ Schaden: {r.damage_description||"gemeldet"}</div>}</div>

      <div className="text-xs text-slate-400 mt-1">{items.length} Position(en) ausgewählt</div>

    <div className="mt-4 flex justify-end gap-2"><Btn kind="soft" onClick={onClose}>Abbrechen</Btn><Btn kind="ok" onClick={create} disabled={busy}>{busy?"…":"Auftrag erstellen"}</Btn></div>
  </Modal>);

function HouseForm({rec,onSave,onClose}){

function Occupancy({bump}) {
  const [rooms]=useList(loaders.rooms,[bump]);
  const [res]=useList(loaders.reservations,[bump]);
  const [dim,setDim]=useState("total");
  const [sel,setSel]=useState("__all__");
  const [win,setWin]=useState(12);
  if(!rooms||!res) return <Skeleton/>;
  const roomHouse={}; rooms.forEach(r=>roomHouse[r.id]=r.cleaning_objekte?.code||"—");
  const now=new Date(); const months=[];
  for(let i=-(win-4);i<4;i++){ const d=new Date(now.getFullYear(),now.getMonth()+i,1); months.push(`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`); }
  const mset=new Set(months);
  const md={}; months.forEach(m=>md[m]={total:0,byHouse:{},byCompany:{}});
  const houses=new Set(), companies=new Set();
  res.forEach(r=>{ if(!r.room_id||!r.check_in_date||!r.check_out_date) return;
    const house=roomHouse[r.room_id]||"—", comp=r.guest_name||r.code||"—"; houses.add(house); companies.add(comp);
    let d=new Date(r.check_in_date); const end=new Date(r.check_out_date); let g=0;
    while(d<end && g<400){ const m=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`;
      if(mset.has(m)){ md[m].total++; md[m].byHouse[house]=(md[m].byHouse[house]||0)+1; md[m].byCompany[comp]=(md[m].byCompany[comp]||0)+1; }
      d.setDate(d.getDate()+1); g++; } });
  const srcOf=(m)=> dim==="house"?md[m].byHouse: dim==="company"?md[m].byCompany: null;
  const roomsTotal=rooms.length;
  const roomsPerHouse={}; rooms.forEach(r=>{const h=roomHouse[r.id]||"—"; roomsPerHouse[h]=(roomsPerHouse[h]||0)+1;});
  const daysInMonth=(m)=>{const a=m.split("-"); return new Date(+a[0],+a[1],0).getDate();};
  const capFor=()=> (dim==="house"&&sel!=="__all__")?(roomsPerHouse[sel]||0):roomsTotal;
  const nightsFor=(m)=>{ if(dim==="total") return md[m].total; const s=srcOf(m); return sel==="__all__"?Object.values(s).reduce((a,b)=>a+b,0):(s[sel]||0); };
  // Belegung pro Zimmer: belegte Zimmernächte / verfügbare Zimmernächte (Zimmer × Tage). Alle Zimmer vermietet = 100%.
  const valueFor=(m)=>{ const denom=capFor()*daysInMonth(m); return denom?Math.min(100,Math.round(nightsFor(m)/denom*100)):0; };
  const maxV=100;
  const options=dim==="house"?[...houses].sort(): dim==="company"?[...companies].sort():[];
  const breakdown={}; if(dim!=="total"){ months.forEach(m=>{ Object.entries(srcOf(m)).forEach(([k,v])=>breakdown[k]=(breakdown[k]||0)+v); }); }
  const winDays=months.reduce((a,m)=>a+daysInMonth(m),0);
  const brRows=Object.entries(breakdown).map(([k,nights])=>{const cap=(dim==="house")?(roomsPerHouse[k]||0):roomsTotal;const p=cap&&winDays?Math.min(100,Math.round(nights/(cap*winDays)*100)):0;return [k,nights,p];}).sort((a,b)=>b[2]-a[2]);
  const windowTotal=months.reduce((a,m)=>a+md[m].total,0);
  const occ=rooms.length?Math.round(rooms.filter(r=>r.status==="occupied").length/rooms.length*100):0;
  const fmtMonth=(m)=>{const [y,mo]=m.split("-");return new Date(+y,+mo-1,1).toLocaleDateString("de-DE",{month:"short"});};
  const dimBtn=(k,l)=><button key={k} onClick={()=>{setDim(k);setSel("__all__");}} className={"px-3 py-1.5 rounded-lg text-xs font-semibold "+(dim===k?"bg-blue-600 text-white":"bg-slate-100 text-slate-600")}>{l}</button>;
  return (
    <div className="space-y-6">
      <PageHead title="Auslastung & Umsatz" sub="Belegung pro Zimmer (%) — alle Zimmer vermietet = 100%. Umsatz folgt mit Qonto."/>
      <div className="grid grid-cols-2 lg:grid-cols-4 gap-4">
        <Card className="p-5"><div className="text-3xl font-bold text-slate-800">{occ}%</div><div className="text-sm text-slate-500">Belegung heute</div></Card>
        <Card className="p-5"><div className="text-3xl font-bold text-slate-800">{rooms.filter(r=>r.status==="occupied").length}</div><div className="text-sm text-slate-500">belegte Zimmer</div></Card>
        <Card className="p-5"><div className="text-3xl font-bold text-slate-800">{windowTotal}</div><div className="text-sm text-slate-500">Zimmernächte (12 Mon.)</div></Card>
        <Card className="p-5"><div className="text-3xl font-bold text-slate-400">€ —</div><div className="text-sm text-slate-500">Umsatz (Qonto folgt)</div></Card>
      </div>
      <Card className="p-5">
        <div className="flex items-center justify-between flex-wrap gap-2 mb-4">
          <h2 className="font-semibold text-slate-800">Belegung pro Monat (%)</h2>
          <div className="flex items-center gap-2 flex-wrap">
            <select value={win} onChange={e=>setWin(+e.target.value)} className="border border-slate-300 rounded-lg px-2 py-1.5 text-xs"><option value={6}>6 Mon.</option><option value={12}>12 Mon.</option><option value={24}>24 Mon.</option></select>
            <div className="flex gap-1">{dimBtn("total","Gesamt")}{dimBtn("house","Nach Haus")}{dimBtn("company","Nach Firma")}</div>
            {dim!=="total"&&<select value={sel} onChange={e=>setSel(e.target.value)} className="border border-slate-300 rounded-lg px-2 py-1.5 text-xs"><option value="__all__">Alle</option>{options.map(o=><option key={o} value={o}>{o}</option>)}</select>}
          </div>
        </div>
        <div className="flex items-end gap-2 h-48 overflow-x-auto">{months.map(m=>{const v=valueFor(m);const cur=m===`${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,"0")}`;return(
          <div key={m} className="flex-1 min-w-[40px] flex flex-col items-center justify-end h-full">
            <div className="text-xs font-semibold text-slate-700">{v?v+"%":""}</div>
            <div className={"w-full rounded-t-lg "+(cur?"bg-blue-600":"bg-blue-400")} style={{height:(v/maxV*100)+"%"}}></div>
            <div className="text-[10px] text-slate-500 mt-1">{fmtMonth(m)}</div>
          </div>);})}</div>
      </Card>
      {dim!=="total"&&<Card className="p-5">
        <h2 className="font-semibold text-slate-800 mb-3">{dim==="house"?"Nach Haus":"Nach Firma"} · Ø Belegung ({win} Mon.)</h2>
        <div className="space-y-2">{brRows.map(([k,nights,p])=>{return(
          <div key={k}><div className="flex justify-between text-sm mb-1"><button onClick={()=>setSel(sel===k?"__all__":k)} className={"font-semibold text-left hover:underline "+(sel===k?"text-blue-700":"text-slate-700")}>{k}</button><span className="text-slate-500">{p}% · {nights} N.</span></div>
            <div className="h-2.5 bg-slate-100 rounded-full overflow-hidden"><div className="h-full bg-blue-500" style={{width:p+"%"}}></div></div></div>);})}
          {!brRows.length&&<p className="text-sm text-slate-400">Keine Daten im Zeitraum.</p>}</div>
      </Card>}
    </div>
  );
}

const mmTranslate=async(text,from,to)=>{ try{
  const res=await fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(text)}&langpair=${from}|${to}`);
  const j=await res.json(); const t=j&&j.responseData&&j.responseData.translatedText;
  return (t&&!/MYMEMORY WARNING|QUERY LENGTH LIMIT/i.test(t))?t:text;
}catch(e){ return text; } };

function HouseRulesEditor() {
  const [rules,setRules]=useState(null); const [busy,setBusy]=useState(false);
  useEffect(()=>{ sb.from("settings").select("value").eq("key","house_rules").maybeSingle().then(({data})=>setRules(Array.isArray(data?.value)?data.value:[])); },[]);
  if(!rules) return <Card className="p-5"><div className="skel h-20"/></Card>;
  const setDe=(i,v)=>setRules(rs=>rs.map((r,j)=>j===i?{...r,de:v}:r));
  const add=()=>setRules(rs=>[...rs,{de:""}]);
  const remove=(i)=>setRules(rs=>rs.filter((_,j)=>j!==i));
  const save=async()=>{ const clean=rules.filter(r=>(r.de||"").trim());
    const {error}=await sb.from("settings").update({value:clean,updated_at:new Date().toISOString()}).eq("key","house_rules");
    if(error)return err(error); setRules(clean); toast("Hausregeln gespeichert (DE)"); };
  const translate=async()=>{ setBusy(true); try{ const targets=["en","cs","sk","ru"]; const out=[];
    for(const r of rules){ const de=(r.de||"").trim(); if(!de) continue; const obj={de};
      for(const t of targets){ obj[t]=await mmTranslate(de,"de",t); } out.push(obj); }
    const {error}=await sb.from("settings").update({value:out,updated_at:new Date().toISOString()}).eq("key","house_rules"); if(error)throw error;
    setRules(out); toast("Übersetzt & gespeichert (DE→EN/CS/SK/RU)"); }catch(e){err(e);} setBusy(false); };
  return (
    <Card className="p-5">
      <div className="flex items-center justify-between mb-3 flex-wrap gap-2">
        <h2 className="font-semibold text-slate-800">📋 Hausregeln <span className="text-xs text-slate-400 font-normal">· Pflege auf Deutsch</span></h2>
        <div className="flex gap-2"><Btn kind="soft" size="sm" onClick={add}>+ Regel</Btn><Btn kind="ok" size="sm" onClick={save}>Speichern</Btn></div></div>
      <div className="space-y-2">{rules.map((r,i)=>(
        <div key={i} className="flex gap-2 items-start"><span className="text-xs text-slate-400 pt-2.5 w-5 text-right">{i+1}.</span>

            <div className="mt-0.5">{(r.en&&r.cs&&r.sk&&r.ru)?<span className="text-[11px] text-emerald-600 font-medium">✓ übersetzt (EN/CS/SK/RU)</span>:<span className="text-[11px] text-amber-600 font-medium">⚠️ noch nicht übersetzt</span>}</div></div>
          <button onClick={()=>remove(i)} title="Löschen" className="text-rose-600 px-2 pt-2">🗑</button></div>))}
        {!rules.length&&<p className="text-sm text-slate-400">Noch keine Regeln. „+ Regel" zum Hinzufügen.</p>}</div>
      <div className="mt-4 pt-4 border-t border-slate-100 flex items-center gap-3 flex-wrap">
        <Btn kind="primary" onClick={translate}>{busy?"Übersetzt…":"🌐 Jetzt übersetzen (DE → EN/CS/SK/RU)"}</Btn>
        <span className="text-xs text-slate-400">Gäste sehen die Regeln automatisch in ihrer Sprache.</span></div>
    </Card>
  );
}

function IdShot({label,file,onFile}){
  return (<label className={"flex flex-col items-center justify-center gap-1 rounded-xl border-2 border-dashed p-3 cursor-pointer text-center "+(file?"border-emerald-400 bg-emerald-50":"border-slate-300 bg-slate-50")}>
    <span className="text-2xl">{file?"✓":"📷"}</span>
    <span className={"text-xs font-semibold "+(file?"text-emerald-700":"text-slate-500")}>{file?label+" ✓":label}</span>
    {file&&<span className="text-[10px] text-slate-400 truncate max-w-[120px]">{file.name||"Foto"}</span>}
    <input type="file" accept="image/*" capture="environment" className="hidden" onChange={e=>{const f=e.target.files&&e.target.files[0]; if(f) onFile(f);}}/>

}
function CheckinWizard({booking,room,lang,onDone,onReset}){

  const [busy,setBusy]=useState(false),[dupWarn,setDupWarn]=useState(false);

  const submit=async()=>{ setBusy(true);
    try{ const sizes=people.map(p=>p.front&&p.front.size).filter(Boolean); const dup=sizes.length!==new Set(sizes).size; const stamp=Date.now();
      for(let i=0;i<people.length;i++){ const p=people[i];
        const fp=`${booking.id}/p${i+1}_front_${stamp}.jpg`, bp=`${booking.id}/p${i+1}_back_${stamp}.jpg`;
        const u1=await sb.storage.from("id-cards").upload(fp,p.front,{upsert:true,contentType:p.front.type||"image/jpeg"}); if(u1.error)throw u1.error;
        const u2=await sb.storage.from("id-cards").upload(bp,p.back,{upsert:true,contentType:p.back.type||"image/jpeg"}); if(u2.error)throw u2.error;
        const {error}=await sb.from("check_ins").insert({reservation_id:booking.id,full_name:p.name.trim(),email:(p.email||people[0].email||"").trim(),phone:(p.phone||people[0].phone||"").trim(),birth_date:p.birth_date||null,birth_place:p.birth_place||null,id_card_url:fp,id_card_back_url:bp,agreed_to_rules:agreeRules,agreed_to_checkout_video:agreeVideo,checked_in_at:new Date().toISOString()}); if(error)throw error;
      }
      await sb.rpc("update_reservation_checkin",{p_code:booking.code,p_language:glang,p_persons:persons,p_is_used:true});
      if(dup){ setDupWarn(true); sb.from("guest_issues").insert({reservation_code:booking.code,room:room.room_number||null,category:"ID-Vorprüfung",message:"Mögliche Doppel-Ausweise beim Check-in (gleiche Bildgröße) – bitte im Admin prüfen."}).then(()=>{},()=>{}); }
      const link=(typeof window!=="undefined"?window.location.origin:"")+"/?code="+booking.code;
      sendMail("checkin_confirmation",(people[0].email||"").trim(),glang,{guestName:people[0].name||booking.guest_name||"Gast",roomNumber:room.room_number||"",doorCode:room.door_code||"",houseDoorCode:room.house_door_code||"",reservationCode:booking.code,checkInDate:booking.check_in_date||"",checkOutDate:booking.check_out_date||"",houseAddress:[room.cleaning_objekte?.name,room.cleaning_objekte?.address].filter(Boolean).join(" · "),wifiSsid:room.wifi_ssid||"",wifiPassword:room.wifi_password||"",youtubeDoorLink:room.intro_video_url||room.youtube_door_link||"",checkoutLink:link,extensionLink:link});
      setStep(5);
    }catch(e){ err(e); }
    setBusy(false);
  };
  const LANGS=[["de","Deutsch"],["en","English"],["cs","Čeština"],["sk","Slovenčina"],["ru","Русский"]];
  const addr=room.cleaning_objekte?.address||""; const houseName=room.cleaning_objekte?.name||"";
  const Shell=React.useRef(({children,footer,step})=>(<div className="min-h-screen p-4"><div className="max-w-md mx-auto py-4">

  if(step===2) return <Shell step={step} footer={<Btn className="flex-1" size="lg" disabled={!idsComplete} onClick={()=>idsComplete&&setStep(3)}>Weiter →</Btn>}>
    <p className="text-sm text-slate-600">Bitte je Person <b>Vorder- und Rückseite</b> des Ausweises fotografieren. Pflicht für alle {persons} Person(en).</p>
    {people.map((p,i)=>(<div key={i} className="rounded-xl border border-slate-200 p-3">
      <div className="text-xs font-bold text-slate-500 uppercase mb-2">{p.name||("Person "+(i+1))}</div>

        <IdShot label="Vorderseite" file={p.front} onFile={f=>upP(i,"front",f)}/>

    <div className={"rounded-xl p-2 text-xs text-center font-semibold "+(idsComplete?"bg-emerald-50 text-emerald-700":"bg-amber-50 text-amber-700")}>{idsComplete?"Alle Ausweise vollständig ✓":`${people.filter(p=>p.front&&p.back).length}/${persons} Ausweise vollständig`}</div>
  </Shell>;

  if(step===3) return <Shell step={step} footer={<Btn className="flex-1" size="lg" disabled={!agreeRules} onClick={()=>agreeRules&&setStep(4)}>Akzeptieren & Weiter →</Btn>}>
    <div className="rounded-xl bg-rose-50 border-2 border-rose-300 p-3 text-center"><div className="text-2xl">🚭</div><div className="font-bold text-rose-700">Rauchen strengstens verboten</div><div className="text-xs text-rose-600">Im gesamten Haus & in allen Zimmern.</div></div>

    </div>

    <div className="rounded-xl border border-slate-200 p-3 text-center">

  if(!booking) return (

  </div>);

              {issueSent

                : <div className="mt-2 space-y-2">

/* ============================ RECHNUNGSWESEN (Qonto) ============================ */
function SplitModal({inv,objekte,onClose,onSaved}) {
  const [rows,setRows]=useState(Array.isArray(inv.house_split)&&inv.house_split.length
    ? inv.house_split.map(s=>({house:s.house||"",amount:String(s.amount??"")}))
    : [{house:inv.house||"",amount:String(inv.amount??"")}]);
  const u=(i,k,v)=>setRows(rs=>rs.map((r,j)=>j===i?{...r,[k]:v}:r));
  const total=rows.reduce((a,r)=>a+(parseFloat(r.amount)||0),0);
  const target=+inv.amount||0;
  const save=async()=>{ const clean=rows.filter(r=>r.house&&r.amount).map(r=>({house:r.house,amount:parseFloat(r.amount)||0}));
    const {error}=await sb.from("qonto_invoices").update({house_split: clean.length>1?clean:null, updated_at:new Date().toISOString()}).eq("id",inv.id);
    if(error)return err(error); toast("Aufteilung gespeichert"); onSaved&&onSaved(); onClose(); };
  return (
    <Modal title={`Einnahmen auf Häuser aufteilen · ${inv.invoice_number||inv.company||""}`} onClose={onClose}>
      <p className="text-xs text-slate-500 mb-3">Rechnungsbetrag € {target.toLocaleString("de-DE")} auf mehrere Häuser verteilen (für die Auslastung „pro Haus"). Eine Zeile = ein Haus zugeordnet (keine Aufteilung).</p>
      <div className="space-y-2">{rows.map((r,i)=>(
