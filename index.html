              <button onClick={()=>setSplitFor(x)} className={"text-xs px-2.5 py-1 rounded-lg font-semibold "+(Array.isArray(x.house_split)&&x.house_split.length>1?"bg-indigo-100 text-indigo-700":"bg-slate-100 text-slate-600")}>⇄ Häuser aufteilen</button>
              <button onClick={()=>toggleArchive(x)} className="text-xs px-2.5 py-1 rounded-lg bg-slate-100 text-slate-600 font-semibold">{x.archived_at?"↩ Wiederherstellen":"📦 Archivieren"}</button>
              <button onClick={()=>toggleExcl(x)} className={"text-xs px-2.5 py-1 rounded-lg font-semibold "+(x.excluded?"bg-emerald-100 text-emerald-700":"bg-rose-100 text-rose-600")}>{x.excluded?"↩ Wieder einschließen":"🚫 Ausschließen"}</button>
            </div>
            <input defaultValue={x.comment||""} onBlur={e=>{if(e.target.value!==(x.comment||""))patch(x.id,{comment:e.target.value});}} placeholder="Kommentar…" className="w-full mt-2 border border-slate-200 rounded-lg px-3 py-1.5 text-sm"/>
            </React.Fragment>}
          </Card>);})}
          {!f.length&&<Empty>Keine Rechnungen für diese Filter.</Empty>}
        </div>
        <p className="text-xs text-slate-400">Status automatisch: „Erstellt" → nach 4 Tagen ohne Zahlung „Offen" → „Bezahlt" sobald Zahlung erfasst (Qonto / manuell). Belege liegen privat (nur für angemeldete Admins).</p>
      </React.Fragment>}
      {splitFor && <SplitModal inv={splitFor} objekte={objekte||[]} onClose={()=>setSplitFor(null)} onSaved={reload}/>}
    </div>
  );
}

/* ============================ GÄSTEKOMMUNIKATION ============================ */
function Gaestekommunikation({bump}){
  const [mode,setMode]=useState("firma");
  const [sel,setSel]=useState(null); // firma: company_id ; haus: thread_id
  const [q,setQ]=useState("");
  const [reply,setReply]=useState("");
  const [bcOpen,setBcOpen]=useState(false);
  const [bcBody,setBcBody]=useState(""); const [bcHouses,setBcHouses]=useState([]);
  const [companies]=useList(loaders.companies,[bump]);
  const [cThreads,reloadCT]=useList(loaders.companyThreads,[bump]);
  const [cMsgs,reloadCM]=useList(loaders.companyMsgs,[bump]);
  const [hThreads,reloadHT]=useList(loaders.houseThreads,[bump]);
  const [hMsgs,reloadHM]=useList(loaders.houseMsgs,[bump]);
  const [objekte]=useList(loaders.objekte,[bump]);
  useEffect(()=>{ const id=setInterval(()=>{reloadCM();reloadCT();reloadHM();reloadHT();},15000); return ()=>clearInterval(id); },[]);
  if(!companies||!cThreads||!cMsgs||!hThreads||!hMsgs) return <Skeleton/>;
  const reloadAll=()=>{reloadCM();reloadCT();reloadHM();reloadHT();};
  const msgs=mode==="firma"?cMsgs:hMsgs;
  const compName=(c)=>c.display_name||c.name||"Firma";
  const threadForCompany=(cid)=>cThreads.find(t=>String(t.company_id)===String(cid));
  const threadForHouse=(oid)=>hThreads.find(t=>String(t.objekt_id)===String(oid));
  const msgsOfThread=(tid)=>tid?msgs.filter(m=>m.thread_id===tid):[];
  const unreadOfThread=(tid)=>msgsOfThread(tid).filter(m=>m.sender!=="team"&&!m.read_at).length;
  const curThreadId=mode==="firma"?(threadForCompany(sel)?.id||null):(threadForHouse(sel)?.id||null);
  const selMsgs=msgsOfThread(curThreadId);
  const ql=q.trim().toLowerCase();
  const firmaList=companies.filter(c=>!ql||compName(c).toLowerCase().includes(ql)).map(c=>{const th=threadForCompany(c.id);return {key:String(c.id),label:compName(c),thread:th,unread:unreadOfThread(th?.id),last:th?.last_message_at||"",portal:c.portal_code};}).sort((a,b)=>(b.unread-a.unread)||b.last.localeCompare(a.last)||a.label.localeCompare(b.label));
  const hausList=(objekte||[]).filter(o=>(o.code||"").toUpperCase()!=="ANH51").filter(o=>!ql||(o.code||"").toLowerCase().includes(ql)||(o.name||"").toLowerCase().includes(ql)).map(o=>{const th=threadForHouse(o.id);return {key:String(o.id),label:o.code||o.name||"Haus",thread:th,unread:unreadOfThread(th?.id),last:th?.last_message_at||""};}).sort((a,b)=>(b.unread-a.unread)||b.last.localeCompare(a.last)||a.label.localeCompare(b.label));
  const list=mode==="firma"?firmaList:hausList;
  const selItem=list.find(i=>i.key===String(sel));
  const totalUnread=list.reduce((a,x)=>a+x.unread,0);
  const openItem=async(item)=>{ setSel(item.key); const tid=item.thread?.id; if(tid){ const tbl=mode==="firma"?"messages":"house_messages"; const ids=msgs.filter(m=>m.thread_id===tid&&m.sender!=="team"&&!m.read_at).map(m=>m.id); if(ids.length){ await sb.from(tbl).update({read_at:new Date().toISOString()}).in("id",ids); reloadAll(); } } };
  const send=async()=>{ if(!sel||!reply.trim())return;
    if(mode==="firma"){ let tid=threadForCompany(sel)?.id; if(!tid){ const {data,error}=await sb.from("company_threads").insert({company_id:sel,last_message_at:new Date().toISOString()}).select("id").single(); if(error)return err(error); tid=data.id; }
      const {error}=await sb.from("messages").insert({thread_id:tid,sender:"team",body:reply.trim(),type:"chat"}); if(error)return err(error);
      await sb.from("company_threads").update({last_message_at:new Date().toISOString()}).eq("id",tid);
      /* E-Mail-Benachrichtigung an die Firma übernimmt der DB-Trigger notify_company_on_team_message (mz-email) – keine Doppel-Mail hier. */
    } else { let tid=threadForHouse(sel)?.id; if(!tid){ const {data,error}=await sb.from("house_threads").insert({objekt_id:sel,last_message_at:new Date().toISOString()}).select("id").single(); if(error)return err(error); tid=data.id; }
      const {error}=await sb.from("house_messages").insert({thread_id:tid,sender:"team",author:"Team",body:reply.trim(),type:"chat"}); if(error)return err(error);
      await sb.from("house_threads").update({last_message_at:new Date().toISOString()}).eq("id",tid); }
    setReply(""); reloadAll(); };
  const sendBroadcast=async()=>{ if(!bcBody.trim()||!bcHouses.length)return toast("Text + mind. ein Haus wählen","err");
    const {error}=await sb.from("broadcasts").insert({body:bcBody.trim(),target_houses:bcHouses,created_by:"Jarne"}); if(error)return err(error);
    try{ const {data:rs}=await sb.from("reservations").select("companies(email), rooms(cleaning_objekte(code))").is("archived_at",null);
      const emails=new Set(); (rs||[]).forEach(r=>{ const code=r.rooms?.cleaning_objekte?.code; if(code&&bcHouses.includes(code)&&r.companies?.email) emails.add(r.companies.email); });
      emails.forEach(em=>sendMail("message_notification",em,"de",{title:"Info zu deiner Unterkunft",lead:"Wichtige Info zu deiner Unterkunft:",messageBody:bcBody.trim()}));
      toast("Aushang gesendet · "+emails.size+" Firma(en) per E-Mail benachrichtigt");
    }catch(e){ console.warn(e); toast("Aushang gesendet an "+bcHouses.length+" Haus/Häuser"); }
    setBcOpen(false); setBcBody(""); setBcHouses([]); };
  return (<div className="space-y-4">
    <PageHead title="Gästekommunikation" sub={`Chat pro Firma/Kunde oder pro Haus · ${totalUnread} ungelesen`} right={<Btn size="sm" onClick={()=>setBcOpen(true)}>📢 Aushang senden</Btn>}/>
    <div className="flex gap-1">{[["firma","Nach Firma/Kunde"],["haus","Nach Haus"]].map(([k,l])=>(
      <button key={k} onClick={()=>{setMode(k);setSel(null);setQ("");}} className={"px-3 py-1.5 rounded-lg text-sm font-semibold "+(mode===k?"bg-blue-600 text-white":"bg-slate-100 text-slate-600")}>{l}</button>))}</div>
    <div className="grid md:grid-cols-3 gap-4">
      <Card className="p-0 overflow-hidden md:col-span-1">
        <div className="p-2 border-b border-slate-100"><input value={q} onChange={e=>setQ(e.target.value)} placeholder={mode==="firma"?"🔍 Firma/Kunde suchen…":"🔍 Haus suchen…"} className="w-full border border-slate-200 rounded-lg px-2 py-1.5 text-sm"/></div>
        <div className="divide-y divide-slate-100 max-h-[58vh] overflow-y-auto">{list.map(it=>{const on=String(sel)===it.key;const lm=it.thread?msgsOfThread(it.thread.id).slice(-1)[0]:null;return(
          <button key={it.key} onClick={()=>openItem(it)} className={"w-full text-left px-3 py-2.5 border-l-4 hover:bg-slate-50 "+(on?"bg-blue-50 border-blue-500":it.unread>0?"bg-amber-50 border-amber-400":"border-transparent")}>
            <div className="flex items-center justify-between gap-2"><span className={"text-sm truncate "+(it.unread>0?"font-extrabold text-slate-900":"font-semibold text-slate-800")}>{it.unread>0?"🔵 ":""}{it.label}</span>{it.unread>0&&<span className="shrink-0"><Pill text={`${it.unread} neu`} cls="bg-amber-400 text-white"/></span>}</div>
            <div className="text-xs text-slate-400 truncate">{lm?(lm.sender==="team"?"Du: ":"")+(lm.body||"[Anhang]"):(it.thread?"—":"noch kein Chat – jetzt anschreiben")}</div>
            {it.portal&&<span role="button" onClick={(e)=>{e.stopPropagation();const u=window.location.origin+"/?firma="+it.portal;(navigator.clipboard?.writeText(u)||Promise.reject()).then(()=>toast("Chef-Link kopiert"),()=>window.prompt("Chef-Link:",u));}} className="inline-block mt-1 text-[10px] px-2 py-0.5 rounded bg-indigo-100 text-indigo-700 font-semibold cursor-pointer">🔗 Chef-Link kopieren</span>}
          </button>);})}
          {!list.length&&<div className="p-4 text-sm text-slate-400">Keine {mode==="firma"?"Firmen":"Häuser"} gefunden.</div>}
        </div>
      </Card>
      <Card className="p-0 md:col-span-2 flex flex-col min-h-[60vh]">
        {!sel?<div className="flex-1 flex items-center justify-center text-slate-400 text-sm p-6">{mode==="firma"?"Firma/Kunde links wählen, um zu chatten.":"Haus links wählen."}</div>:<React.Fragment>
          <div className="bg-slate-50 px-4 py-2 font-semibold text-slate-800 border-b border-slate-100">{selItem?selItem.label:""}</div>
          <div className="flex-1 overflow-y-auto p-4 space-y-2">{selMsgs.map(m=>{
            const lbl=({problem:"🛠 Problem",extension:"📅 Verlängerung",checkout:"🧳 Auscheck-Antrag",checkout_video:"🎥 Check-out-Video",wgb_request:"📋 WGB-Antrag",persons_change:"👥 Personenzahl-Änderung",info:"📢 Info"})[m.type]||m.type;
            const todo={extension:1,checkout:1,wgb_request:1,persons_change:1,problem:1}[m.type];
            if(todo){ const prob=m.type==="problem"; return (
              <div key={m.id} className={"rounded-xl border-l-4 px-3 py-2 text-sm "+(prob?"border-rose-600 bg-rose-50":"border-amber-500 bg-amber-50")}>
                <div className="flex items-center gap-2 mb-0.5 flex-wrap"><span className={"text-[10px] font-bold text-white rounded-full px-2 py-0.5 "+(prob?"bg-rose-600":"bg-amber-500")}>{prob?"🚨 Blockiert":"✅ To-do"}</span><span className={"text-[11px] font-bold "+(prob?"text-rose-700":"text-amber-700")}>{lbl}</span></div>
                <div className="text-slate-800">{m.body}</div>
                <div className="text-[10px] mt-1 text-slate-400">{m.author?m.author+" · ":""}{fmt(m.created_at)} · {prob?"🚨 automatisch an IMMODAY · Mihaela · Blockiert":"mit Mihaela/Jarne abstimmen"}</div>
              </div>);}
            return (
            <div key={m.id} className={"max-w-[80%] rounded-2xl px-3 py-2 text-sm "+(m.sender==="team"?"ml-auto bg-blue-600 text-white":"bg-slate-100 text-slate-800")}>
              {m.type&&m.type!=="chat"&&<div className={"text-[10px] font-semibold mb-0.5 "+(m.sender==="team"?"text-blue-100":"text-slate-500")}>{lbl}</div>}
              <div>{m.body}</div>{m.attachment_path&&<div className="text-[11px] mt-1 opacity-80">📎 Anhang</div>}
              <div className={"text-[10px] mt-1 "+(m.sender==="team"?"text-blue-100":"text-slate-400")}>{m.author?m.author+" · ":""}{fmt(m.created_at)}</div>
            </div>);})}
            {!selMsgs.length&&<div className="text-sm text-slate-400 text-center mt-6">Noch keine Nachrichten – schreib der Firma die erste Nachricht.</div>}
          </div>
          <div className="border-t border-slate-100 p-3 flex gap-2">
            <input value={reply} onChange={e=>setReply(e.target.value)} onKeyDown={e=>e.key==="Enter"&&send()} placeholder="Nachricht an die Firma…" className="flex-1 border border-slate-300 rounded-lg px-3 py-2 text-sm"/>
            <Btn kind="ok" onClick={send}>Senden</Btn>
          </div>
        </React.Fragment>}
      </Card>
    </div>
    {bcOpen&&<Modal title="📢 Aushang / Störung senden" onClose={()=>setBcOpen(false)}>
      <p className="text-xs text-slate-500 mb-2">Geht an alle Firmen, die in den gewählten Häusern aktuell Leute untergebracht haben.</p>
      <Field label="Nachricht"><textarea className={inputCls+" h-24"} value={bcBody} onChange={e=>setBcBody(e.target.value)} placeholder="z.B. FWS17: Wasser morgen 9–11 Uhr abgestellt."/></Field>
      <Field label="Häuser"><div className="flex flex-wrap gap-2">{(objekte||[]).map(o=>{const on=bcHouses.includes(o.code);return(
        <button key={o.id} type="button" onClick={()=>setBcHouses(on?bcHouses.filter(h=>h!==o.code):[...bcHouses,o.code])} className={"px-2.5 py-1 rounded-lg text-xs font-semibold "+(on?"bg-blue-600 text-white":"bg-slate-100 text-slate-600")}>{o.code}</button>);})}</div></Field>
      <div className="flex justify-end gap-2 mt-3"><Btn kind="soft" onClick={()=>setBcOpen(false)}>Abbrechen</Btn><Btn kind="ok" onClick={sendBroadcast}>Senden</Btn></div>
    </Modal>}
  </div>);
}

/* ============================ MELDUNGEN ============================ */
function Meldungen({bump}) {
  const [rows,reload]=useList(loaders.issues,[bump]);
  if(!rows) return <Skeleton/>;
  const resolve=async(x,done)=>{ const {error}=await sb.from("guest_issues").update({status:done?"done":"open",resolved_at:done?new Date().toISOString():null}).eq("id",x.id); if(error)return err(error); toast(done?"Erledigt":"Wieder offen"); reload(); };
  const open=rows.filter(r=>r.status!=="done"), closed=rows.filter(r=>r.status==="done");
  return (
    <div className="space-y-4">
      <PageHead title="Meldungen" sub={`${open.length} offen · ${rows.length} gesamt`}/>
      {!rows.length&&<Empty>Keine Meldungen.</Empty>}
      {[...open,...closed].map(x=>(
        <Card key={x.id} className={"p-4 flex flex-wrap items-center justify-between gap-3 "+(x.status==="done"?"opacity-60":"")}>
          <div><div className="font-semibold text-slate-800">{x.category||"Problem"} <span className="text-xs text-slate-400 font-normal">· {x.room||"—"} · {x.reservation_code||"—"} · {fmt(x.created_at)}</span></div>
            <div className="text-sm text-slate-600">{x.message}</div></div>
          {x.status==="done"?<Btn kind="soft" size="sm" onClick={()=>resolve(x,false)}>Wieder öffnen</Btn>:<Btn kind="ok" size="sm" onClick={()=>resolve(x,true)}>Erledigt</Btn>}
        </Card>))}
    </div>
  );
}

/* ============================ ANMELDUNGEN (WGB) ============================ */
function Anmeldungen({bump}){
  const [rows,reload]=useList(loaders.anmeldungen,[bump]);
  const [fHouse,setFHouse]=useState("");
  const [onlyOpen,setOnlyOpen]=useState(false);
  const [cfg,setCfg]=useState({});
  useEffect(()=>{ sb.from("settings").select("value").eq("key","wgb").maybeSingle().then(({data})=>{ if(data?.value) setCfg(data.value); }); },[]);
  if(!rows) return <Skeleton/>;
  const houseOf=(c)=> c.reservations?.rooms?.cleaning_objekte?.code || "—";
  const addrOf=(c)=> c.reservations?.rooms?.cleaning_objekte?.address || "";
  const houses=[...new Set(rows.map(houseOf))].filter(h=>h&&h!=="—").sort();
  const f=rows.filter(c=>(!fHouse||houseOf(c)===fHouse)&&(!onlyOpen||!c.wgb_issued_at));
  const issued=rows.filter(c=>c.wgb_issued_at).length;
  const markWgb=async(c,on)=>{ const {error}=await sb.from("check_ins").update({wgb_issued_at:on?new Date().toISOString():null}).eq("id",c.id); if(error)return err(error); toast(on?"WGB als ausgestellt markiert":"WGB zurückgesetzt"); reload(); };
  const saveBirth=async(c,field,val)=>{ const {error}=await sb.from("check_ins").update({[field]:val||null}).eq("id",c.id); if(error)return err(error); reload(); };
  const printWgb=(c)=>{ const esc=(s)=>String(s==null?"":s).replace(/[<>&]/g,m=>({"<":"&lt;",">":"&gt;","&":"&amp;"}[m]));
    const person=c.full_name||c.reservations?.guest_name||"—"; const firma=c.reservations?.guest_name||""; const haus=houseOf(c); const addr=addrOf(c); const einzug=c.reservations?.check_in_date;
    const wgName=cfg.wohnungsgeber_name||"JJ Real Estate GmbH"; const ort=cfg.ort||""; const today=new Date().toLocaleDateString("de-DE");
    const body=cfg.body||"Hiermit wird gemäß § 19 BMG bestätigt, dass die oben genannte(n) Person(en) in die oben genannte Wohnung eingezogen ist/sind.";
    const rowsHtml=[["Wohnungsgeber (Name)",wgName],["Anschrift Wohnungsgeber",cfg.wohnungsgeber_anschrift||""],cfg.eigentuemer?["Eigentümer (falls abweichend)",cfg.eigentuemer]:null,["Anschrift der Wohnung",haus+(addr?" – "+addr:"")],["Art des Vorgangs","Einzug"],["Einzugsdatum",einzug?fmt(einzug):"____________"],["Name der meldepflichtigen Person",person],["Geburtsdatum",c.birth_date?fmt(c.birth_date):"____________"],["Geburtsort",c.birth_place||"____________"],(firma&&firma!==person)?["Firma",firma]:null].filter(Boolean).map(r=>`<tr><td class="l">${esc(r[0])}:</td><td>${esc(r[1])}</td></tr>`).join("");
    const html=`<!doctype html><html><head><meta charset="utf-8"><title>Wohnungsgeberbestätigung</title><style>body{font-family:Arial,sans-serif;max-width:720px;margin:40px auto;color:#111;line-height:1.55}h1{font-size:20px;margin-bottom:0}.box{border:1px solid #999;border-radius:8px;padding:16px;margin-top:16px}table{width:100%;border-collapse:collapse}td{padding:6px 4px;vertical-align:top}.l{color:#555;width:42%}.sig{margin-top:56px;display:flex;justify-content:space-between}small{color:#666}</style></head><body><h1>Wohnungsgeberbestätigung</h1><small>gemäß § 19 Bundesmeldegesetz (BMG)</small><div class="box"><table>${rowsHtml}</table></div><p style="margin-top:20px">${esc(body)}</p><div class="sig"><div>____________________<br><small>${esc(ort)}${ort?", ":""}${today} · Ort, Datum</small></div><div>____________________<br><small>Unterschrift Wohnungsgeber</small></div></div><script>window.onload=function(){window.print()}<\/script></body></html>`;
    const w=window.open("","_blank"); if(!w){toast("Bitte Popups erlauben","err");return;} w.document.write(html); w.document.close(); if(!c.wgb_issued_at) markWgb(c,true); };
  const selCls="border border-slate-300 rounded-lg px-2 py-1.5 text-xs";
  return (<div className="space-y-4">
    <PageHead title="Anmeldungen" sub={`${issued}/${rows.length} mit Wohnungsgeberbescheinigung · wer ist in welchem Haus gemeldet`}/>
    <Card className="p-4"><div className="flex flex-wrap items-center gap-2">
      <span className="text-xs font-semibold text-slate-500">Filter:</span>
      <select value={fHouse} onChange={e=>setFHouse(e.target.value)} className={selCls}><option value="">Alle Häuser</option>{houses.map(h=><option key={h} value={h}>{h}</option>)}</select>
      <label className="text-xs text-slate-500 flex items-center gap-1 cursor-pointer ml-1"><input type="checkbox" checked={onlyOpen} onChange={e=>setOnlyOpen(e.target.checked)} className="accent-blue-600"/> nur ohne WGB</label>
    </div></Card>
    <Card className="overflow-x-auto"><table className="w-full text-sm">
      <thead className="bg-slate-50 text-slate-500 text-xs uppercase"><tr><th className="text-left p-3">Person</th><th className="text-left p-3">Firma</th><th className="text-left p-3">Haus</th><th className="text-left p-3">Zimmer</th><th className="text-left p-3">Einzug</th><th className="text-left p-3">Wohnungsgeberbescheinigung</th><th className="text-right p-3">Aktion</th></tr></thead>
      <tbody>{f.map(c=>(<tr key={c.id} className="border-t border-slate-100 hover:bg-slate-50">
        <td className="p-3"><div className="font-semibold text-slate-800">{c.full_name||"—"}</div>
          <div className="flex gap-1 mt-1"><input type="date" defaultValue={c.birth_date||""} onBlur={e=>{if(e.target.value!==(c.birth_date||""))saveBirth(c,"birth_date",e.target.value);}} title="Geburtsdatum" className="border border-slate-200 rounded px-1 py-0.5 text-[11px] w-32"/><input defaultValue={c.birth_place||""} onBlur={e=>{if(e.target.value!==(c.birth_place||""))saveBirth(c,"birth_place",e.target.value);}} placeholder="Geburtsort" className="border border-slate-200 rounded px-1 py-0.5 text-[11px] w-28"/></div></td>
        <td className="p-3 text-slate-600">{c.reservations?.guest_name||"—"}</td>
        <td className="p-3 text-slate-700">{houseOf(c)}{addrOf(c)?<span className="block text-xs text-slate-400">{addrOf(c)}</span>:null}</td>
        <td className="p-3 text-slate-600">{roomShort(c.reservations?.rooms?.room_number)}</td>
        <td className="p-3 text-slate-600 whitespace-nowrap">{fmt(c.reservations?.check_in_date)}</td>
        <td className="p-3">{c.wgb_issued_at?<Pill text={`ausgestellt ${fmt(c.wgb_issued_at)}`} cls="bg-emerald-100 text-emerald-700"/>:<Pill text="offen" cls="bg-amber-100 text-amber-700"/>}</td>
        <td className="p-3 text-right whitespace-nowrap">
          <button onClick={()=>printWgb(c)} className="text-xs px-2.5 py-1 rounded-lg bg-blue-100 text-blue-700 font-semibold">📄 WGB drucken</button>
          <button onClick={()=>markWgb(c,!c.wgb_issued_at)} className="text-xs px-2.5 py-1 rounded-lg bg-slate-100 text-slate-600 font-semibold ml-1">{c.wgb_issued_at?"↩ zurücksetzen":"✓ ausgestellt"}</button>
        </td>

function SigPad({onChange}){
  const ref=React.useRef(null); const drawing=React.useRef(false);
  const pos=(e)=>{ const c=ref.current; const r=c.getBoundingClientRect(); const t=e.touches&&e.touches[0]?e.touches[0]:e; return {x:(t.clientX-r.left)*(c.width/r.width), y:(t.clientY-r.top)*(c.height/r.height)}; };
  const start=(e)=>{ e.preventDefault(); drawing.current=true; const ctx=ref.current.getContext('2d'); const p=pos(e); ctx.beginPath(); ctx.moveTo(p.x,p.y); };
  const move=(e)=>{ if(!drawing.current)return; e.preventDefault(); const ctx=ref.current.getContext('2d'); const p=pos(e); ctx.lineWidth=2; ctx.lineCap='round'; ctx.strokeStyle='#0f172a'; ctx.lineTo(p.x,p.y); ctx.stroke(); };
  const end=()=>{ if(!drawing.current)return; drawing.current=false; onChange&&onChange(ref.current.toDataURL('image/png')); };
  const clear=()=>{ const c=ref.current; c.getContext('2d').clearRect(0,0,c.width,c.height); onChange&&onChange(null); };
  return (<div><canvas ref={ref} width={320} height={120} style={{touchAction:'none'}} className="border border-slate-300 rounded-lg w-full bg-white" onMouseDown={start} onMouseMove={move} onMouseUp={end} onMouseLeave={end} onTouchStart={start} onTouchMove={move} onTouchEnd={end}/><button type="button" onClick={clear} className="text-xs text-slate-500 mt-1 underline">Löschen</button></div>);
}

      const report={ objekt_id:d.order.objekt_id, cleaner_name:name.trim(), signature_data:sig||null, general_comments:gc||null, missing_supplies:ms, damage_noticed:dmg, damage_description:dmg?(dmgDesc||null):null, checklist_completed:checks, start_time:startRef.current, end_time:new Date().toISOString() };
      const outItems=items.map(it=>{ const media=[...(it.photos||[]),...(it.videos||[])]; return {item_id:it.item_id,item_label:it.item_label,selected:true,rating:it.rating,comment:it.comment||null,video_url:media.length?JSON.stringify(media):null,extra_minutes:it.rating>=3?(it.extra||0):0}; });
      const {data,error}=await sb.functions.invoke("submit-cleaning-report",{body:{report,items:outItems,damagePhotos:dmgPhotos,draft_id:d.order.report_id},headers:{"x-cleaning-order-token":token}});
      if(error)throw error; if(data&&data.error)throw new Error(data.error);
      setDone(true);
    }catch(e){ err(e);} setBusy(false);
  };
  if(d==="loading")return <div className="min-h-screen flex items-center justify-center text-slate-400">Lädt…</div>;
  if(d==="notfound")return <div className="min-h-screen flex items-center justify-center text-slate-400 text-sm p-4 text-center">Auftrag nicht gefunden oder abgelaufen.</div>;
  if(done)return (<div className="min-h-screen flex items-center justify-center p-4"><div className="bg-white rounded-2xl shadow p-8 text-center max-w-sm"><div className="text-5xl mb-3">✅</div><h2 className="text-lg font-bold text-slate-800">Danke!</h2><p className="text-sm text-slate-500 mt-1">Der Reinigungs-Report wurde übermittelt.</p></div></div>);
  const ratLabel=["","1 – Top sauber","2 – Gut","3 – Mängel","4 – Schlecht","5 – Sehr schlecht"];
  return (<div className="min-h-screen p-3 sm:p-4"><div className="max-w-lg mx-auto py-3 space-y-4">
    <div><h2 className="text-lg font-bold text-slate-800">🧹 Reinigung · {d.objekt?.code||d.objekt?.name||""}</h2>
      <p className="text-xs text-slate-400">Zu reinigen bis: {fmt(d.order?.zu_reinigen_bis)}{d.order?.kommentar?` · ${d.order.kommentar}`:""}</p></div>
    {d.order?.moeglich_ab&&<div className="bg-blue-50 border border-blue-200 rounded-xl px-4 py-3 text-sm text-blue-800 font-semibold">🚪 Zimmer frei / Zugang möglich ab: {new Date(d.order.moeglich_ab).toLocaleString("de-DE",{day:"2-digit",month:"2-digit",year:"numeric",hour:"2-digit",minute:"2-digit"})} Uhr</div>}
    <Card className="p-4"><Field label="Dein Name *"><input className={inputCls} value={name} onChange={e=>setName(e.target.value)} placeholder="Name der Reinigungskraft"/></Field></Card>
    <Card className="p-4"><h3 className="font-semibold text-slate-800 mb-2">Positionen (1 = top sauber … 5 = schlecht)</h3>
      <div className="space-y-3">{items.map((it,i)=>(
        <div key={i} className="border border-slate-200 rounded-xl p-3">
          <div className="font-medium text-slate-700 text-sm mb-2">{it.item_label}</div>
          <div className="flex gap-1 flex-wrap mb-2">{[1,2,3,4,5].map(n=><button key={n} onClick={()=>setRating(i,n)} className={"w-9 h-9 rounded-lg text-sm font-semibold "+(it.rating===n?(n>=3?"bg-rose-600 text-white":"bg-emerald-600 text-white"):"bg-slate-100 text-slate-500")}>{n}</button>)}<span className="text-xs text-slate-400 self-center ml-1">{ratLabel[it.rating]}</span></div>
          <input className={inputCls+" text-sm"} value={it.comment} onChange={e=>setComment(i,e.target.value)} placeholder="Kommentar (optional)"/>
          <div className="flex gap-1 mt-2">
            <label className="inline-flex items-center gap-1 text-xs px-2 py-1 rounded bg-slate-100 text-slate-600 font-semibold cursor-pointer">📷 Foto{it.photos.length?` (${it.photos.length})`:""}<input type="file" accept="image/*" multiple className="hidden" onChange={e=>addItemPhoto(i,e.target.files)}/></label>
            <label className={"inline-flex items-center gap-1 text-xs px-2 py-1 rounded font-semibold cursor-pointer "+(it.rating>=3&&!it.videos.length?"bg-rose-600 text-white":"bg-slate-100 text-slate-600")}>📹 Video{it.videos.length?` (${it.videos.length})`:""}<input type="file" accept="video/*" multiple className="hidden" onChange={e=>addItemVideo(i,e.target.files)}/></label>
          </div>
          {it.rating>=3&&<div className="mt-2 bg-rose-50 border border-rose-200 rounded-lg p-2 space-y-1">
            <div className="text-xs font-semibold text-rose-700">⚠️ Bewertung ≥ 3 → Video ist Pflicht{it.videos.length?" ✓":" (fehlt)"}</div>
            <div className="flex items-center gap-2"><span className="text-xs text-slate-600">Mehraufwand:</span><input type="number" min="0" value={it.extra||""} onChange={e=>setExtra(i,e.target.value)} className="w-20 border border-slate-300 rounded px-2 py-1 text-sm" placeholder="0"/><span className="text-xs text-slate-500">Min. extra</span></div>
          </div>}
        </div>))}
        {!items.length&&<div className="text-sm text-slate-400">Keine Positionen.</div>}</div>
    </Card>
    {chkList.length>0&&<Card className="p-4"><h3 className="font-semibold text-slate-800 mb-2">✅ Allgemeine Checkliste</h3>
      <div className="space-y-1">{chkList.map((c,k)=>(
        <label key={k} className={"flex items-center gap-2 text-sm px-2 py-1.5 rounded cursor-pointer "+(checks[c.label]?"bg-emerald-50":"hover:bg-slate-50")}>
          <input type="checkbox" checked={!!checks[c.label]} onChange={()=>toggleCheck(c.label)}/> <span className="text-slate-700">{c.label}</span>{c.required&&<span className="text-[10px] px-1.5 py-0.5 rounded-full bg-rose-100 text-rose-700 font-semibold">Pflicht</span>}</label>))}</div>
      {chkList.some(c=>c.required)&&<p className="text-[11px] text-slate-400 mt-1">Pflicht-Punkte müssen abgehakt sein.</p>}
    </Card>}
    <Card className="p-4"><label className="flex items-center gap-2 font-semibold text-slate-800"><input type="checkbox" checked={dmg} onChange={e=>setDmg(e.target.checked)}/> 🛠 Schaden / etwas kaputt?</label>
      {dmg&&<div className="mt-3 space-y-2">
        <textarea className={inputCls} rows={2} value={dmgDesc} onChange={e=>setDmgDesc(e.target.value)} placeholder="Was ist kaputt? Wo?"/>
        <label className="inline-flex items-center gap-1 text-sm px-3 py-2 rounded-lg bg-rose-600 text-white font-semibold cursor-pointer">📷 Foto vom Schaden hochladen<input type="file" accept="image/*" multiple className="hidden" onChange={e=>addDmgPhotos(e.target.files)}/></label>
        {upBusy&&<span className="text-xs text-slate-400 ml-2">lädt…</span>}
        {dmgPhotos.length>0&&<div className="flex flex-wrap gap-2 mt-1">{dmgPhotos.map((u,k)=><img key={k} src={u} alt="" className="w-16 h-16 object-cover rounded-lg border border-slate-200"/>)}</div>}
      </div>}
    </Card>
    <Card className="p-4">
      <Field label="Allgemeine Anmerkungen (optional)"><textarea className={inputCls} rows={2} value={gc} onChange={e=>setGc(e.target.value)}/></Field>
      <div className="mt-3"><Field label="Fehlende Materialien (optional)"><textarea className={inputCls} rows={2} value={missing} onChange={e=>setMissing(e.target.value)} placeholder="z.B. Toilettenpapier, Spülmittel – pro Zeile oder mit Komma"/></Field></div>
      <div className="mt-3"><div className="text-xs font-medium text-slate-500 mb-1">Unterschrift</div><SigPad onChange={setSig}/></div>
    </Card>
    <Btn kind="ok" className="w-full" onClick={submit} disabled={busy||upBusy}>{busy?"Sende…":"✓ Report absenden"}</Btn>
    <div className="h-6"></div>
  </div></div>);
}
function App() {
  const params=(typeof window!=="undefined")?new URLSearchParams(window.location.search):new URLSearchParams();
  const urlCode=(params.get("code")||"").trim().toUpperCase();
  const urlClean=(params.get("clean")||"").trim();
  const urlFirma=(params.get("firma")||"").trim().toUpperCase();
  const [session,setSession]=useState(undefined);
  const [guest,setGuest]=useState(!!urlCode);
  useEffect(()=>{ sb.auth.getSession().then(({data})=>setSession(data.session));
    const {data:sub}=sb.auth.onAuthStateChange((_e,s)=>setSession(s)); return ()=>sub.subscription.unsubscribe(); },[]);
  let body;
  if(urlClean) body=<CleanerOrder token={urlClean}/>;
  else if(urlFirma) body=<CompanyPortal code={urlFirma}/>;
  else if(guest) body=<Guest onAdmin={()=>setGuest(false)} initialCode={urlCode}/>;
  else if(session===undefined) body=<div className="min-h-screen flex items-center justify-center text-slate-400">Lädt…</div>;
  else if(!session) body=<Login onGuest={()=>setGuest(true)}/>;
  else body=<Admin session={session}/>;
  return <React.Fragment><Toasts/>{body}</React.Fragment>;
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
